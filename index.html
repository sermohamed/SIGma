        if (dk === 'buffer' && f.geojson.properties._bufferSourceId) {
          inner = allFeatures.find(x => x.id === f.geojson.properties._bufferSourceId) || null;
        }
        if (!inner) inner = findEnclosedFeature(f, allFeatures);
        if (inner) {
          const innerC = turf.centroid(inner.geojson).geometry.coordinates;
          if (dk === 'buffer' || turf.area(f.geojson) > turf.area(inner.geojson) * 1.05) {
            const exterior = ringExteriorPointAwayFrom(f.geojson, innerC);
            if (exterior) return exterior.slice();
          }
        }
        if (dk === 'buffer') {
          const c = turf.centroid(f.geojson).geometry.coordinates;
          const exterior = ringExteriorPointAwayFrom(f.geojson, c);
          if (exterior) return exterior.slice();
        }
        const pt = turf.pointOnFeature(f.geojson);
        if (pt && pt.geometry && pt.geometry.coordinates) return pt.geometry.coordinates.slice();
      } catch (_) {}
      const c = polyCentroid(f);
      return c ? c.slice() : null;
    }
    return null;
  }

  function separateLabelAnchors(items, minMeters = 55) {
    if (items.length < 2) return;
    items.sort((a, b) => b.priority - a.priority);
    for (let iter = 0; iter < 16; iter++) {
      let moved = false;
      for (let i = 0; i < items.length; i++) {
        for (let j = i + 1; j < items.length; j++) {
          let dist = 0;
          try {
            dist = turf.distance(
              turf.point(items[i].anchor), turf.point(items[j].anchor),
              { units: 'meters' }
            );
          } catch (_) { continue; }
          if (dist >= minMeters) continue;
          const pushM = (minMeters - dist) / 2 + 8;
          if (dist < 0.5) {
            const hash = String(items[j].id || j).split('').reduce((a, c) => a + c.charCodeAt(0), 0);
            const dest = turf.destination(
              turf.point(items[j].anchor), minMeters, (hash % 8) * 45,
              { units: 'meters' }
            );
            items[j].anchor = dest.geometry.coordinates.slice();
          } else {
            const brng = turf.bearing(turf.point(items[i].anchor), turf.point(items[j].anchor));
            if (items[i].priority >= items[j].priority) {
              const dest = turf.destination(turf.point(items[j].anchor), pushM, brng, { units: 'meters' });
              items[j].anchor = dest.geometry.coordinates.slice();
            } else {
              const dest = turf.destination(
                turf.point(items[i].anchor), pushM, (brng + 180) % 360,
                { units: 'meters' }
              );
              items[i].anchor = dest.geometry.coordinates.slice();
            }
          }
          moved = true;
        }
      }
      if (!moved) break;
    }
  }

  function buildLabelFeatures() {
    const candidates = [];
    for (const f of state.features) {
      if (!isFeatureVisible(f)) continue;
      if (f.style && f.style.showLabel === false) continue;
      const anchor = computeLabelAnchor(f, state.features);
      if (!anchor) continue;
      candidates.push({
        id: f.id,
        priority: computeLabelPriority(f),
        anchor,
        name: (f.name && String(f.name).trim()) ? f.name : nameForKind(f.kind),
      });
    }
    separateLabelAnchors(candidates, 55);
    return candidates.map(c => ({
      type: 'Feature',
      id: c.id,
      geometry: { type: 'Point', coordinates: c.anchor },
      properties: { id: c.id, name: c.name, priority: c.priority },
    }));
  }

  function applyLabelFeatures(labelFeatures) {
    if (!map.isStyleLoaded()) return false;
    if (!map.getSource(SRC_LABELS)) {
      try { installAppLayers(); } catch (_) { return false; }
    }
    try {
      const src = map.getSource(SRC_LABELS);
      const fc = { type: 'FeatureCollection', features: labelFeatures || [] };
      // Hard reset prevents ghost labels after delete on mobile MapLibre builds.
      src.setData({ type: 'FeatureCollection', features: [] });
      src.setData(fc);
      if (map.getLayer('app-label')) {
        try { map.moveLayer('app-label'); } catch (_) {}
      }
      map.triggerRepaint();
      return true;
    } catch (err) {
      log.warn('[HydraulicGIS] applyLabelFeatures failed:', err);
      return false;
    }
  }

  function syncFeaturesToMap() {
    if (!map.isStyleLoaded()) {
      requestAnimationFrame(() => { try { if (map.isStyleLoaded()) syncFeaturesToMap(); } catch (_) {} });
      return;
    }
    if (!map.getSource(SRC_LABELS)) {
      try { installAppLayers(); }
      catch (err) { log.warn('[HydraulicGIS] layer reinstall failed:', err); return; }
    }

    // Build labels with separated anchor positions so nearby objects
    // (circle + buffer, overlapping polygons, etc.) stay readable.
    const labels = buildLabelFeatures();

    try {
      applyLabelFeatures(labels);
    } catch (err) {
      log.warn('[HydraulicGIS] label setData failed:', err);
    }

    // Sync the selection-highlight layer with state.selectedIds.
    try {
      const selFeatures = state.features
        .filter(f => state.selectedIds.includes(f.id))
        .map(f => f.geojson);
      if (map.getSource('app-selection')) {
        map.getSource('app-selection').setData({
          type: 'FeatureCollection', features: selFeatures
        });
      }
    } catch (err) {
      log.warn('[HydraulicGIS] selection setData failed:', err);
    }

    // Critical: re-raise app-label and selection layers ABOVE all terra-draw
    // layers (td-*) every time we sync. terra-draw lazily creates td-point /
    // td-linestring / td-polygon when the user draws, and they get added at
    // the TOP of the layer stack — covering our overlays.
    try {
      // Order (bottom to top): td-* (terra-draw), then derived shapes,
      // then selection halo, then labels.
      if (map.getLayer('app-derived-fill')) map.moveLayer('app-derived-fill');
      if (map.getLayer('app-derived-outline')) map.moveLayer('app-derived-outline');
      if (map.getLayer('app-derived-line')) map.moveLayer('app-derived-line');
      if (map.getLayer('app-derived-point')) map.moveLayer('app-derived-point');
      if (map.getLayer('app-contours-line')) map.moveLayer('app-contours-line');
      if (map.getLayer('app-selection-fill')) map.moveLayer('app-selection-fill');
      if (map.getLayer('app-selection-line')) map.moveLayer('app-selection-line');
      if (map.getLayer('app-selection-point')) map.moveLayer('app-selection-point');
      if (map.getLayer('app-label')) map.moveLayer('app-label');
    } catch (_) {}

    // Re-sync derived features (buffers, intersections, contours) so
    // visibility toggles in Calques affect them too.
    try { syncDerivedLayer(); } catch (_) {}
    try { syncContourLabelsFromStore(); } catch (_) {}
    // Live legend refresh: visible/name/style changes flow into the box
    // without any user intervention.
    try { if (typeof updateLegendBox === 'function') updateLegendBox(); } catch (_) {}

    // Sync visibility from our store to terra-draw's render layers.
    // The eye icon in Calques toggles f.style.visible. We were previously
    // only filtering the label feature, so the SHAPE remained visible even
    // when the eye was closed. We now also apply a MapLibre filter on each
    // td-* layer that excludes the hidden features by their terra-draw id.
    // The id is the top-level GeoJSON feature.id that terra-draw assigns
    // when it pushes data into its source — same id we stored in
    // f.geojson.properties._terraId on creation.
    try {
      const hiddenTerraIds = state.features
        .filter(f => f.style && f.style.visible === false)
        .map(f => f.geojson && f.geojson.properties && f.geojson.properties._terraId)
        .filter(Boolean);
      const filterExpr = hiddenTerraIds.length === 0
        ? null   // no filter (show all)
        : ['!', ['in', ['id'], ['literal', hiddenTerraIds]]];
      for (const lyr of ['td-point', 'td-linestring', 'td-polygon', 'td-polygon-outline']) {
        if (map.getLayer(lyr)) {
          try { map.setFilter(lyr, filterExpr); }
          catch (e) { log.warn('[HydraulicGIS] setFilter on', lyr, 'failed:', e); }
        }
      }
    } catch (err) {
      log.warn('[HydraulicGIS] visibility filter sync failed:', err);
    }
    try { map.triggerRepaint(); } catch (_) {}
  }

  // ─── Diagnostic HUD ───
  // Activates on URL param ?debug=1 OR by typing 'D' three times in a row.
  // Lets us see if terra-draw is registering taps when the visual rendering
  // appears broken on mobile.
  const isDebugMode = (function () {
    try { return /[?&]debug=1\b/.test(window.location.search); }
    catch (_) { return false; }
  })();
  function showHud() {
    const el = document.getElementById('td-hud');
    if (el) el.style.display = '';
  }
  // Write a line to the user-visible log inside the HUD. Survives the
  // last 20 entries.
  function hudLog(msg) {
    try {
      const logEl = document.getElementById('hud-log');
      if (!logEl) return;
      const line = document.createElement('div');
      const t = new Date();
      const ts = String(t.getHours()).padStart(2, '0') + ':' +
                 String(t.getMinutes()).padStart(2, '0') + ':' +
                 String(t.getSeconds()).padStart(2, '0');
      line.textContent = ts + ' ' + msg;
      logEl.appendChild(line);
      // Auto-scroll to bottom
      logEl.scrollTop = logEl.scrollHeight;
      // Keep only the last 30 lines.
      while (logEl.children.length > 30) logEl.removeChild(logEl.firstChild);
      // Also update the live counters
      const selEl = document.getElementById('hud-sel');
      const multiEl = document.getElementById('hud-multi');
      if (selEl && typeof state !== 'undefined') selEl.textContent = state.selectedIds.length;
      if (multiEl && typeof state !== 'undefined') multiEl.textContent = state.multiSelectMode ? 'ON' : 'OFF';
    } catch (_) {}
  }
  function updateHud(eventLabel) {
    if (!isDebugMode && !document.getElementById('td-hud') ||
        document.getElementById('td-hud').style.display === 'none') return;
    try {
      const td = drawControl && drawControl.getTerraDrawInstance && drawControl.getTerraDrawInstance();
      const mode = td && typeof td.getMode === 'function' ? td.getMode() : '—';
      const snap = td && typeof td.getSnapshot === 'function' ? td.getSnapshot() : [];
      const layers = ['td-point','td-linestring','td-polygon','td-polygon-outline']
        .filter(id => map.getLayer(id))
        .join(', ') || 'aucune';
      const m = document.getElementById('hud-mode');
      const c = document.getElementById('hud-count');
      const l = document.getElementById('hud-layers');
      const e = document.getElementById('hud-event');
      if (m) m.textContent = mode;
      if (c) c.textContent = snap.length;
      if (l) l.textContent = layers;
      if (e && eventLabel) e.textContent = eventLabel + ' @ ' + new Date().toISOString().substr(11, 8);
    } catch (_) {}
  }
  if (isDebugMode) {
    // Show HUD as soon as DOM is ready.
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', showHud);
    } else {
      showHud();
    }
  }
  // Triple-D shortcut to toggle HUD even without URL param.
  let _ddCount = 0, _ddTimer = null;
  window.addEventListener('keydown', (e) => {
    if (e.key === 'd' || e.key === 'D') {
      _ddCount++;
      clearTimeout(_ddTimer);
      _ddTimer = setTimeout(() => { _ddCount = 0; }, 700);
      if (_ddCount >= 3) {
        const el = document.getElementById('td-hud');
        if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
        _ddCount = 0;
      }
    }
  });

  function mapGeomanShapeToTdMode(shape) {
    const s = String(shape || '').toLowerCase();
    if (s === 'marker') return 'point';
    if (s === 'line') return 'linestring';
    if (s === 'polygon') return 'polygon';
    if (s === 'rectangle') return 'rectangle';
    if (s === 'circle') return 'circle';
    return 'polygon';
  }

  function mapTdModeToGeomanShape(mode) {
    const m = String(mode || '').toLowerCase();
    if (m === 'point') return 'marker';
    if (m === 'linestring') return 'line';
    if (m === 'polygon') return 'polygon';
    if (m === 'rectangle') return 'rectangle';
    if (m === 'circle') return 'circle';
    return null;
  }

  function ensureGeomanCss() {
    try {
      if (document.getElementById('hgis-geoman-css')) return;
      const link = document.createElement('link');
      link.id = 'hgis-geoman-css';
      link.rel = 'stylesheet';
      link.href = 'https://unpkg.com/@geoman-io/maplibre-geoman-free/dist/maplibre-geoman.css';
      document.head.appendChild(link);
    } catch (_) {}
  }

  function createGeomanTdBridge() {
    const listeners = { finish: [], change: [], select: [], deselect: [] };
    let currentMode = 'static';
    let previousSnapshot = new Map();
    let previousSelection = new Set();

    const fire = (name, ...args) => {
      for (const cb of (listeners[name] || [])) {
        try { cb(...args); } catch (_) {}
      }
    };

    const toSnapshotFeature = (f) => {
      const props = { ...(f.properties || {}) };
      const mode = mapGeomanShapeToTdMode(props.shape);
      props.mode = mode;
      return {
        id: String(f.id),
        type: 'Feature',
        geometry: f.geometry,
        properties: props,
      };
    };

    const getSnapshot = () => {
      try {
        if (!map.gm || !map.gm.features || typeof map.gm.features.exportGeoJson !== 'function') return [];
        const fc = map.gm.features.exportGeoJson();
        const features = (fc && fc.features) ? fc.features : [];
        return features
          .filter(x => x && x.geometry && x.id != null)
          .map(toSnapshotFeature);
      } catch (_) { return []; }
    };

    const syncSelectionForward = () => {
      try {
        if (!map.gm || !map.gm.features) return;
        const next = new Set(Array.from(map.gm.features.selection || []).map(String));
        if (next.size === 0 && previousSelection.size > 0) fire('deselect');
        for (const id of next) {
          if (!previousSelection.has(id)) fire('select', id);
        }
        previousSelection = next;
      } catch (_) {}
    };

    const refreshAndEmit = (kindHint) => {
      const nextSnap = getSnapshot();
      const next = new Map(nextSnap.map(f => [String(f.id), f]));
      const created = [];
      const updated = [];
      const deleted = [];

      for (const [id, f] of next.entries()) {
        if (!previousSnapshot.has(id)) created.push(id);
        else {
          const before = previousSnapshot.get(id);
          try {
            if (JSON.stringify(before.geometry) !== JSON.stringify(f.geometry)) updated.push(id);
          } catch (_) { updated.push(id); }
        }
      }
      for (const id of previousSnapshot.keys()) {
        if (!next.has(id)) deleted.push(id);
      }
      previousSnapshot = next;

      if (created.length) {
        fire('change', created, 'create');
        for (const id of created) {
          const f = next.get(id);
          fire('finish', id, { action: 'draw', mode: f && f.properties ? f.properties.mode : undefined });
        }
      }
      if (updated.length) fire('change', updated, 'update');
      if (deleted.length) fire('change', deleted, 'delete');
      syncSelectionForward();
      if (kindHint) updateHud('gm:' + kindHint);
    };

    map.on('gm:create', () => refreshAndEmit('create'));
    map.on('gm:edit', () => refreshAndEmit('edit'));
    map.on('gm:editend', () => refreshAndEmit('editend'));
    map.on('gm:remove', () => refreshAndEmit('remove'));
    map.on('gm:selection', () => syncSelectionForward());

    return {
      on: (name, cb) => {
        if (!listeners[name]) listeners[name] = [];
        listeners[name].push(cb);
      },
      getMode: () => currentMode,
      setMode: async (mode) => {
        const m = String(mode || 'static').toLowerCase();
        currentMode = m;
        if (!map.gm) return;
        try {
          if (m === 'static') {
            if (typeof map.gm.disableDraw === 'function') await map.gm.disableDraw();
            if (typeof map.gm.disableAllModes === 'function') await map.gm.disableAllModes();
            return;
          }
          if (m === 'select') {
            if (typeof map.gm.disableDraw === 'function') await map.gm.disableDraw();
            if (typeof map.gm.enableGlobalEditMode === 'function') await map.gm.enableGlobalEditMode();
            return;
          }
          const shape = mapTdModeToGeomanShape(m);
          if (shape && typeof map.gm.enableDraw === 'function') await map.gm.enableDraw(shape);
        } catch (_) {}
      },
      getSnapshot,
      addFeatures: async (features) => {
        if (!map.gm || !map.gm.features || typeof map.gm.features.importGeoJsonFeature !== 'function') return;
        for (const f of (features || [])) {
          if (!f || !f.geometry) continue;
          try {
            const shape = mapTdModeToGeomanShape((f.properties && f.properties.mode) || kindFromGeom(f.geometry));
            await map.gm.features.importGeoJsonFeature({
              type: 'Feature',
              id: String(f.id),
              geometry: f.geometry,
              properties: { ...(f.properties || {}), shape },
            });
          } catch (_) {}
        }
        refreshAndEmit('import');
      },
      removeFeatures: async (ids) => {
        if (!map.gm || !map.gm.features || typeof map.gm.features.delete !== 'function') return;
        for (const id of (ids || [])) {
          try { await map.gm.features.delete(String(id)); } catch (_) {}
        }
        refreshAndEmit('delete');
      },
      selectFeature: (id) => {
        try {
          if (map.gm && map.gm.features && typeof map.gm.features.setSelection === 'function') {
            map.gm.features.setSelection([String(id)], true);
          }
        } catch (_) {}
      },
      deselect: () => {
        try {
          if (map.gm && map.gm.features && typeof map.gm.features.clearSelection === 'function') {
            map.gm.features.clearSelection();
          }
        } catch (_) {}
      },
    };
  }

  async function installDrawControlGeoman() {
    if (drawControl && (drawControl.engine === 'geoman' || drawControl.engine === 'terradraw')) return;
    drawControl = { engine: 'geoman-loading', getTerraDrawInstance: () => null };
    ensureGeomanCss();
    try {
      if (!_geomanModule) {
        _geomanModule = await import('https://unpkg.com/@geoman-io/maplibre-geoman-free/dist/maplibre-geoman.es.js');
      }
      const GeomanCtor = _geomanModule && _geomanModule.Geoman;
      if (!GeomanCtor) throw new Error('Geoman constructor not found');
      _geomanInstance = new GeomanCtor(map, {
        settings: {
          useControlsUi: true,
          controlsPosition: 'top-left',
        },
      });
      if (typeof _geomanInstance.waitForGeomanLoaded === 'function') {
        await _geomanInstance.waitForGeomanLoaded();
      }
      const bridge = createGeomanTdBridge();
      drawControl = {
        engine: 'geoman',
        getTerraDrawInstance: () => bridge,
        toggleButtonsWhenNoFeature: () => {},
        on: () => {},
      };
      try {
        const tdLike = drawControl.getTerraDrawInstance();
        if (tdLike && state.features.length && typeof tdLike.addFeatures === 'function') {
          const gmFeatures = state.features
            .filter(f => f.geojson && f.geojson.geometry && !isDerivedFeature(f))
            .map(f => {
              let tid = f.geojson.properties && f.geojson.properties._terraId;
              if (!tid) {
                tid = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'restored-' + f.id;
                f.geojson.properties = { ...(f.geojson.properties || {}), _terraId: tid };
              }
              const tdMode = ({ point: 'point', line: 'linestring', polygon: 'polygon',
                                rectangle: 'rectangle', circle: 'circle' })[f.kind] || 'polygon';
              return {
                id: tid,
                type: 'Feature',
                geometry: f.geojson.geometry,
                properties: { ...(f.geojson.properties || {}), mode: tdMode },
              };
            });
          if (gmFeatures.length) await tdLike.addFeatures(gmFeatures);
        }
      } catch (_) {}
      log.info('[HydraulicGIS] Geoman bridge installed.');
    } catch (err) {
      log.warn('[HydraulicGIS] Geoman init failed, keep TerraDraw path:', err);
      drawControl = null;
    }
  }

  function installDrawControl() {
    if (drawControl) return;
    if (DRAW_ENGINE === 'geoman') {
      installDrawControlGeoman();
      return;
    }
    if (typeof MaplibreTerradrawControl === 'undefined' ||
        !MaplibreTerradrawControl.MaplibreTerradrawControl) {
      log.warn('[HydraulicGIS] terra-draw n\'a pas pu être chargé — le dessin est désactivé. Le reste de l\'application fonctionne.');
      return;
    }
    try {
      // Configure draw modes for tap-to-place behavior (instead of the default
      // click-drag), which is much more usable on touch screens — the user
      // taps a corner, lifts the finger, taps the opposite corner. They can
      // pan/zoom the map between taps because they're not in a drag gesture.
      //
      // We use the wrapper's getDefaultModeOptions() helper to get pre-built
      // mode instances, then reconfigure the ones that use a drag interaction.
      let modeOptions = null;
      try {
        if (typeof MaplibreTerradrawControl.getDefaultModeOptions === 'function') {
          modeOptions = MaplibreTerradrawControl.getDefaultModeOptions();
          // 'click-move' is not exposed by this version of the wrapper bundle
          // (verified by inspecting the UMD source — the string is absent).
          // We attempt the call defensively in case a future build adds it,
          // but rely on our own synthetic-pointermove fix below for mobile.
          for (const modeName of ['rectangle', 'circle', 'angled-rectangle', 'sector']) {
            const mode = modeOptions[modeName];
            if (mode && typeof mode.updateOptions === 'function') {
              try { mode.updateOptions({ drawInteraction: 'click-move' }); }
              catch (err) { log.warn('[HydraulicGIS] could not set click-move on', modeName, err); }
            }
          }
        } else {
          log.warn('[HydraulicGIS] getDefaultModeOptions not available — drawing uses default click-drag.');
        }
      } catch (err) {
        log.warn('[HydraulicGIS] mode configuration failed, falling back to defaults:', err);
        modeOptions = null;
      }

      // Mode list:
      //  • 'freehand' removed — it requires sustained pointer-move which is
      //    not usable with a finger on mobile (the user would have to
      //    drag-trace a shape with one continuous touch, blocking pan/zoom).
      //  • 'delete' (trash icon) removed — the wrapper's built-in delete
      //    button doesn't work reliably and the user can already remove a
      //    feature via Select → Delete-selection (per user feedback).
      const controlOpts = {
        modes: ['point', 'linestring', 'polygon', 'rectangle', 'circle', 'select', 'delete-selection'],
        // Keep the toolbar always expanded (open: true). We wrap it in a
        // CSS-based dropdown ourselves — see installDrawDropdown() below.
        open: true,
      };
      if (modeOptions) controlOpts.modeOptions = modeOptions;

      drawControl = new MaplibreTerradrawControl.MaplibreTerradrawControl(controlOpts);
      map.addControl(drawControl, 'top-left');
      log.info('[HydraulicGIS] terra-draw control added.');

      // Force terra-draw into 'static' mode at startup. The wrapper may
      // pre-select a mode (often 'select') which would intercept the
      // user's first tap. Static = idle, no mode active, taps reach our
      // map.on('click') tap-select handler.
      // Patch terra-draw's select-mode flags with a few retries to be
      // sure the mode is fully constructed by the time we touch it.
      let _flagsPatched = false;
      function tryPatchFlags() {
        if (_flagsPatched) return;
        try {
          const tdInst = drawControl.getTerraDrawInstance && drawControl.getTerraDrawInstance();
          if (!tdInst) { hudLog('init: td not ready, retry'); return; }
          tdInst.setMode('static');
          const ok = setSelectEditFlags(tdInst, false);
          if (ok) {
            _flagsPatched = true;
            hudLog('init: flags patched OK');
          } else {
            hudLog('init: flags patch returned false');
          }
        } catch (e) {
          hudLog('init: ERR ' + e.message);
        }
      }
      for (const d of [0, 50, 200, 500, 1000, 2000]) setTimeout(tryPatchFlags, d);

      // ─── Select-mode flag patching ────────────────────────────────────
      // We expose two states for the select-mode flags:
      //   • SELECT-ONLY (enabled=false): tapping a feature in select mode
      //     just marks it selected. NO vertices, NO drag, NO midpoints.
      //   • EDIT (enabled=true): full editing — vertices visible and
      //     draggable, midpoints insertable, feature draggable.
      // The original (edit-enabled) flags are captured on first call so
      // we can restore them later.
      let _originalSelectFlags = null;
      function setSelectEditFlags(td, enabled) {
        if (!td || !td._modes) return false;
        // Find the select mode instance. The wrapper stores it under
        // _instanceSelectMode (mode name) and the modes themselves under
        // _modes[name].
        const selectModeName = td._instanceSelectMode || 'select';
        const selMode = td._modes[selectModeName];
        if (!selMode || !selMode.flags) {
          log.warn('[HydraulicGIS] select mode not found or has no flags');
          return false;
        }
        // Capture the original (edit-enabled) flags on first call.
        if (!_originalSelectFlags) {
          _originalSelectFlags = JSON.parse(JSON.stringify(selMode.flags));
        }
        if (enabled) {
          // Restore original flags — full editing capability.
          selMode.flags = JSON.parse(JSON.stringify(_originalSelectFlags));
        } else {
          // Replace flags with a "select-only" profile: no draggable,
          // no midpoints, NO selection points (vertices). Terra-draw's
          // select() function creates selectionPoints only if
          // `flags[mode].feature.coordinates` is TRUTHY. So we set it
          // to false (falsy) — that's how we disable vertex display.
          const noEditFlags = {};
          for (const modeName of Object.keys(_originalSelectFlags)) {
            noEditFlags[modeName] = {
              feature: {
                draggable: false,
                rotateable: false,
                scaleable: false,
                coordinates: false,   // <-- FALSY, so no vertices
              },
            };
          }
          selMode.flags = noEditFlags;
        }
        log.info('[HydraulicGIS] select-mode flags set, edit-enabled=' + enabled);
        return true;
      }

      // ─── Inject "multi-select" toggle button ─────────────────────────
      // Sits inside the terra-draw toolbar between the Select button and
      // the Delete-selection button. When toggled on, taps on the map add
      // to the existing selection instead of replacing it (see selection
      // handlers further below). The button is created lazily because
      // terra-draw renders its toolbar asynchronously after addControl.
      // ─── Draw toolbar dropdown ────────────────────────────────────
      // Strategy: move terra-draw's .maplibregl-ctrl-group OUT of the
      // MapLibre ctrl-top-left container and into a custom overlay div
      // that we inject directly into #app (the same layer as the map).
      // This gives us full CSS control (position, animation, z-index)
      // without fighting MapLibre's layout machinery.
      //
      // The drawer starts collapsed. One "✏ Dessiner" button always
      // shows and toggles the tool list below it.
      function installDrawDropdown() {
        const attempts = [0, 50, 150, 350, 700, 1400];
        let done = false;
        for (const delay of attempts) {
          setTimeout(() => {
            if (done) return;
            if (document.getElementById('draw-dropdown-wrapper')) { done = true; return; }

            // Find the terra-draw ctrl group that MapLibre created
            const ctrlContainer = document.querySelector('.maplibregl-ctrl-top-left');
            const tdCtrl = ctrlContainer && ctrlContainer.querySelector('.maplibregl-ctrl-group');
            if (!tdCtrl) return;
            done = true;

            // Build our overlay container positioned over the map
            const wrapper = document.createElement('div');
            wrapper.id = 'draw-dropdown-wrapper';

            // Toggle button — always visible
            const toggle = document.createElement('button');
            toggle.id = 'draw-toggle-btn';
            toggle.type = 'button';
            toggle.title = 'Outils de dessin';
            toggle.setAttribute('aria-label', 'Afficher/masquer les outils de dessin');
            toggle.innerHTML = `
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2.2"
                   stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h9"/>
                <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>`;

            // Drawer — initially hidden
            const drawer = document.createElement('div');
            drawer.id = 'draw-drawer';
            drawer.classList.add('collapsed');

            // Move terra-draw ctrl group from MapLibre's container into our drawer
            drawer.appendChild(tdCtrl);

            wrapper.appendChild(toggle);
            wrapper.appendChild(drawer);

            // Append to the #app div so it sits in the same stacking
            // context as the map (position: absolute relative to #app)
            const appEl = document.getElementById('app') || document.body;
            appEl.appendChild(wrapper);

            // Toggle
            toggle.addEventListener('click', () => {
              const isOpen = !drawer.classList.contains('collapsed');
              if (isOpen) {
                drawer.classList.add('collapsed');
                toggle.classList.remove('active');
              } else {
                drawer.classList.remove('collapsed');
                toggle.classList.add('active');
              }
            });

            // Auto-collapse when a draw-mode button is tapped
            tdCtrl.addEventListener('click', (e) => {
              const btn = e.target.closest('button');
              if (!btn) return;
              const cls = btn.className || '';
              const isDrawModeBtn = cls.includes('add-point') || cls.includes('add-line') ||
                                    cls.includes('add-polygon') || cls.includes('add-rectangle') ||
                                    cls.includes('add-circle');
              if (isDrawModeBtn) {
                // Leaving selection: turn the app select toggle off WITHOUT
                // touching TerraDraw's mode — the draw button just set the mode
                // (e.g. 'point'), so calling setMode('static') here would cancel
                // the draw tool and nothing would draw. Only update app flags/UI.
                try {
                  state.selectActive = false;
                  const sb = document.getElementById('hgis-select-btn'); if (sb) sb.classList.remove('active');
                  const ch = document.getElementById('hgis-select-children'); if (ch) ch.classList.remove('open');
                  const eb = document.getElementById('hgis-edit-btn'); if (eb) eb.classList.remove('active');
                } catch (_) {}
                setTimeout(() => {
                  drawer.classList.add('collapsed');
                  toggle.classList.remove('active');
                }, 160);
              }
            });

            log.info('[HydraulicGIS] draw dropdown installed.');
          }, delay);
        }
      }
      installDrawDropdown();

      // ─── Multi-select / Edit / Delete buttons ──────────────────────
      // Keep it simple: wait until the terra-draw toolbar exists in the
      // DOM, then append THREE buttons after the terra-draw delete button.
      // Each button uses a direct .onclick = ... handler — no cloning, no
      // capture phase, no stopPropagation. Just plain DOM.
      // ─── Multi-select toggle button ─────────────────────────────────
      //
      // SIMPLE approach (after many failed attempts at adding 3 custom
      // buttons): we keep terra-draw's NATIVE buttons exactly as-is.
      //   • The native "Select" button (arrow icon) puts terra-draw in
      //     select-mode, where tapping a feature highlights it AND
      //     immediately enters edit-mode (vertices visible, draggable).
      //     This is terra-draw's built-in behaviour — we don't fight it.
      //   • The native "delete-selection" button (X-square icon) deletes
      //     whatever terra-draw has internally selected. It appears
      //     automatically when there IS a selection.
      //
      // The user wanted three buttons: Multi/Edit/Delete. Two of them
      // (Edit = native Select, Delete = native delete-selection) already
      // exist and work. We only need to add ONE custom button:
      // "Multi-select" — a TOGGLE that changes how our map-tap selection
      // (the yellow halo via app-selection layer) accumulates: on = add
      // to selection, off = replace selection.
      //
      // No DOM games, no capture-phase listeners, no cloneNode. Just a
      // single button appended to the ctrl group with a plain onclick.
      // ─── Custom selection controls ─────────────────────────────────────
      // We own selection entirely (no native TerraDraw select mode), so the
      // yellow app halo is the only selection cue and nothing gets locked in
      // TerraDraw's select/edit state. The native Select + Delete buttons are
      // hidden; we expose our own Select toggle with Edit + Delete as CHILD
      // buttons that appear underneath it only while selection is active.
      function installSelectionControls() {
        let installed = false;
        const tryInstall = () => {
          if (installed) return true;
          const ctrlGroup = document.querySelector('#draw-drawer .maplibregl-ctrl-group');
          if (!ctrlGroup) return false;
          if (ctrlGroup.querySelector('#hgis-select-btn')) { installed = true; return true; }

          const hideNative = () => {
            ctrlGroup.querySelectorAll('.maplibregl-terradraw-add-select-button, .maplibregl-terradraw-delete-selection-button')
              .forEach(b => { b.style.display = 'none'; });
          };

          // Give the native draw buttons the same sharp, inline-SVG look as our
          // custom Select control (clean stroke icons instead of the dim,
          // inverted data-URI glyphs).
          const drawIcons = {
            'add-point': `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:auto;"><path d="M12 21s-6-5.686-6-10a6 6 0 1112 0c0 4.314-6 10-6 10z"/><circle cx="12" cy="11" r="2" fill="currentColor" stroke="none"/></svg>`,
            'add-line': `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:auto;"><path d="M4 19l6-9 4 5 6-11"/><circle cx="4" cy="19" r="1.6" fill="currentColor" stroke="none"/><circle cx="20" cy="4" r="1.6" fill="currentColor" stroke="none"/></svg>`,
            'add-polygon': `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:auto;"><path d="M12 3l8 6-3 10H7L4 9z"/></svg>`,
            'add-rectangle': `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:auto;"><rect x="4" y="6" width="16" height="12" rx="1"/></svg>`,
            'add-circle': `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:auto;"><circle cx="12" cy="12" r="8"/></svg>`,
          };
          const beautifyDraw = () => {
            ctrlGroup.querySelectorAll('button').forEach(btn => {
              const cls = btn.className || '';
              if (cls.indexOf('hgis-') !== -1) return; // skip our custom buttons
              for (const key of Object.keys(drawIcons)) {
                if (cls.indexOf(key) !== -1) {
                  btn.classList.add('hgis-sharp-btn');
                  btn.innerHTML = drawIcons[key];
                  break;
                }
              }
            });
          };

          const refreshToolbar = () => { hideNative(); beautifyDraw(); };
          refreshToolbar();

          const selectSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:auto;">
              <path d="M3 3l7.5 18 2.5-7.5L20.5 11 3 3z"/>
            </svg>`;
          const editSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:auto;">
              <path d="M12 20h9"/>
              <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>`;
          const delSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:auto;">
              <path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/>
            </svg>`;

          // Parent Select toggle.
          const selectBtn = document.createElement('button');
          selectBtn.id = 'hgis-select-btn';
          selectBtn.type = 'button';
          selectBtn.title = 'Sélectionner';
          selectBtn.setAttribute('aria-label', 'Activer la sélection');
          selectBtn.className = 'maplibregl-terradraw-add-control hgis-custom-btn';
          selectBtn.style.cssText = 'background-image:none; background-color:transparent;';
          selectBtn.innerHTML = selectSvg;

          // Child container (Edit + Delete), shown only while selecting.
          const children = document.createElement('div');
          children.id = 'hgis-select-children';

          // Edit child — keep id 'hgis-edit-btn' so existing references work.
          const editBtn = document.createElement('button');
          editBtn.id = 'hgis-edit-btn';
          editBtn.type = 'button';
          editBtn.title = 'Éditer (déplacer les sommets)';
          editBtn.setAttribute('aria-label', 'Éditer la sélection');
          editBtn.className = 'maplibregl-terradraw-add-control hgis-custom-btn hgis-child-btn';
          editBtn.style.cssText = 'background-image:none; background-color:transparent;';
          editBtn.innerHTML = editSvg;
          editBtn.onclick = (ev) => {
            if (ev) { ev.preventDefault(); ev.stopPropagation(); }
            try {
              const td2 = drawControl.getTerraDrawInstance();
              if (!td2) return;
              if (editBtn.classList.contains('active')) {
                td2.setMode('static');
                setSelectEditFlags(td2, false);
                editBtn.classList.remove('active');
                hudLog('Edit OFF');
                return;
              }
              if (state.selectedIds.length === 0) {
                ui.confirm('Aucune sélection',
                  "Sélectionnez d'abord un objet (tap directement dessus), puis touchez Éditer.", () => {});
                return;
              }
              const firstId = state.selectedIds[0];
              const ours = state.features.find(f => f.id === firstId);
              if (!ours || !ours.geojson.properties._terraId) {
                ui.confirm('Édition impossible',
                  "Cet objet dérivé (buffer/intersection/courbes) ne peut pas être édité.", () => {});
                return;
              }
              // Mark edit active FIRST. selectFeature() below fires the 'select'
              // event synchronously; if the active flag isn't set yet, our
              // selection guards run and immediately strip the draggable-vertex
              // flags + deselect — which is why vertices showed but wouldn't drag.
              editBtn.classList.add('active');
              setSelectEditFlags(td2, true);
              td2.setMode('select');
              try { td2.selectFeature(ours.geojson.properties._terraId); } catch (e) {}
              // Re-assert the edit flags on the next frames in case any late
              // event tried to reset them.
              setTimeout(() => { try { setSelectEditFlags(td2, true); } catch (_) {} }, 0);
              setTimeout(() => { try { setSelectEditFlags(td2, true); } catch (_) {} }, 60);
              hudLog('Edit ON ' + firstId);
            } catch (err) { hudLog('Edit ERR ' + err.message); }
          };

          // Delete child — removes the currently selected feature(s).
          const delBtn = document.createElement('button');
          delBtn.id = 'hgis-del-btn';
          delBtn.type = 'button';
          delBtn.title = 'Supprimer la sélection';
          delBtn.setAttribute('aria-label', 'Supprimer la sélection');
          delBtn.className = 'maplibregl-terradraw-add-control hgis-custom-btn hgis-child-btn hgis-child-danger';
          delBtn.style.cssText = 'background-image:none; background-color:transparent;';
          delBtn.innerHTML = delSvg;
          delBtn.onclick = (ev) => {
            if (ev) { ev.preventDefault(); ev.stopPropagation(); }
            if (!state.selectedIds.length) {
              ui.confirm('Aucune sélection', "Sélectionnez d'abord un objet à supprimer.", () => {});
              return;
            }
            const toDelete = state.selectedIds.slice();
            ui.confirm('Supprimer ?',
              `Supprimer définitivement ${toDelete.length} objet${toDelete.length > 1 ? 's' : ''} sélectionné${toDelete.length > 1 ? 's' : ''} ?`,
              () => {
                toDelete.forEach(removeFeature);
                state.selectedIds = [];
                notifyUi();
                refreshHalo();
              });
          };

          // Multi-select toggle child — when active, taps ADD to the selection
          // instead of replacing it (bulk style / delete then apply to all).
          const multiSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:auto;">
              <rect x="3" y="3" width="12" height="12" rx="1"/>
              <path d="M9 21h11a1 1 0 001-1V9"/>
            </svg>`;
          const multiBtn = document.createElement('button');
          multiBtn.id = 'hgis-multi-btn';
          multiBtn.type = 'button';
          multiBtn.title = 'Sélection multiple';
          multiBtn.setAttribute('aria-label', 'Activer la sélection multiple');
          multiBtn.className = 'maplibregl-terradraw-add-control hgis-custom-btn hgis-child-btn';
          multiBtn.style.cssText = 'background-image:none; background-color:transparent;';
          multiBtn.innerHTML = multiSvg;
          multiBtn.onclick = (ev) => {
            if (ev) { ev.preventDefault(); ev.stopPropagation(); }
            state.multiSelectMode = !state.multiSelectMode;
            multiBtn.classList.toggle('active', state.multiSelectMode);
            hudLog('multi ' + (state.multiSelectMode ? 'ON' : 'OFF'));
          };

          children.appendChild(editBtn);
          children.appendChild(multiBtn);
          children.appendChild(delBtn);

          // NOTE: forceYellowHalo() lives inside a later block scope and is NOT
          // reachable here. Use the module-level syncSelectionHighlight + map so
          // these handlers never throw (that ReferenceError was why the Select
          // button appeared unresponsive).
          const refreshHalo = () => {
            try { if (typeof syncSelectionHighlight === 'function') syncSelectionHighlight(); } catch (_) {}
            try {
              ['app-selection-fill', 'app-selection-line', 'app-selection-point', 'app-label']
                .forEach(l => { if (map.getLayer(l)) map.moveLayer(l); });
            } catch (_) {}
            try { map.triggerRepaint(); } catch (_) {}
          };

          const setSelectActive = (on) => {
            state.selectActive = !!on;
            selectBtn.classList.toggle('active', state.selectActive);
            children.classList.toggle('open', state.selectActive);
            if (!state.selectActive) {
              try { setSelectEditFlags(td, false); } catch (_) {}
              editBtn.classList.remove('active');
              // Leaving selection also exits multi-select mode.
              state.multiSelectMode = false;
              multiBtn.classList.remove('active');
            }
            try { if (typeof td.setMode === 'function' && td.getMode && td.getMode() !== 'select') td.setMode('static'); } catch (_) {}
            refreshHalo();
          };
          window.__hgisSetSelectActive = setSelectActive;

          selectBtn.onclick = (ev) => {
            if (ev) { ev.preventDefault(); ev.stopPropagation(); }
            setSelectActive(!state.selectActive);
          };

          ctrlGroup.appendChild(selectBtn);
          ctrlGroup.appendChild(children);
          installed = true;
          // Re-apply in case the library re-rendered its buttons.
          [0, 120, 350, 900].forEach(d => setTimeout(refreshToolbar, d));
          hudLog('selection controls installed');
          return true;
        };
        const delays = [0, 50, 150, 400, 900, 1800];
        for (const d of delays) setTimeout(tryInstall, d);
      }
      installSelectionControls();

      // ─── Per-feature style injection ─────────────────────────────────
      // terra-draw's `setModeStyles` accepts FUNCTIONS for style values
      // (verified by reading the bundle: `getStylingValue` does
      //   `typeof e == "function" ? e(feature) : e`).
      // We install resolver functions that look up our store by terraId
      // and return the user-configured style (stroke/fill/width/opacity).
      // Features without a matching store entry (e.g. mid-draw) fall back
      // to the default blue. This is what makes the Style panel actually
      // affect rendering.
      function installPerFeatureStyles() {
        const td2 = drawControl.getTerraDrawInstance && drawControl.getTerraDrawInstance();
        if (!td2 || typeof td2.setModeStyles !== 'function') return;
        const terraIdEq = (a, b) => String(a) === String(b);
        const ourFeatureForTerraId = (terraId) => {
          if (!terraId) return null;
          for (const f of state.features) {
            if (f.geojson && f.geojson.properties && terraIdEq(f.geojson.properties._terraId, terraId)) {
              return f;
            }
          }
          return null;
        };
        const lineStyles = {
          lineStringColor: (feature) => {
            const ours = ourFeatureForTerraId(feature.id);
            return ours ? ours.style.stroke : '#3f97e0';
          },
          lineStringWidth: (feature) => {
            const ours = ourFeatureForTerraId(feature.id);
            return ours ? ours.style.strokeWidth : 4;
          },
        };
        const polyStyles = {
          fillColor:    (feature) => { const o = ourFeatureForTerraId(feature.id); return o ? o.style.fill   : '#3f97e0'; },
          outlineColor: (feature) => { const o = ourFeatureForTerraId(feature.id); return o ? o.style.stroke : '#3f97e0'; },
          outlineWidth: (feature) => { const o = ourFeatureForTerraId(feature.id); return o ? o.style.strokeWidth : 4; },
          fillOpacity:  (feature) => { const o = ourFeatureForTerraId(feature.id); return o ? o.style.fillOpacity : 0.3; },
        };
        const pointStyles = {
          pointColor: (feature) => { const o = ourFeatureForTerraId(feature.id); return o ? o.style.stroke : '#3f97e0'; },
          pointWidth: (feature) => { const o = ourFeatureForTerraId(feature.id); return o ? Math.max(4, o.style.strokeWidth * 3) : 6; },
          pointOutlineColor: '#ffffff',
          pointOutlineWidth: 1.5,
        };
        try { td2.setModeStyles('linestring', lineStyles); } catch (e) { log.warn('setModeStyles linestring failed', e); }
        try { td2.setModeStyles('polygon',    polyStyles); } catch (e) { log.warn('setModeStyles polygon failed', e); }
        try { td2.setModeStyles('rectangle',  polyStyles); } catch (e) { log.warn('setModeStyles rectangle failed', e); }
        try { td2.setModeStyles('circle',     polyStyles); } catch (e) { log.warn('setModeStyles circle failed', e); }
        try { td2.setModeStyles('point',      pointStyles); } catch (e) { log.warn('setModeStyles point failed', e); }
        // Force select-mode visuals to yellow so native TD never appears blue.
        const selectStyles = {
          lineStringColor: '#fbc412',
          lineStringWidth: 5,
          fillColor: '#fbc412',
          outlineColor: '#fbc412',
          outlineWidth: 4,
          fillOpacity: 0.22,
          pointColor: '#fbc412',
          pointWidth: 10,
          pointOutlineColor: '#ffffff',
          pointOutlineWidth: 2,
        };
        try { td2.setModeStyles('select', selectStyles); }
        catch (e) { log.warn('setModeStyles select failed', e); }
        log.info('[HydraulicGIS] per-feature style resolvers installed.');
      }
      installPerFeatureStyles();

      // Force terra-draw to re-evaluate styles. There is no public refresh
      // method, but mutating the feature's properties through the public
      // `addFeatures`/`removeFeatures` API would lose the terraId. The
      // simplest reliable trigger is a no-op map.triggerRepaint AFTER any
      // store change — terra-draw re-reads styleFeature on each render.
      function refreshTerraDrawStyles() {
        try {
          installPerFeatureStyles();
          map.triggerRepaint();
          requestAnimationFrame(() => { try { map.triggerRepaint(); } catch (_) {} });
        } catch (_) {}
      }
      // Hook the style refresh into our store. We do this by replacing
      // setStyle to also trigger a terra-draw repaint.
      const _origSetStyle = setStyle;
      setStyle = function (id, patch) {
        _origSetStyle(id, patch);
        refreshTerraDrawStyles();
      };


      // ─── Bug workaround: wrapper disables Select/Delete during selection ───
      // The wrapper's toggleButtonsWhenNoFeature() calls getFeatures(false),
      // which EXCLUDES features whose `properties.mode === "select"`. When the
      // user enters select mode and the feature is being dragged/edited, its
      // mode is temporarily 'select', so the count drops to 0 and the buttons
      // disable mid-action. We replace the function with one that counts ALL
      // features (including those currently in select mode).
      try {
        if (typeof drawControl.toggleButtonsWhenNoFeature === 'function') {
          drawControl.toggleButtonsWhenNoFeature = function () {
            if (!this.controlContainer) return;
            const td2 = this.terradraw || (this.getTerraDrawInstance && this.getTerraDrawInstance());
            if (!td2 || typeof td2.getSnapshot !== 'function') return;
            const all = td2.getSnapshot() || [];
            const hasFeature = all.length > 0;  // count ALL features, no mode filter
            const ids = ['maplibregl-terradraw-add-select-button',
                         'maplibregl-terradraw-download-button',
                         'maplibregl-terradraw-delete-selection-button'];
            for (const cls of ids) {
              const els = this.controlContainer.getElementsByClassName(cls);
              for (let i = 0; i < els.length; i++) {
                const el = els.item(i);
                if (el) el.disabled = !hasFeature;
              }
            }
          };
          log.info('[HydraulicGIS] Select/Delete enable logic patched.');
        }
      } catch (err) {
        log.warn('[HydraulicGIS] could not patch toggleButtonsWhenNoFeature:', err);
      }

      // Subscribe to terra-draw events. We keep our store in sync with what
      // terra-draw has, but TERRA-DRAW IS THE SOLE RENDERER for drawn shapes.
      // No filtering, no opacity tricks, no double-rendering. The user always
      // sees terra-draw's version (in-progress AND finished alike).

      // Boost the size of terra-draw's in-progress vertex circles so they're
      // clearly visible on mobile (default is 6px — tiny under a finger).
      // Apply only to the point radius — keep terra-draw's own colors.
      // We re-apply on every styledata event since the layers may not exist
      // yet when this runs the first time.
      // ─── First-vertex overlay layer ────────────────────────────────────
      //
      // ROOT CAUSE OF THE "FIRST POINT INVISIBLE ON MOBILE" BUG (verified by
      // reading the bundled terra-draw UMD source):
      //
      //   • LineString mode: at the first tap, terra-draw calls createLine()
      //     which creates a LineString with TWO IDENTICAL coordinates
      //     [[lng,lat],[lng,lat]] — a zero-length line. On desktop the very
      //     next mousemove stretches it toward the cursor (visible).
      //     On mobile (no hover events between taps) it stays degenerate
      //     and renders as nothing. No vertex Point is created until the
      //     SECOND tap (firstUpdateToLine creates the closingPointId).
      //
      //   • Polygon mode: same pattern — at the first tap, terra-draw creates
      //     a Polygon with FOUR identical coordinates (zero-area polygon),
      //     invisible. The vertex Point is only added at the third tap.
      //
      // This is exactly the bug tracked in GitHub terra-draw #784 and #510.
      // No amount of triggerRepaint / resize / styling fixes it because
      // there is genuinely no visible feature to render.
      //
      // FIX: maintain our own dedicated MapLibre layer that shows a single
      // marker at the first-tap location while terra-draw's geometry is
      // still degenerate. We add the marker as soon as we detect the
      // degenerate state, and remove it as soon as terra-draw creates its
      // own vertex (closing-point) feature.
      const FIRST_VTX_SRC = '_hgis_first_vertex';
      const FIRST_VTX_LYR = '_hgis_first_vertex_layer';
      function ensureFirstVertexLayer() {
        try {
          if (!map.getSource(FIRST_VTX_SRC)) {
            map.addSource(FIRST_VTX_SRC, {
              type: 'geojson',
              data: { type: 'FeatureCollection', features: [] }
            });
          }
          if (!map.getLayer(FIRST_VTX_LYR)) {
            map.addLayer({
              id: FIRST_VTX_LYR,
              source: FIRST_VTX_SRC,
              type: 'circle',
              paint: {
                'circle-radius': 7,
                'circle-color': '#3f97e0',
                'circle-stroke-color': '#ffffff',
                'circle-stroke-width': 2
              }
            });
          }
        } catch (_) {}
      }
      function setFirstVertex(coord) {
        ensureFirstVertexLayer();
        try {
          const src = map.getSource(FIRST_VTX_SRC);
          if (!src) return;
          src.setData({
            type: 'FeatureCollection',
            features: coord ? [{
              type: 'Feature',
              geometry: { type: 'Point', coordinates: coord },
              properties: {}
            }] : []
          });
        } catch (_) {}
      }
      function clearFirstVertex() { setFirstVertex(null); }
      // Re-add layer after basemap style swaps (style swap drops custom layers).
      map.on('styledata', () => {
        // If the layer was lost in the swap and we had a vertex showing,
        // re-create it (data is already in our source if we cached it,
        // but simpler: just ensure the layer exists for next use).
        ensureFirstVertexLayer();
      });

      // Boost vertex point size. Layers are 'td-point', 'td-linestring',
      // 'td-polygon', 'td-polygon-outline' (confirmed from the bundled UMD).
      // The default circle-radius reads ["get","pointWidth"] from properties,
      // so a constant override here is fine.
      function boostTerraDrawPointSize() {
        try {
          if (map.getLayer('td-point')) {
            map.setPaintProperty('td-point', 'circle-radius', 8);

      // is in progress).
      function detectFirstVertexCoord(snapshot) {
        if (!snapshot || !snapshot.length) return null;
        for (const f of snapshot) {
          if (!f || !f.geometry || !f.properties) continue;
          const mode = f.properties.mode;
          const g = f.geometry;
          // Linestring degenerate: 2 coords, both identical
          if (mode === 'linestring' && g.type === 'LineString'
              && g.coordinates && g.coordinates.length === 2) {
            const a = g.coordinates[0], b = g.coordinates[1];
            if (a && b && a[0] === b[0] && a[1] === b[1]) return a;
          }

          if (mode === 'polygon' && g.type === 'Polygon'
              && g.coordinates && g.coordinates[0]
              && g.coordinates[0].length === 4) {

          if (mode === 'rectangle' && g.type === 'Polygon'

              && g.coordinates[0].length === 4) {
            const ring = g.coordinates[0];
            const a = ring[0];
            if (a && ring.every(p => p && p[0] === a[0] && p[1] === a[1])) {

            }

          // (default 1e-5 km = 1 cm) at the first tap, which is invisible at
          // any practical zoom. We detect it by checking that the polygon
          // bounding box is essentially zero in degrees of arc (< 1e-5).
          if (mode === 'circle' && g.type === 'Polygon'
              && g.coordinates && g.coordinates[0]
              && g.coordinates[0].length > 2) {

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            for (const p of ring) {

            // circle, not a user-sized one. (~1e-5 deg ≈ 1.1 m at the equator.)

      // tap closes the shape with a degenerate (1cm) geometry — unusable.
