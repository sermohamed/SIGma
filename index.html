  let _gridUpdateRafQueued = false;
  function scheduleGridUpdate() {
    if (!gridState.enabled) return;
    if (_gridUpdateRafQueued) return;
    _gridUpdateRafQueued = true;
    requestAnimationFrame(() => {
      _gridUpdateRafQueued = false;
      try { updateGrid(); } catch (_) {}
    });
  }
  map.on('move', scheduleGridUpdate);
  map.on('zoom', scheduleGridUpdate);
  // Final precise update at the end of the gesture in case rAFs were
  // throttled (low-power mode) and the live updates were stale.
  map.on('moveend', () => { if (gridState.enabled) updateGrid(); });
  map.on('zoomend', () => { if (gridState.enabled) updateGrid(); });

  /* ═══ 6. UI / PANELS ════════════════════════════════════════════════════════ */
  const ui = window.ui = {
    _promptGuardUntil: 0,
    isMobile() {
      return window.matchMedia('(max-width: 1024px)').matches
          || (window.matchMedia('(pointer: coarse)').matches && window.innerWidth <= 1280);
    },
    setPanel(id) {
      if (state.activePanel === id) {
        state.activePanel = null;
      } else {
        state.activePanel = id;
      }
      this.render();
    },
    openMenu() {
      this.openSheet('menu');
    },
    openSheet(panelId) {
      state.activePanel = panelId;
      this.render();
      document.getElementById('scrim').classList.add('visible');
      document.getElementById('sheet').classList.add('visible');
    },
    closeSheet() {
      state.activePanel = null;
      document.getElementById('scrim').classList.remove('visible');
      document.getElementById('sheet').classList.remove('visible');
      this.render();
    },
    confirm(title, msg, onOk) {
      document.getElementById('confirm-title').textContent = title;
      document.getElementById('confirm-msg').textContent = msg;
      const okBtn = document.getElementById('confirm-ok');
      okBtn.onclick = () => { this.closeConfirm(); onOk(); };
      document.getElementById('confirm-bg').classList.add('visible');
    },
    closeConfirm() {
      document.getElementById('confirm-bg').classList.remove('visible');
    },
    prompt(title, msg, defaultValue, onOk) {
      document.getElementById('prompt-title').textContent = title;
      document.getElementById('prompt-msg').textContent = msg;
      const input = document.getElementById('prompt-input');
      input.value = defaultValue || '';
      const okBtn = document.getElementById('prompt-ok');
      const onSubmit = () => {
        const v = input.value.trim();
        this.closePrompt(true);
        if (typeof onOk === 'function') onOk(v);
        // Keep labels/live map state synced immediately after naming.
        try { if (typeof syncFeaturesToMap === 'function') syncFeaturesToMap(); } catch (_) {}
        try { map.triggerRepaint(); } catch (_) {}
      };
      okBtn.onclick = onSubmit;
      input.onkeydown = (e) => {
        if (e.key === 'Enter') { e.preventDefault(); onSubmit(); }
        else if (e.key === 'Escape') { this.closePrompt(true); }
      };
      // Guard against synthetic trailing taps right after drawing on mobile.
      this._promptGuardUntil = Date.now() + 320;
      document.getElementById('prompt-bg').classList.add('visible');
      // Defer focus + select-all so iOS shows the keyboard.
      // On iOS Safari, keyboard only opens from a direct user-gesture handler.
      // We use a short chain: make visible first, then focus with slight delay.
      setTimeout(() => {
        try {
          input.focus();
          input.select();
          input.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } catch (_) {}
      }, 80);
    },
    closePrompt(force = false) {
      if (!force && Date.now() < (this._promptGuardUntil || 0)) return;
      document.getElementById('prompt-bg').classList.remove('visible');
      const input = document.getElementById('prompt-input');
      if (input) input.onkeydown = null;
    },
    render() {
      // Update rail
      document.querySelectorAll('.rail-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.panel === state.activePanel);
      });

      // Layer count badge
      const count = state.features.length;
      const railBadge = document.getElementById('rail-badge-layers');
      const fabBadge = document.getElementById('fab-badge');
      if (count > 0) {
        railBadge.textContent = count; railBadge.style.display = 'flex';
        fabBadge.textContent = count; fabBadge.classList.add('visible');
      } else {
        railBadge.style.display = 'none';
        fabBadge.classList.remove('visible');
      }

      // If the user is actively typing in a TEXT input INSIDE the panel,
      // skip the panel innerHTML rewrite — it would destroy the focused
      // element mid-typing. For slider/color inputs (range, color), we
      // also skip while they're being dragged because the next mousemove
      // would land on the new (replaced) DOM and lose the gesture.
      // For all other cases (e.g. selection change while no input is
      // focused), we DO re-render so the panel reflects the new selection.
      const panelEl = document.getElementById('panel-body');
      const sheetEl = document.getElementById('sheet-body');
      const af = document.activeElement;
      const isLiveInput = af && /^(INPUT|SELECT|TEXTAREA)$/.test(af.tagName)
        && !af.matches('[type="checkbox"], [type="radio"]'); // checkboxes are fine to re-render
      const skipPanelBody = panelEl && af && panelEl.contains(af) && isLiveInput;
      const skipSheetBody = sheetEl && af && sheetEl.contains(af) && isLiveInput;

      // Render desktop panel
      if (this.isMobile()) {
        document.getElementById('sidebar-panel').classList.remove('visible');
      } else {
        if (state.activePanel && state.activePanel !== 'menu') {
          document.getElementById('sidebar-panel').classList.add('visible');
          document.getElementById('panel-title').textContent = PANEL_TITLES[state.activePanel] || '';
          if (!skipPanelBody) renderPanel('panel-body', state.activePanel);
        } else {
          document.getElementById('sidebar-panel').classList.remove('visible');
        }
      }

      // Render mobile sheet
      if (state.activePanel) {
        const t = state.activePanel === 'menu' ? 'Outils' : (PANEL_TITLES[state.activePanel] || '');
        document.getElementById('sheet-title').textContent = t;
        if (!skipSheetBody) renderPanel('sheet-body', state.activePanel);
        if (this.isMobile()) {
          document.getElementById('scrim').classList.add('visible');
          document.getElementById('sheet').classList.add('visible');
        }
      } else {
        document.getElementById('scrim').classList.remove('visible');
        document.getElementById('sheet').classList.remove('visible');
      }
    },
  };
  onFeatures(() => ui.render());
  onUi(() => ui.render());

  const PANEL_TITLES = {
    layers: 'Calques',
    style: 'Style',
    measure: 'Mesures',
    tools: 'Outils géométriques',
    legend: 'Légende',
    coordinates: 'Convertir coordonnées',
    search: 'Aller à un point',
    elevation: 'Profil d\'élévation',
    grid: 'Grille de coordonnées',
    files: 'Importer / Exporter',
    menu: 'Outils',
  };

  function renderPanel(containerId, panelId) {
    const el = document.getElementById(containerId);
    if (!el) return;
    if (panelId === 'menu') el.innerHTML = renderMenu();
    else if (panelId === 'layers') el.innerHTML = renderLayers();
    else if (panelId === 'style') el.innerHTML = renderStyle();
    else if (panelId === 'measure') el.innerHTML = renderMeasure();
    else if (panelId === 'tools') el.innerHTML = renderTools();
    else if (panelId === 'legend') el.innerHTML = renderLegend();
    else if (panelId === 'coordinates') el.innerHTML = renderCoordinates();
    else if (panelId === 'search') el.innerHTML = renderSearch();
    else if (panelId === 'elevation') el.innerHTML = renderElevation();
    else if (panelId === 'grid') el.innerHTML = renderGrid();
    else if (panelId === 'files') el.innerHTML = renderFiles();
    // After innerHTML, attach event listeners
    if (panelId === 'coordinates') attachCoordinatesEvents(el);
    if (panelId === 'search') attachSearchEvents(el);
    if (panelId === 'elevation') attachElevationEvents(el);
    if (panelId === 'grid') attachGridEvents(el);
    if (panelId === 'style') attachStyleEvents(el);
    if (panelId === 'layers') attachLayersEvents(el);
    if (panelId === 'files') attachFilesEvents(el);
    if (panelId === 'tools') attachToolsEvents(el);
    if (panelId === 'legend') attachLegendEvents(el);
  }

  /* ═══ 7. PANEL CONTENT — MENU (mobile) ══════════════════════════════════════ */
  function renderMenu() {
    const items = [
      { id: 'layers', label: 'Calques', icon: 'M12 3l9 5-9 5-9-5 9-5z M3 13l9 5 9-5 M3 17l9 5 9-5' },
      { id: 'style', label: 'Style', icon: 'M12 3a9 9 0 109 9c0-1.5-1-2.5-2.5-2.5H17c-1.5 0-2.5-1-2.5-2.5S15.5 4.5 14 4.5h-2z' },
      { id: 'measure', label: 'Mesures', icon: 'M16 4l4 4L8 20l-4-4L16 4z' },
      { id: 'tools', label: 'Outils géométriques', icon: 'M14.7 6.3a4 4 0 015.66 5.66L10 22.36l-7.07 1.41 1.41-7.07L14.7 6.3z' },
      { id: 'legend', label: 'Légende', icon: 'M4 6h16M4 12h10M4 18h16' },
      { id: 'coordinates', label: 'Convertir coordonnées', icon: 'M12 2C7 2 4 5.5 4 10c0 5.5 8 12 8 12s8-6.5 8-12c0-4.5-3-8-8-8z' },
      { id: 'search', label: 'Aller à un point', icon: 'M11 4a7 7 0 100 14 7 7 0 000-14z M16 16l5 5' },
      { id: 'elevation', label: 'Profil d\'élévation', icon: 'M3 18l5-9 4 5 4-7 5 11H3z' },
      { id: 'grid', label: 'Grille de coordonnées', icon: 'M3 9h18M3 15h18M9 3v18M15 3v18' },
      { id: 'files', label: 'Importer / Exporter', icon: 'M14 4v5h5 M5 12V6a2 2 0 012-2h7l5 5v7a2 2 0 01-2 2H7a2 2 0 01-2-2v0' },
    ];
    return `<div class="menu-list">
      ${items.map(it => `
        <button class="menu-item" onclick="ui.openSheet('${it.id}')">
          <span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="${it.icon}" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg></span>
          <span>${it.label}</span>
        </button>
      `).join('')}
    </div>`;
  }

  /* ═══ 8. PANEL CONTENT — LAYERS ═════════════════════════════════════════════ */
  function featureRowHtml(f) {
    const sel = state.selectedIds.includes(f.id);
    const metrics = f.metrics.areaSquareMeters !== undefined ? formatArea(f.metrics.areaSquareMeters)
                  : f.metrics.lengthMeters !== undefined ? formatDistance(f.metrics.lengthMeters)
                  : '';
    const derivedKind = f.geojson && f.geojson.properties && f.geojson.properties._derivedKind;
    const derivedLbl = derivedKind === 'buffer' ? 'buffer'
                     : derivedKind === 'intersection' ? 'intersection'
                     : derivedKind === 'contours' ? 'courbes'
                     : derivedKind === 'bornage' ? 'bornage'
                     : null;
    const derivedBadge = derivedLbl
      ? `<span style="display:inline-block; margin-left:6px; padding:1px 6px; background:rgba(251,196,18,0.15); color:#fbc412; font-size:10px; border-radius:8px; vertical-align:middle;">${derivedLbl}</span>`
      : '';
    const eyeIcon = f.style.visible
      ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>`
      : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M2 12s3.5-7 10-7c2.4 0 4.4 1 6 2.2M22 12s-3.5 7-10 7c-2.4 0-4.4-1-6-2.2M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
    // Group assignment dropdown (only meaningful when groups exist).
    const groupOptions = `<option value="">Sans couche</option>` +
      state.groups.map(g => `<option value="${g.id}" ${f.groupId === g.id ? 'selected' : ''}>${escapeHtml(g.name)}</option>`).join('');
    const groupSelect = state.groups.length
      ? `<select class="layer-group-select" data-id="${f.id}" title="Assigner à une couche">${groupOptions}</select>`
      : '';
    return `
      <div class="layer-row${sel ? ' selected' : ''}${f.style.visible ? '' : ' hidden'}" data-id="${f.id}">
        <span class="swatch" style="background:${f.style.fill}"></span>
        <div style="flex:1; min-width:0;">
          <button class="layer-name" data-action="select" data-id="${f.id}" ondblclick="layerStartRename('${f.id}')" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}${derivedBadge}</button>
          ${metrics ? `<div class="layer-metrics">${metrics}</div>` : ''}
          ${groupSelect}
        </div>
        <button class="layer-action" data-action="zoom" data-id="${f.id}" title="Centrer">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2"/><path d="M16 16l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button class="layer-action" data-action="visibility" data-id="${f.id}" title="${f.style.visible ? 'Masquer' : 'Afficher'}">${eyeIcon}</button>
        <button class="layer-action danger" data-action="delete" data-id="${f.id}" title="Supprimer">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>`;
  }

  function groupHeaderHtml(g, feats) {
    const anyVisible = feats.some(f => f.style.visible);
    const caret = g.collapsed
      ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
      : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const eyeIcon = anyVisible
      ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>`
      : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M2 12s3.5-7 10-7c2.4 0 4.4 1 6 2.2M22 12s-3.5 7-10 7c-2.4 0-4.4-1-6-2.2M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
    return `
      <div class="group-header" data-gid="${g.id}">
        <button class="group-caret" data-action="group-collapse" data-gid="${g.id}" title="Plier/déplier">${caret}</button>
        <button class="group-name" data-action="group-collapse" data-gid="${g.id}" ondblclick="groupStartRename('${g.id}')" title="${escapeHtml(g.name)}">${escapeHtml(g.name)} <span style="color:var(--ink-2); font-weight:400;">(${feats.length})</span></button>
        <button class="layer-action" data-action="group-visibility" data-gid="${g.id}" title="${anyVisible ? 'Masquer la couche' : 'Afficher la couche'}">${eyeIcon}</button>
        <button class="layer-action danger" data-action="group-delete" data-gid="${g.id}" title="Supprimer la couche (garde les objets)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>`;
  }

  function renderLayers() {
    if (state.features.length === 0 && state.groups.length === 0) {
      return `<div class="empty-state">Aucun objet sur la carte.<div class="small">Utilisez la barre de dessin en haut à gauche de la carte pour créer.</div></div>`;
    }
    // Partition features into groups + ungrouped.
    const grouped = new Map();
    const ungrouped = [];
    for (const f of state.features) {
      if (f.groupId && state.groups.some(g => g.id === f.groupId)) {
        if (!grouped.has(f.groupId)) grouped.set(f.groupId, []);
        grouped.get(f.groupId).push(f);
      } else {
        ungrouped.push(f);
      }
    }

    const selCount = state.selectedIds.length;
    const header = `
      <div class="row" style="justify-content:space-between; margin-bottom:10px; gap:8px;">
        <span style="font-size:11px; color:var(--ink-2);">${state.features.length} objet${state.features.length > 1 ? 's' : ''} · ${state.groups.length} couche${state.groups.length > 1 ? 's' : ''}</span>
        <button class="btn btn-danger" onclick="layersClearAll()">Tout effacer</button>
      </div>
      <div class="row" style="gap:8px; margin-bottom:12px;">
        <button class="btn btn-ghost" onclick="layerCreateGroup()" style="flex:1;">+ Nouvelle couche</button>
        <button class="btn btn-ghost" onclick="layerGroupSelected()" style="flex:1;" ${selCount ? '' : 'disabled'}>Grouper sélection${selCount ? ' (' + selCount + ')' : ''}</button>
      </div>`;

    let body = '';
    for (const g of state.groups) {
      const feats = grouped.get(g.id) || [];
      body += groupHeaderHtml(g, feats);
      if (!g.collapsed) {
        body += `<div class="stack-tight group-body">${feats.map(featureRowHtml).join('') || '<div class="empty-state" style="padding:8px;">Couche vide — assignez des objets ci-dessous.</div>'}</div>`;
      }
    }
    if (ungrouped.length) {
      if (state.groups.length) {
        body += `<div class="group-header-lite">Sans couche</div>`;
      }
      body += `<div class="stack-tight">${ungrouped.map(featureRowHtml).join('')}</div>`;
    }
    return header + body;
  }

  function attachLayersEvents(root) {
    root.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const action = btn.dataset.action;
        const gid = btn.dataset.gid;
        // Group-level actions
        if (gid) {
          if (action === 'group-collapse') toggleGroupCollapsed(gid);
          else if (action === 'group-visibility') {
            const feats = state.features.filter(f => f.groupId === gid);
            const anyVisible = feats.some(f => f.style.visible);
            setGroupVisibility(gid, !anyVisible);
          } else if (action === 'group-delete') {
            const g = state.groups.find(x => x.id === gid);
            if (!g) return;
            ui.confirm('Supprimer la couche ?', `« ${g.name} » sera supprimée. Les objets qu'elle contient sont conservés (déplacés vers « Sans couche »).`, () => deleteGroup(gid));
          }
          return;
        }
        // Feature-level actions
        const id = btn.dataset.id;
        if (action === 'select') selectFeature(id, { additive: state.multiSelectMode });
        else if (action === 'zoom') zoomToFeature(id);
        else if (action === 'visibility') toggleVisibility(id);
        else if (action === 'delete') {
          const f = state.features.find(x => x.id === id);
          if (!f) return;
          ui.confirm('Supprimer ?', `Supprimer définitivement « ${f.name} » ?`, () => removeFeature(id));
        }
      });
    });
    // Group assignment dropdowns
    root.querySelectorAll('.layer-group-select').forEach(sel => {
      sel.addEventListener('change', () => {
        assignFeatureToGroup(sel.dataset.id, sel.value);
      });
    });
  }

  window.groupStartRename = function (id) {
    const g = state.groups.find(x => x.id === id);
    const header = document.querySelector(`.group-header[data-gid="${id}"]`);
    if (!g || !header) return;
    const btn = header.querySelector('.group-name');
    if (!btn) return;
    const input = document.createElement('input');
    input.value = g.name;
    input.className = 'layer-name editing';
    input.style.font = 'inherit';
    btn.replaceWith(input);
    input.focus(); input.select();
    function commit() {
      const v = input.value.trim();
      if (v && v !== g.name) renameGroup(id, v);
      else ui.render();
    }
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') commit();
      if (e.key === 'Escape') ui.render();
    });
  };

  window.layerStartRename = function (id) {
    const row = document.querySelector(`.layer-row[data-id="${id}"]`);
    if (!row) return;
    const btn = row.querySelector('.layer-name');
    const f = state.features.find(x => x.id === id);
    if (!f || !btn) return;
    const input = document.createElement('input');
    input.value = f.name;
    input.className = 'layer-name editing';
    input.style.font = 'inherit';
    btn.replaceWith(input);
    input.focus(); input.select();
    function commit() {
      const v = input.value.trim();
      if (v && v !== f.name) renameFeature(id, v);
      else ui.render();
    }
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') commit();
      if (e.key === 'Escape') ui.render();
    });
  };

  window.layersClearAll = function () {
    if (state.features.length === 0) return;
    ui.confirm('Tout effacer ?', `Supprimer définitivement les ${state.features.length} objets ?`, clearAllFeatures);
  };

  function zoomToFeature(id) {
    const f = state.features.find(x => x.id === id);
    if (!f) return;
    try {
      const bbox = turf.bbox(f.geojson);
      map.fitBounds([[bbox[0], bbox[1]], [bbox[2], bbox[3]]], { padding: 80, maxZoom: 18, duration: 500 });
    } catch (e) {}
  }

  /* ═══ 9. PANEL CONTENT — STYLE ══════════════════════════════════════════════ */
  function renderStyle() {
    const sel = state.features.filter(f => state.selectedIds.includes(f.id));
    if (sel.length === 0) {
      return `<div class="empty-state">Sélectionnez un ou plusieurs objets sur la carte (tap directement sur l'objet) pour modifier leur style.</div>`;
    }
    const ref = sel[0].style;
    const header = sel.length === 1
      ? `Modification de <strong style="color:var(--brand)">${escapeHtml(sel[0].name)}</strong>`
      : `Modification de <strong style="color:var(--brand)">${sel.length} objets</strong> sélectionnés`;
    return `
      <div style="font-size:13px; color:var(--ink-1); margin-bottom:14px; padding:8px 10px; background:var(--bg-3); border-radius:6px;">${header}</div>
      <div class="stack">
        <div>
          <label class="field-label">Contour</label>
          <div class="color-row">
            <input type="color" id="st-stroke" value="${ref.stroke}" />
            <input type="text" id="st-stroke-hex" class="field" value="${ref.stroke}" />
          </div>
        </div>
        <div>
          <label class="field-label">Épaisseur</label>
          <div class="slider-row">
            <input type="range" id="st-width" min="0.5" max="10" step="0.5" value="${ref.strokeWidth}" />
            <span class="val" id="st-width-val">${ref.strokeWidth.toFixed(1)}</span>
          </div>
        </div>
        <div>
          <label class="field-label">Remplissage</label>
          <div class="color-row">
            <input type="color" id="st-fill" value="${ref.fill}" />
            <input type="text" id="st-fill-hex" class="field" value="${ref.fill}" />
          </div>
        </div>
        <div>
          <label class="field-label">Opacité</label>
          <div class="slider-row">
            <input type="range" id="st-opacity" min="0" max="1" step="0.05" value="${ref.fillOpacity}" />
            <span class="val" id="st-opacity-val">${Math.round(ref.fillOpacity * 100)}%</span>
          </div>
        </div>
        <div>
          <label class="checkbox-row">
            <input type="checkbox" id="st-label" ${ref.showLabel === false ? 'checked' : ''} />
            <span>Masquer l'étiquette</span>
          </label>
        </div>
        <button type="button" class="btn btn-solid" id="st-apply" style="width:100%;">Appliquer</button>
      </div>`;
  }

  function attachStyleEvents(root) {
    const apply = (patch) => {
      state.selectedIds.forEach(id => setStyle(id, patch));
    };
    root.querySelector('#st-stroke')?.addEventListener('input', e => {
      apply({ stroke: e.target.value });
      const hex = root.querySelector('#st-stroke-hex'); if (hex) hex.value = e.target.value;
    });
    root.querySelector('#st-stroke-hex')?.addEventListener('change', e => {
      if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) {
        apply({ stroke: e.target.value });
        const c = root.querySelector('#st-stroke'); if (c) c.value = e.target.value;
      }
    });
    root.querySelector('#st-width')?.addEventListener('input', e => {
      const v = parseFloat(e.target.value);
      apply({ strokeWidth: v });
      root.querySelector('#st-width-val').textContent = v.toFixed(1);
    });
    root.querySelector('#st-fill')?.addEventListener('input', e => {
      apply({ fill: e.target.value });
      const hex = root.querySelector('#st-fill-hex'); if (hex) hex.value = e.target.value;
    });
    root.querySelector('#st-fill-hex')?.addEventListener('change', e => {
      if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) {
        apply({ fill: e.target.value });
        const c = root.querySelector('#st-fill'); if (c) c.value = e.target.value;
      }
    });
    root.querySelector('#st-opacity')?.addEventListener('input', e => {
      const v = parseFloat(e.target.value);
      apply({ fillOpacity: v });
      root.querySelector('#st-opacity-val').textContent = Math.round(v * 100) + '%';
    });
    root.querySelector('#st-label')?.addEventListener('change', e => {
      // Checked = hide label, unchecked = show label.
      apply({ showLabel: !e.target.checked });
      try { if (typeof syncFeaturesToMap === 'function') syncFeaturesToMap(); } catch (_) {}
    });
    root.querySelector('#st-apply')?.addEventListener('click', () => {
      try { if (typeof syncFeaturesToMap === 'function') syncFeaturesToMap(); } catch (_) {}
      try { map.triggerRepaint(); } catch (_) {}
    });
  }

  /* ═══ 10. PANEL CONTENT — MEASURE ═══════════════════════════════════════════ */
  function renderMeasure() {
    const sel = state.features.filter(f => state.selectedIds.includes(f.id));
    if (sel.length === 0) {
      return `<div class="empty-state">Sélectionnez un objet dans le panneau « Calques » pour voir ses mesures.</div>`;
    }
    let totalLen = 0, totalArea = 0;
    const items = sel.map(f => {
      if (f.metrics.lengthMeters) totalLen += f.metrics.lengthMeters;
      if (f.metrics.areaSquareMeters) totalArea += f.metrics.areaSquareMeters;
      return `
        <div class="surface" style="margin-bottom:8px;">
          <div style="font-weight:500; margin-bottom:6px;">${escapeHtml(f.name)}</div>
          <div style="font-family:'JetBrains Mono',ui-monospace,monospace; font-size:12px; color:var(--ink-1);">
            ${f.metrics.lengthMeters !== undefined ? `<div><span style="color:var(--ink-2)">Longueur :</span> ${formatDistance(f.metrics.lengthMeters)}</div>` : ''}
            ${f.metrics.areaSquareMeters !== undefined ? `<div><span style="color:var(--ink-2)">Surface  :</span> ${formatArea(f.metrics.areaSquareMeters)}</div>` : ''}
          </div>
        </div>`;
    }).join('');
    let total = '';
    if (sel.length > 1 && (totalLen > 0 || totalArea > 0)) {
      total = `
        <div class="surface" style="background:rgba(58,160,255,0.05); border-color:rgba(58,160,255,0.3); margin-top:12px;">
          <div class="field-label" style="margin-bottom:4px;">Total</div>
          <div style="font-family:'JetBrains Mono',ui-monospace,monospace; font-size:13px;">
            ${totalLen > 0 ? `<div><span style="color:var(--ink-2)">Longueur :</span> ${formatDistance(totalLen)}</div>` : ''}
            ${totalArea > 0 ? `<div><span style="color:var(--ink-2)">Surface  :</span> ${formatArea(totalArea)}</div>` : ''}
          </div>
        </div>`;
    }
    return items + total;
  }

  /* ═══ 10b. PANEL CONTENT — TOOLS (buffer, intersection) ═════════════════════ */
  function renderTools() {
    const sel = state.features.filter(f => state.selectedIds.includes(f.id));
    const polys = sel.filter(f => ['polygon', 'rectangle', 'circle'].includes(f.kind));
    return `
      <div class="stack">

          </p>
          <label class="field-label" style="font-size:11px;">Système de coordonnées</label>
          <select id="bn-crs" class="field" style="margin-bottom:8px;">

            <div style="flex:1;">
              <label class="field-label" style="font-size:11px;" id="bn-y-label">Latitude</label>
              <input type="text" id="bn-y" class="field" inputmode="decimal" autocapitalize="off" autocorrect="off"
                     style="font-family:'JetBrains Mono',ui-monospace,monospace;" />
            </div>
            <button class="btn btn-solid" id="bn-add" style="white-space:nowrap;">+ Point</button>
          </div>
          <div id="bn-msg" style="font-size:12px; margin-top:8px;"></div>
          <div style="margin-top:10px;">

            <p style="font-size:11px; color:var(--ink-2); margin:4px 0 8px;">
              Table avec colonnes <strong>borne</strong>, <strong>X</strong>, <strong>Y</strong> (séparateur virgule, point-virgule ou tabulation).
            </p>
            <input type="file" id="bn-file" accept=".csv,.txt,.tsv,text/csv,text/plain" style="display:none;" />
            <button class="btn btn-subtle" id="bn-import" style="width:100%;">Choisir un fichier…</button>

        </div>

        <!-- ─── Buffer tool ──────────────────────────────────────────── -->
        <div class="surface">
          <div class="field-label" style="margin-bottom:6px;">Buffer (zone tampon)</div>
          <p style="font-size:12px; color:var(--ink-1); margin:0 0 10px;">
            Crée un nouvel objet polygonal à une distance donnée autour d'un objet sélectionné.
            ${sel.length === 0 ? '<br><strong>Sélectionnez un objet pour commencer.</strong>' : ''}

          </p>

              <label class="field-label" style="font-size:11px;">Rayon (mètres)</label>

                     value="50" style="font-family:'JetBrains Mono',ui-monospace,monospace;" />

                    style="white-space:nowrap;">Appliquer</button>
