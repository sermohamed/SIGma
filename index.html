        try { td2.setModeStyles('rectangle',  polyStyles); } catch (e) { log.warn('setModeStyles rectangle failed', e); }
        try { td2.setModeStyles('circle',     polyStyles); } catch (e) { log.warn('setModeStyles circle failed', e); }
        try { td2.setModeStyles('point',      pointStyles); } catch (e) { log.warn('setModeStyles point failed', e); }
        log.info('[HydraulicGIS] per-feature style resolvers installed.');
      }
      installPerFeatureStyles();

      // Force terra-draw to re-evaluate styles. There is no public refresh
      // method, but mutating the feature's properties through the public
      // `addFeatures`/`removeFeatures` API would lose the terraId. The
      // simplest reliable trigger is a no-op map.triggerRepaint AFTER any
      // store change — terra-draw re-reads styleFeature on each render.
      function refreshTerraDrawStyles() {
        try { map.triggerRepaint(); } catch (_) {}
      }
      // Hook the style refresh into our store. We do this by replacing
      // setStyle to also trigger a terra-draw repaint.
      const _origSetStyle = setStyle;
      setStyle = function (id, patch) {
        _origSetStyle(id, patch);
        refreshTerraDrawStyles();
      };


      // ─── Bug workaround: wrapper disables Select/Delete during selection ───
      // The wrapper's toggleButtonsWhenNoFeature() calls getFeatures(false),
      // which EXCLUDES features whose `properties.mode === "select"`. When the
      // user enters select mode and the feature is being dragged/edited, its
      // mode is temporarily 'select', so the count drops to 0 and the buttons
      // disable mid-action. We replace the function with one that counts ALL
      // features (including those currently in select mode).
      try {
        if (typeof drawControl.toggleButtonsWhenNoFeature === 'function') {
          drawControl.toggleButtonsWhenNoFeature = function () {
            if (!this.controlContainer) return;
            const td2 = this.terradraw || (this.getTerraDrawInstance && this.getTerraDrawInstance());
            if (!td2 || typeof td2.getSnapshot !== 'function') return;
            const all = td2.getSnapshot() || [];
            const hasFeature = all.length > 0;  // count ALL features, no mode filter
            const ids = ['maplibregl-terradraw-add-select-button',
                         'maplibregl-terradraw-download-button',
                         'maplibregl-terradraw-delete-selection-button'];
            for (const cls of ids) {
              const els = this.controlContainer.getElementsByClassName(cls);
              for (let i = 0; i < els.length; i++) {
                const el = els.item(i);
                if (el) el.disabled = !hasFeature;
              }
            }
          };
          log.info('[HydraulicGIS] Select/Delete enable logic patched.');
        }
      } catch (err) {
        log.warn('[HydraulicGIS] could not patch toggleButtonsWhenNoFeature:', err);
      }

      // Subscribe to terra-draw events. We keep our store in sync with what
      // terra-draw has, but TERRA-DRAW IS THE SOLE RENDERER for drawn shapes.
      // No filtering, no opacity tricks, no double-rendering. The user always
      // sees terra-draw's version (in-progress AND finished alike).

      // Boost the size of terra-draw's in-progress vertex circles so they're
      // clearly visible on mobile (default is 6px — tiny under a finger).
      // Apply only to the point radius — keep terra-draw's own colors.
      // We re-apply on every styledata event since the layers may not exist
      // yet when this runs the first time.
      // ─── First-vertex overlay layer ────────────────────────────────────
      //
      // ROOT CAUSE OF THE "FIRST POINT INVISIBLE ON MOBILE" BUG (verified by
      // reading the bundled terra-draw UMD source):
      //
      //   • LineString mode: at the first tap, terra-draw calls createLine()
      //     which creates a LineString with TWO IDENTICAL coordinates
      //     [[lng,lat],[lng,lat]] — a zero-length line. On desktop the very
      //     next mousemove stretches it toward the cursor (visible).
      //     On mobile (no hover events between taps) it stays degenerate
      //     and renders as nothing. No vertex Point is created until the
      //     SECOND tap (firstUpdateToLine creates the closingPointId).
      //
      //   • Polygon mode: same pattern — at the first tap, terra-draw creates
      //     a Polygon with FOUR identical coordinates (zero-area polygon),
      //     invisible. The vertex Point is only added at the third tap.
      //
      // This is exactly the bug tracked in GitHub terra-draw #784 and #510.
      // No amount of triggerRepaint / resize / styling fixes it because
      // there is genuinely no visible feature to render.
      //
      // FIX: maintain our own dedicated MapLibre layer that shows a single
      // marker at the first-tap location while terra-draw's geometry is
      // still degenerate. We add the marker as soon as we detect the
      // degenerate state, and remove it as soon as terra-draw creates its
      // own vertex (closing-point) feature.
      const FIRST_VTX_SRC = '_hgis_first_vertex';
      const FIRST_VTX_LYR = '_hgis_first_vertex_layer';
      function ensureFirstVertexLayer() {
        try {
          if (!map.getSource(FIRST_VTX_SRC)) {
            map.addSource(FIRST_VTX_SRC, {
              type: 'geojson',
              data: { type: 'FeatureCollection', features: [] }
            });
          }
          if (!map.getLayer(FIRST_VTX_LYR)) {
            map.addLayer({
              id: FIRST_VTX_LYR,
              source: FIRST_VTX_SRC,
              type: 'circle',
              paint: {
                'circle-radius': 7,
                'circle-color': '#3f97e0',
                'circle-stroke-color': '#ffffff',
                'circle-stroke-width': 2
              }
            });
          }
        } catch (_) {}
      }
      function setFirstVertex(coord) {
        ensureFirstVertexLayer();
        try {
          const src = map.getSource(FIRST_VTX_SRC);
          if (!src) return;
          src.setData({
            type: 'FeatureCollection',
            features: coord ? [{
              type: 'Feature',
              geometry: { type: 'Point', coordinates: coord },
              properties: {}
            }] : []
          });
        } catch (_) {}
      }
      function clearFirstVertex() { setFirstVertex(null); }
      // Re-add layer after basemap style swaps (style swap drops custom layers).
      map.on('styledata', () => {
        // If the layer was lost in the swap and we had a vertex showing,
        // re-create it (data is already in our source if we cached it,
        // but simpler: just ensure the layer exists for next use).
        ensureFirstVertexLayer();
      });

      // Boost vertex point size. Layers are 'td-point', 'td-linestring',
      // 'td-polygon', 'td-polygon-outline' (confirmed from the bundled UMD).
      // The default circle-radius reads ["get","pointWidth"] from properties,
      // so a constant override here is fine.
      function boostTerraDrawPointSize() {
        try {
          if (map.getLayer('td-point')) {
            map.setPaintProperty('td-point', 'circle-radius', 8);
          }
        } catch (_) {}
      }
      map.on('styledata', () => requestAnimationFrame(boostTerraDrawPointSize));

      // Detect degenerate first-tap geometry from a terra-draw snapshot.
      // Returns the coordinate to mark, or null if no degenerate feature is
      // found (i.e. drawing has progressed past the first tap, or no draw
      // is in progress).
      function detectFirstVertexCoord(snapshot) {
        if (!snapshot || !snapshot.length) return null;
        for (const f of snapshot) {
          if (!f || !f.geometry || !f.properties) continue;
          const mode = f.properties.mode;
          const g = f.geometry;
          // Linestring degenerate: 2 coords, both identical
          if (mode === 'linestring' && g.type === 'LineString'
              && g.coordinates && g.coordinates.length === 2) {
            const a = g.coordinates[0], b = g.coordinates[1];
            if (a && b && a[0] === b[0] && a[1] === b[1]) return a;
          }
          // Polygon degenerate: ring of 4 coords all identical
          if (mode === 'polygon' && g.type === 'Polygon'
              && g.coordinates && g.coordinates[0]
              && g.coordinates[0].length === 4) {
            const ring = g.coordinates[0];
            const a = ring[0];
            if (a && ring.every(p => p && p[0] === a[0] && p[1] === a[1])) {
              return a;
            }
          }
          // Rectangle degenerate: same as polygon — ring of 4 identical coords
          if (mode === 'rectangle' && g.type === 'Polygon'
              && g.coordinates && g.coordinates[0]
              && g.coordinates[0].length === 4) {
            const ring = g.coordinates[0];
            const a = ring[0];
            if (a && ring.every(p => p && p[0] === a[0] && p[1] === a[1])) {
              return a;
            }
          }
          // Circle: terra-draw creates a circle of radius startingRadius
          // (default 1e-5 km = 1 cm) at the first tap, which is invisible at
          // any practical zoom. We detect it by checking that the polygon
          // bounding box is essentially zero in degrees of arc (< 1e-5).
          if (mode === 'circle' && g.type === 'Polygon'
              && g.coordinates && g.coordinates[0]
              && g.coordinates[0].length > 2) {
            const ring = g.coordinates[0];
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            for (const p of ring) {
              if (!p) continue;
              if (p[0] < minX) minX = p[0]; if (p[0] > maxX) maxX = p[0];
              if (p[1] < minY) minY = p[1]; if (p[1] > maxY) maxY = p[1];
            }
            // A circle smaller than ~1 metre across is the degenerate starting
            // circle, not a user-sized one. (~1e-5 deg ≈ 1.1 m at the equator.)
            if (maxX - minX < 1e-4 && maxY - minY < 1e-4) {
              return [(minX + maxX) / 2, (minY + maxY) / 2];
            }
          }
        }
        return null;
      }

      // ─── Rectangle/Circle 2nd-tap fix on mobile ────────────────────────
      //
      // Background: terra-draw's rectangle and circle modes both close the
      // shape on the second click but only stretch the geometry to the tap
      // location IF onMouseMove() was called between the two taps. On a
      // touch device there is no hover event between two taps, so the second
      // tap closes the shape with a degenerate (1cm) geometry — unusable.
      //
      // Fix: register a capture-phase pointerdown listener on the map canvas
      // that fires BEFORE terra-draw's own pointerdown handler. When a draw
      // is already in progress in rectangle/circle mode, we synthesise the
      // missing onMouseMove call by invoking td._mode.onMouseMove() with a
      // freshly-built draw event at the tap location. This convinces the
      // mode that the cursor moved to the tap point, so when terra-draw then
      // processes the click, the shape is closed at the correct geometry.
      //
      // We use private API (td._mode) because there is no public equivalent
      // in this version of the wrapper. If the bundle is upgraded and the
      // private field is renamed, the try/catch keeps things safe — worst
      // case the bug returns, but nothing crashes.
      function isDrawInProgress(modeName) {
        try {
          const snap = td.getSnapshot ? td.getSnapshot() : [];
          return snap.some(f => f && f.properties && f.properties.mode === modeName);
        } catch (_) { return false; }
      }
      function buildDrawEvent(lngLat, point) {
        return {
          lng: lngLat.lng,
          lat: lngLat.lat,
          containerX: point.x,
          containerY: point.y,
          button: 'left',
          heldKeys: []
        };
      }
      function injectSyntheticMouseMove(lngLat, point) {
        try {
          if (!td || !td._mode || typeof td._mode.onMouseMove !== 'function') return;
          const evt = buildDrawEvent(lngLat, point);
          td._mode.onMouseMove(evt);
        } catch (err) {
          log.warn('[HydraulicGIS] synthetic onMouseMove failed (private API):', err);
        }
      }
      // Use map.on('click', ...) — fires AFTER MapLibre internal handling but
      // BEFORE the user actually sees the result, and we can call onMouseMove
      // synchronously before terra-draw's click handler runs through its own
      // path. However terra-draw listens to pointerdown directly on the canvas,
      // so map.on('click') is too late. We instead use a capture-phase
      // pointerdown on the canvas itself.
      const mapCanvas = map.getCanvas();
      mapCanvas.addEventListener('pointerdown', (ev) => {
        try {
          if (!ev.isPrimary) return;
          const mode = td && td.getMode && td.getMode();
          if (mode !== 'rectangle' && mode !== 'circle') return;
          if (!isDrawInProgress(mode)) return;  // 1st tap → let terra-draw create
          // 2nd tap during rectangle/circle: inject the missing pointermove.
          const rect = mapCanvas.getBoundingClientRect();
          const cx = ev.clientX - rect.left;
          const cy = ev.clientY - rect.top;
          const lngLat = map.unproject([cx, cy]);
          injectSyntheticMouseMove(lngLat, { x: cx, y: cy });
        } catch (_) {}
      }, true);  // capture phase — runs BEFORE terra-draw's own listener

      const td = drawControl.getTerraDrawInstance && drawControl.getTerraDrawInstance();
      if (td && typeof td.on === 'function') {

        td.on('change', (ids, type) => {
          // Re-apply vertex size boost on every change — td-point may have
          // just been created by terra-draw's lazy layer-add.
          boostTerraDrawPointSize();

          // ── Mobile first-vertex overlay logic ──
          // Inspect terra-draw's snapshot. If a degenerate (zero-size)
          // linestring/polygon is in progress, show our overlay marker.
          // Once the user taps a second time, terra-draw's own vertex point
          // appears in the snapshot → we remove our overlay.
          try {
            const snap = td.getSnapshot ? td.getSnapshot() : [];
            const firstVtx = detectFirstVertexCoord(snap);
            if (firstVtx) {
              setFirstVertex(firstVtx);
            } else {
              clearFirstVertex();
            }
          } catch (_) { clearFirstVertex(); }

          // Defensive repaint cascade (kept from previous attempt — harmless
          // and helps in tab-throttling scenarios on iOS Safari).
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              try { map.triggerRepaint(); } catch (_) {}
              boostTerraDrawPointSize();
            });
          });
          setTimeout(() => { try { map.triggerRepaint(); } catch (_) {} }, 50);

          try { drawControl.toggleButtonsWhenNoFeature(); } catch (_) {}
          updateHud(`change ${type} (${ids ? ids.length : 0})`);
        });

        // When a draw finishes, copy the feature into our store for the
        // Calques panel, exports, measurements. The map already shows it
        // because terra-draw still owns the rendering.
        td.on('finish', (id, ctx) => {
          // Clear the first-vertex overlay marker — terra-draw now owns the
          // visible feature (it has its own vertex points after the 2nd tap).
          clearFirstVertex();
          try {
            log.info('[HydraulicGIS] terra-draw finish:', id, 'action=' + (ctx && ctx.action));
            // CRITICAL: terra-draw fires 'finish' for several actions, not
            // just the initial draw:
            //   • action: "draw"               — initial creation (create our row)
            //   • action: "dragCoordinate"     — vertex was moved (geometry changed)
            //   • action: "dragFeature"        — whole shape was moved
            //   • action: "dragCoordinateResize" — rectangle/circle was resized
            // Without this guard we were creating a NEW row every edit,
            // producing duplicate labels and re-opening the rename prompt.
            // For non-draw actions we just sync the geometry of the
            // already-existing row.
            const action = ctx && ctx.action;
            const snap = td.getSnapshot();
            const f = snap.find(x => x.id === id);
            if (!f) return;

            // Check if we already have a row for this terra-draw feature.
            const existing = state.features.find(x =>
              x.geojson && x.geojson.properties && x.geojson.properties._terraId === id);

            if (existing) {
              // Edit — sync geometry, recompute metrics, do NOT prompt for name.
              existing.geojson.geometry = f.geometry;
              existing.metrics = computeMetrics(existing.geojson, existing.kind);
              existing.updatedAt = Date.now();
              notifyFeatures();
              try { map.triggerRepaint(); } catch (_) {}
              log.info('[HydraulicGIS] synced geometry for existing feature', existing.id, 'on action=' + action);
              return;
            }

            // No existing row → genuine new feature. Only treat as creation
            // when the action says so (defensive — falls through to creation
            // also when action is undefined, e.g. older terra-draw bundles).
            if (action && action !== 'draw') {
              log.warn('[HydraulicGIS] finish with action=' + action + ' but no matching row — creating row anyway');
            }
            const mode = (f.properties && f.properties.mode) || (ctx && ctx.mode) || '';
            const kind = kindFromGeom(f.geometry, mode);
            const newF = addFeature({ type: 'Feature', geometry: f.geometry, properties: { _terraId: id } }, kind);
            log.info('[HydraulicGIS] added feature', newF.id, 'kind=' + kind);
            try {
              if (typeof drawControl.toggleButtonsWhenNoFeature === 'function') {
                drawControl.toggleButtonsWhenNoFeature();
              }
            } catch (_) {}
            try { map.triggerRepaint(); } catch (_) {}
            // CRITICAL: reset to 'static' so the NEXT map tap goes through
            // our map.on('click') handler (which does tap-select). Without
            // this, terra-draw stays in its draw mode and intercepts taps
            // as new vertices instead of letting us select.
            try {
              if (td && typeof td.setMode === 'function') td.setMode('static');
            } catch (_) {}
            // Open the rename prompt — let the user accept the default or
            // type a custom name. The modal is non-blocking; if the user
            // dismisses it the default name remains.
            promptFeatureName(newF.id);
          } catch (err) {
            log.error('[HydraulicGIS] error in finish handler:', err);
          }
        });

        // Sync deletes (Delete / Delete-Selection buttons in the toolbar)
        // and edits (Select-mode vertex drags) back into our store.
        td.on('change', (ids, type) => {
          if (type === 'delete') {
            const banTerraIds = new Set(ids);
            const toRemove = state.features
              .filter(f => f.geojson.properties && banTerraIds.has(f.geojson.properties._terraId))
              .map(f => f.id);
            if (toRemove.length) {
              log.info('[HydraulicGIS] removing', toRemove.length, 'feature(s) deleted in terra-draw');
              toRemove.forEach(removeFeature);
            }
          } else if (type === 'update') {
            const snap = td.getSnapshot();
            let touched = 0;
            for (const tid of ids) {
              const tf = snap.find(x => x.id === tid);
              if (!tf) continue;
              const ours = state.features.find(f => f.geojson.properties && f.geojson.properties._terraId === tid);
              if (!ours) continue;
              ours.geojson.geometry = tf.geometry;
              ours.metrics = computeMetrics({ type: 'Feature', geometry: tf.geometry }, ours.kind);
              ours.updatedAt = Date.now();
              touched++;
            }
            if (touched) {
              log.info('[HydraulicGIS] updated', touched, 'feature(s) edited in terra-draw');
              // Full refresh: re-sync map (labels follow geometry), re-render
              // panels (Mesures shows new lengths/areas), update selection
              // halo. The old code only called notifyUi() which left the
              // labels and metrics stale until the user refreshed the page.
              notifyFeatures();
            }
          }
        });

        // ─── Auto-select our store row when user picks on the map ────────
        // Two paths: (a) terra-draw 'select' event (when in Select mode and
        // user taps a feature) and (b) a regular map click that hit-tests
        // the td-* layers (so the user gets selection even outside Select
        // mode). Both update state.selectedIds so the Style/Measure/etc.
        // panels become useful immediately without a detour through the
        // Calques panel.
        // ─── Selection model ─────────────────────────────────────────
        // Per user spec:
        //   - Tap on a feature on the map → select (halo only, no edit).
        //   - Multi-select toggle ON → tap adds/removes from selection.
        //   - Edit button → terra-draw enters select mode for ONE selected feature.
        //   - Delete button → removes all selectedIds.
        //   - Tapping where multiple features overlap → cycles through them on
        //     successive taps (so you can reach features hidden under others).
        //
        // The 'select' event from terra-draw still fires when the user is in
        // edit mode; we let that pass through but don't change selectedIds
        // because the selection there is just the editing target.
        if (typeof td.on === 'function') {
          td.on('select', () => { /* edit mode internal — ignore */ });
          td.on('deselect', () => { /* edit mode internal — ignore */ });
        }

        // Track the last hit position + the "cycle index" so successive taps
        // at the SAME point cycle through stacked features. We reset the
        // cycle when the user taps a different location (>10 px away).
        let lastTapPx = null;
        let lastTapStackIds = [];
        let lastTapCycleIdx = 0;

        map.on('click', (e) => {
          try {
            // Get current terra-draw mode safely. If anything throws or
            // returns nothing, treat it as 'static' (i.e. allow tap-select).
            let mode = 'static';
            try {
              if (td && typeof td.getMode === 'function') {
                const m = td.getMode();
                if (m) mode = m;
              }
            } catch (_) {}
            // Only block tap-select when an active drawing mode is in use.
            const drawingModes = ['point', 'linestring', 'polygon', 'rectangle', 'circle', 'freehand'];
            if (drawingModes.includes(mode)) {
              log.info('[HydraulicGIS] click ignored: drawing mode =', mode);
              return;
            }

            // Hit-test all our renderable feature layers, including derived
            // ones, so a buffer/intersection can also be selected.
            const layers = ['td-point', 'td-linestring', 'td-polygon',
                            'app-derived-point', 'app-derived-line', 'app-derived-fill']
              .filter(id => map.getLayer(id));
            log.info('[HydraulicGIS] click at', e.point, 'mode=', mode, 'layers=', layers);
            if (layers.length === 0) {
              log.warn('[HydraulicGIS] click: no hit-test layers present');
              return;
            }
            const hits = map.queryRenderedFeatures(e.point, { layers });
            log.info('[HydraulicGIS] click hits =', hits ? hits.length : 0);

            // Resolve hits to OUR feature ids (deduplicated).
            const ourIds = [];
            for (const hit of (hits || [])) {
              // From td layers, the rendered feature.id IS the terra-draw id
              // we stored as _terraId. From app-derived layers, the rendered
              // feature has properties.id = our feature id.
              const tid = hit.id;
              const propId = hit.properties && hit.properties.id;
              const ours = state.features.find(f =>
                (tid && f.geojson && f.geojson.properties && f.geojson.properties._terraId === tid)
                || (propId && f.id === propId));
              if (ours && !ourIds.includes(ours.id)) ourIds.push(ours.id);
            }

            if (ourIds.length === 0) {
              // Tap on empty space → clear selection (single mode only)
              if (!state.multiSelectMode && state.selectedIds.length > 0) {
                state.selectedIds = [];
                notifyUi();
                lastTapPx = null;
              }
              return;
            }

            // Cycle-through-stacked-features logic. If the user taps at
            // (almost) the same spot as last time AND the same set of
            // features is hit, advance the cycle index.
            const curPx = [e.point.x, e.point.y];
            const samePlace = lastTapPx
              && Math.abs(lastTapPx[0] - curPx[0]) < 10
              && Math.abs(lastTapPx[1] - curPx[1]) < 10
              && lastTapStackIds.length === ourIds.length
              && lastTapStackIds.every((id, i) => id === ourIds[i]);
            if (!samePlace) {
              lastTapPx = curPx;
              lastTapStackIds = ourIds.slice();
              lastTapCycleIdx = 0;
            } else {
              lastTapCycleIdx = (lastTapCycleIdx + 1) % ourIds.length;
            }
            const pickedId = ourIds[lastTapCycleIdx];

            if (state.multiSelectMode) {
              const idx = state.selectedIds.indexOf(pickedId);
              if (idx === -1) state.selectedIds = [...state.selectedIds, pickedId];
              else state.selectedIds = state.selectedIds.filter(id => id !== pickedId);
            } else {
              state.selectedIds = [pickedId];
            }
            notifyUi();
            log.info('[HydraulicGIS] tap-selected:', pickedId, 'multi=' + state.multiSelectMode,
                     'stack=' + ourIds.length, 'cycleIdx=' + lastTapCycleIdx);
          } catch (err) { log.warn('[HydraulicGIS] tap-select failed:', err); }
        });
      } else {
        log.warn('[HydraulicGIS] td.on is not a function — events disabled.');
      }

      // Disable doubleClickZoom while in any draw mode — otherwise the second
      // tap of click-move rectangle/circle drawing also triggers zoom-in.
      function syncGesturesToMode() {
        try {
          const mode = td && typeof td.getMode === 'function' ? td.getMode() : 'static';
          const isDrawing = mode && mode !== 'static' && mode !== 'select';
          setDoubleClickZoom(!isDrawing);
          // If we leave linestring/polygon mid-draw, clear the overlay marker.
          if (mode !== 'linestring' && mode !== 'polygon'
              && mode !== 'rectangle' && mode !== 'circle') {
            clearFirstVertex();
          }
        } catch (_) {}
      }
      if (typeof drawControl.on === 'function') {
        try { drawControl.on('mode-changed', syncGesturesToMode); }
        catch (_) {}
      }
      if (td && typeof td.on === 'function') {
        td.on('change', syncGesturesToMode);
      }
      syncGesturesToMode();
    } catch (e) {
      log.error('[HydraulicGIS] Échec d\'initialisation de terra-draw :', e);
      drawControl = null;
    }
  }

  function setBasemap(id) {
    if (state.basemap === id) return;
    state.basemap = id;
    try { localStorage.setItem('hydraulic-gis:basemap', id); } catch (e) {}

    // Snapshot terra-draw's features before the style swap so we can
    // re-add them after — setStyle() wipes all sources/layers, including
    // terra-draw's, which would make the user's drawings disappear.
    let tdSnapshot = [];
    try {
      const td = drawControl && drawControl.getTerraDrawInstance && drawControl.getTerraDrawInstance();
      if (td && typeof td.getSnapshot === 'function') {
        tdSnapshot = td.getSnapshot() || [];
      }
    } catch (_) {}

    map.setStyle(BASEMAPS[id]);
    map.once('idle', () => {
      installAppLayers();
      syncFeaturesToMap();
      updateGrid();
      // Re-inject terra-draw's features. The wrapper itself doesn't
      // re-add them automatically after setStyle.
      try {
        const td = drawControl && drawControl.getTerraDrawInstance && drawControl.getTerraDrawInstance();
        if (td && tdSnapshot.length && typeof td.addFeatures === 'function') {
          td.addFeatures(tdSnapshot);
        }
      } catch (err) { log.warn('[HydraulicGIS] re-adding td features after basemap change failed:', err); }
    });

    document.querySelectorAll('.basemap-btn[data-basemap]').forEach(b => {
      b.classList.toggle('active', b.dataset.basemap === id);
    });
  }

  map.once('load', () => {
    installAppLayers();
    installDrawControl();
    syncFeaturesToMap();
    updateGrid(); // initial grid state

    // Push any features loaded from localStorage into terra-draw so they
    // render on the map (terra-draw is the renderer; without this, saved
    // features would only appear in the Calques panel, not on the map).
    try {
      const td = drawControl && drawControl.getTerraDrawInstance && drawControl.getTerraDrawInstance();
      if (td && state.features.length && typeof td.addFeatures === 'function') {
        const tdFeatures = state.features
          .filter(f => f.geojson && f.geojson.geometry)
          .map(f => {
            // terra-draw needs a stable id. Either use existing _terraId,
            // or assign a fresh one and link it back.
            let tid = f.geojson.properties && f.geojson.properties._terraId;
            if (!tid) {
              tid = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'restored-' + f.id;
              f.geojson.properties = { ...(f.geojson.properties || {}), _terraId: tid };
            }
            // Each terra-draw feature needs a `mode` property so it knows
            // which mode owns it (for select/edit/delete).
            const tdMode = ({ point: 'point', line: 'linestring', polygon: 'polygon',
                              rectangle: 'rectangle', circle: 'circle', freehand: 'freehand' })[f.kind] || 'polygon';
            return {
              id: tid,
              type: 'Feature',
              geometry: f.geojson.geometry,
              properties: { ...(f.geojson.properties || {}), mode: tdMode },
            };
          });
        if (tdFeatures.length) {
          td.addFeatures(tdFeatures);
          log.info('[HydraulicGIS] restored', tdFeatures.length, 'feature(s) into terra-draw');
        }
      }
    } catch (err) {
      log.warn('[HydraulicGIS] restoring features into terra-draw failed:', err);
    }
  });
  onFeatures(syncFeaturesToMap);

  // Refresh grid (and any other view-bound layers) when the map moves.
  // Live grid update: listen to 'move' (fires continuously during pan/zoom,
  // including pinch-zoom on touch) instead of 'moveend' so the grid stays
  // glued to the current viewport. Throttled via rAF so we never run more
  // than once per frame, keeping perf smooth on mobile.
  let _gridUpdateRafQueued = false;
  function scheduleGridUpdate() {
    if (!gridState.enabled) return;
    if (_gridUpdateRafQueued) return;
    _gridUpdateRafQueued = true;
    requestAnimationFrame(() => {
      _gridUpdateRafQueued = false;
      try { updateGrid(); } catch (_) {}
    });
  }
  map.on('move', scheduleGridUpdate);
  map.on('zoom', scheduleGridUpdate);
  // Final precise update at the end of the gesture in case rAFs were
  // throttled (low-power mode) and the live updates were stale.
  map.on('moveend', () => { if (gridState.enabled) updateGrid(); });
  map.on('zoomend', () => { if (gridState.enabled) updateGrid(); });

  /* ═══ 6. UI / PANELS ════════════════════════════════════════════════════════ */
  const ui = window.ui = {
    isMobile() {
      return window.matchMedia('(max-width: 1024px)').matches
          || (window.matchMedia('(pointer: coarse)').matches && window.innerWidth <= 1280);
    },
    setPanel(id) {
      if (state.activePanel === id) {
        state.activePanel = null;
      } else {
        state.activePanel = id;
      }
      this.render();
    },
    openMenu() {
      this.openSheet('menu');
    },
    openSheet(panelId) {
      state.activePanel = panelId;
      this.render();
      document.getElementById('scrim').classList.add('visible');
      document.getElementById('sheet').classList.add('visible');
    },
    closeSheet() {
      state.activePanel = null;
      document.getElementById('scrim').classList.remove('visible');
      document.getElementById('sheet').classList.remove('visible');
      this.render();
    },
    confirm(title, msg, onOk) {
      document.getElementById('confirm-title').textContent = title;
      document.getElementById('confirm-msg').textContent = msg;
      const okBtn = document.getElementById('confirm-ok');
      okBtn.onclick = () => { this.closeConfirm(); onOk(); };
      document.getElementById('confirm-bg').classList.add('visible');
    },
    closeConfirm() {
      document.getElementById('confirm-bg').classList.remove('visible');
    },
    prompt(title, msg, defaultValue, onOk) {
      document.getElementById('prompt-title').textContent = title;
      document.getElementById('prompt-msg').textContent = msg;
      const input = document.getElementById('prompt-input');
      input.value = defaultValue || '';
      const okBtn = document.getElementById('prompt-ok');
      const onSubmit = () => {
        const v = input.value.trim();
        this.closePrompt();
        if (typeof onOk === 'function') onOk(v);
      };
      okBtn.onclick = onSubmit;
      input.onkeydown = (e) => {
        if (e.key === 'Enter') { e.preventDefault(); onSubmit(); }
        else if (e.key === 'Escape') { this.closePrompt(); }
      };
      document.getElementById('prompt-bg').classList.add('visible');
      // Defer focus + select-all so iOS shows the keyboard
      setTimeout(() => { input.focus(); input.select(); }, 50);
    },
    closePrompt() {
      document.getElementById('prompt-bg').classList.remove('visible');
      const input = document.getElementById('prompt-input');
      if (input) input.onkeydown = null;
    },
    render() {
      // Update rail
      document.querySelectorAll('.rail-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.panel === state.activePanel);
      });

      // Layer count badge
      const count = state.features.length;
      const railBadge = document.getElementById('rail-badge-layers');
      const fabBadge = document.getElementById('fab-badge');
      if (count > 0) {
        railBadge.textContent = count; railBadge.style.display = 'flex';
        fabBadge.textContent = count; fabBadge.classList.add('visible');
      } else {
        railBadge.style.display = 'none';
        fabBadge.classList.remove('visible');
      }

      // If the user is actively typing in a TEXT input INSIDE the panel,
      // skip the panel innerHTML rewrite — it would destroy the focused
      // element mid-typing. For slider/color inputs (range, color), we
      // also skip while they're being dragged because the next mousemove
      // would land on the new (replaced) DOM and lose the gesture.
      // For all other cases (e.g. selection change while no input is
      // focused), we DO re-render so the panel reflects the new selection.
      const panelEl = document.getElementById('panel-body');
      const sheetEl = document.getElementById('sheet-body');
      const af = document.activeElement;
      const isLiveInput = af && /^(INPUT|SELECT|TEXTAREA)$/.test(af.tagName)
        && !af.matches('[type="checkbox"], [type="radio"]'); // checkboxes are fine to re-render
      const skipPanelBody = panelEl && af && panelEl.contains(af) && isLiveInput;
      const skipSheetBody = sheetEl && af && sheetEl.contains(af) && isLiveInput;

      // Render desktop panel
      if (this.isMobile()) {
        document.getElementById('sidebar-panel').classList.remove('visible');
      } else {
        if (state.activePanel && state.activePanel !== 'menu') {
          document.getElementById('sidebar-panel').classList.add('visible');
          document.getElementById('panel-title').textContent = PANEL_TITLES[state.activePanel] || '';
          if (!skipPanelBody) renderPanel('panel-body', state.activePanel);
        } else {
          document.getElementById('sidebar-panel').classList.remove('visible');
        }
      }

      // Render mobile sheet
      if (state.activePanel) {
        const t = state.activePanel === 'menu' ? 'Outils' : (PANEL_TITLES[state.activePanel] || '');
        document.getElementById('sheet-title').textContent = t;
        if (!skipSheetBody) renderPanel('sheet-body', state.activePanel);
        if (this.isMobile()) {
          document.getElementById('scrim').classList.add('visible');
          document.getElementById('sheet').classList.add('visible');
        }
      } else {
        document.getElementById('scrim').classList.remove('visible');
        document.getElementById('sheet').classList.remove('visible');
      }
    },
  };
  onFeatures(() => ui.render());
  onUi(() => ui.render());

  const PANEL_TITLES = {
    layers: 'Calques',
    style: 'Style',
    measure: 'Mesures',
    tools: 'Outils géométriques',
    legend: 'Légende',
    coordinates: 'Coordonnées',
    search: 'Aller à un point',
    elevation: 'Profil d\'élévation',
    grid: 'Grille de coordonnées',
    files: 'Importer / Exporter',
    menu: 'Outils',
  };

  function renderPanel(containerId, panelId) {
    const el = document.getElementById(containerId);
    if (!el) return;
    if (panelId === 'menu') el.innerHTML = renderMenu();
    else if (panelId === 'layers') el.innerHTML = renderLayers();
    else if (panelId === 'style') el.innerHTML = renderStyle();
    else if (panelId === 'measure') el.innerHTML = renderMeasure();
    else if (panelId === 'tools') el.innerHTML = renderTools();
    else if (panelId === 'legend') el.innerHTML = renderLegend();
    else if (panelId === 'coordinates') el.innerHTML = renderCoordinates();
    else if (panelId === 'search') el.innerHTML = renderSearch();
    else if (panelId === 'elevation') el.innerHTML = renderElevation();
    else if (panelId === 'grid') el.innerHTML = renderGrid();
    else if (panelId === 'files') el.innerHTML = renderFiles();
    // After innerHTML, attach event listeners
    if (panelId === 'coordinates') attachCoordinatesEvents(el);
    if (panelId === 'search') attachSearchEvents(el);
    if (panelId === 'elevation') attachElevationEvents(el);
    if (panelId === 'grid') attachGridEvents(el);
    if (panelId === 'style') attachStyleEvents(el);
    if (panelId === 'layers') attachLayersEvents(el);
    if (panelId === 'files') attachFilesEvents(el);
    if (panelId === 'tools') attachToolsEvents(el);
    if (panelId === 'legend') attachLegendEvents(el);
  }

  /* ═══ 7. PANEL CONTENT — MENU (mobile) ══════════════════════════════════════ */
  function renderMenu() {
    const items = [
      { id: 'layers', label: 'Calques', icon: 'M12 3l9 5-9 5-9-5 9-5z M3 13l9 5 9-5 M3 17l9 5 9-5' },
      { id: 'style', label: 'Style', icon: 'M12 3a9 9 0 109 9c0-1.5-1-2.5-2.5-2.5H17c-1.5 0-2.5-1-2.5-2.5S15.5 4.5 14 4.5h-2z' },
      { id: 'measure', label: 'Mesures', icon: 'M16 4l4 4L8 20l-4-4L16 4z' },
      { id: 'tools', label: 'Outils géométriques', icon: 'M14.7 6.3a4 4 0 015.66 5.66L10 22.36l-7.07 1.41 1.41-7.07L14.7 6.3z' },
      { id: 'legend', label: 'Légende', icon: 'M4 6h16M4 12h10M4 18h16' },
      { id: 'coordinates', label: 'Coordonnées', icon: 'M12 2C7 2 4 5.5 4 10c0 5.5 8 12 8 12s8-6.5 8-12c0-4.5-3-8-8-8z' },
      { id: 'search', label: 'Aller à un point', icon: 'M11 4a7 7 0 100 14 7 7 0 000-14z M16 16l5 5' },
      { id: 'elevation', label: 'Profil d\'élévation', icon: 'M3 18l5-9 4 5 4-7 5 11H3z' },
      { id: 'grid', label: 'Grille de coordonnées', icon: 'M3 9h18M3 15h18M9 3v18M15 3v18' },
      { id: 'files', label: 'Importer / Exporter', icon: 'M14 4v5h5 M5 12V6a2 2 0 012-2h7l5 5v7a2 2 0 01-2 2H7a2 2 0 01-2-2v0' },
    ];
    return `<div class="menu-list">
      ${items.map(it => `
        <button class="menu-item" onclick="ui.openSheet('${it.id}')">
          <span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="${it.icon}" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg></span>
          <span>${it.label}</span>
        </button>
      `).join('')}
    </div>`;
  }

  /* ═══ 8. PANEL CONTENT — LAYERS ═════════════════════════════════════════════ */
  function renderLayers() {
    if (state.features.length === 0) {
      return `<div class="empty-state">Aucun objet sur la carte.<div class="small">Utilisez la barre de dessin en haut à gauche de la carte pour créer.</div></div>`;
    }
    const rows = state.features.map(f => {
      const sel = state.selectedIds.includes(f.id);
      const metrics = f.metrics.areaSquareMeters !== undefined ? formatArea(f.metrics.areaSquareMeters)
                    : f.metrics.lengthMeters !== undefined ? formatDistance(f.metrics.lengthMeters)
                    : '';
      // Tag derived features (buffer / intersection / contours) so the
      // user can easily spot them in the list. The label appears next to
      // the metric line in a muted color.
      const derivedKind = f.geojson && f.geojson.properties && f.geojson.properties._derivedKind;
      const derivedLbl = derivedKind === 'buffer' ? 'buffer'
                       : derivedKind === 'intersection' ? 'intersection'
                       : derivedKind === 'contours' ? 'courbes'
                       : null;
      const derivedBadge = derivedLbl
        ? `<span style="display:inline-block; margin-left:6px; padding:1px 6px; background:rgba(251,196,18,0.15); color:#fbc412; font-size:10px; border-radius:8px; vertical-align:middle;">${derivedLbl}</span>`
        : '';
      const eyeIcon = f.style.visible
        ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>`
        : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M2 12s3.5-7 10-7c2.4 0 4.4 1 6 2.2M22 12s-3.5 7-10 7c-2.4 0-4.4-1-6-2.2M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
      return `
        <div class="layer-row${sel ? ' selected' : ''}${f.style.visible ? '' : ' hidden'}" data-id="${f.id}">
          <span class="swatch" style="background:${f.style.fill}"></span>
          <div style="flex:1; min-width:0;">
            <button class="layer-name" data-action="select" data-id="${f.id}" ondblclick="layerStartRename('${f.id}')" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}${derivedBadge}</button>
            ${metrics ? `<div class="layer-metrics">${metrics}</div>` : ''}
          </div>
          <button class="layer-action" data-action="zoom" data-id="${f.id}" title="Centrer">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2"/><path d="M16 16l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
          <button class="layer-action" data-action="visibility" data-id="${f.id}" title="${f.style.visible ? 'Masquer' : 'Afficher'}">${eyeIcon}</button>
          <button class="layer-action danger" data-action="delete" data-id="${f.id}" title="Supprimer">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>`;
    }).join('');
    return `
      <div class="row" style="justify-content:space-between; margin-bottom:12px;">
        <span style="font-size:11px; color:var(--ink-2);">${state.features.length} objet${state.features.length > 1 ? 's' : ''}</span>
        <button class="btn btn-danger" onclick="layersClearAll()">Tout effacer</button>
      </div>
      <div class="stack-tight">${rows}</div>`;
  }

  function attachLayersEvents(root) {
    root.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = btn.dataset.id;
        const action = btn.dataset.action;
        if (action === 'select') toggleSelect(id);
        else if (action === 'zoom') zoomToFeature(id);
        else if (action === 'visibility') toggleVisibility(id);
        else if (action === 'delete') {
          const f = state.features.find(x => x.id === id);
          if (!f) return;
          ui.confirm('Supprimer ?', `Supprimer définitivement « ${f.name} » ?`, () => removeFeature(id));
        }
      });
    });
  }

  window.layerStartRename = function (id) {
    const row = document.querySelector(`.layer-row[data-id="${id}"]`);
    if (!row) return;
    const btn = row.querySelector('.layer-name');
    const f = state.features.find(x => x.id === id);
    if (!f || !btn) return;
    const input = document.createElement('input');
    input.value = f.name;
    input.className = 'layer-name editing';
    input.style.font = 'inherit';
    btn.replaceWith(input);
    input.focus(); input.select();
    function commit() {
      const v = input.value.trim();
      if (v && v !== f.name) renameFeature(id, v);
      else ui.render();
    }
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') commit();
      if (e.key === 'Escape') ui.render();
    });
  };

  window.layersClearAll = function () {
    if (state.features.length === 0) return;
    ui.confirm('Tout effacer ?', `Supprimer définitivement les ${state.features.length} objets ?`, clearAllFeatures);
  };

  function zoomToFeature(id) {
    const f = state.features.find(x => x.id === id);
    if (!f) return;
    try {
      const bbox = turf.bbox(f.geojson);
      map.fitBounds([[bbox[0], bbox[1]], [bbox[2], bbox[3]]], { padding: 80, maxZoom: 18, duration: 500 });
    } catch (e) {}
  }

  /* ═══ 9. PANEL CONTENT — STYLE ══════════════════════════════════════════════ */
  function renderStyle() {
    const sel = state.features.filter(f => state.selectedIds.includes(f.id));
    if (sel.length === 0) {
      return `<div class="empty-state">Sélectionnez un ou plusieurs objets sur la carte (tap directement sur l'objet) pour modifier leur style.</div>`;
    }
    const ref = sel[0].style;
    const header = sel.length === 1
      ? `Modification de <strong style="color:var(--brand)">${escapeHtml(sel[0].name)}</strong>`
      : `Modification de <strong style="color:var(--brand)">${sel.length} objets</strong> sélectionnés`;
    return `
      <div style="font-size:13px; color:var(--ink-1); margin-bottom:14px; padding:8px 10px; background:var(--bg-3); border-radius:6px;">${header}</div>
      <div class="stack">
        <div>
          <label class="field-label">Contour</label>
          <div class="color-row">
            <input type="color" id="st-stroke" value="${ref.stroke}" />
            <input type="text" id="st-stroke-hex" class="field" value="${ref.stroke}" />
          </div>
        </div>
        <div>
          <label class="field-label">Épaisseur</label>
          <div class="slider-row">
            <input type="range" id="st-width" min="0.5" max="10" step="0.5" value="${ref.strokeWidth}" />
            <span class="val" id="st-width-val">${ref.strokeWidth.toFixed(1)}</span>
          </div>
        </div>
        <div>
          <label class="field-label">Remplissage</label>
          <div class="color-row">
            <input type="color" id="st-fill" value="${ref.fill}" />
            <input type="text" id="st-fill-hex" class="field" value="${ref.fill}" />
          </div>
        </div>
        <div>
          <label class="field-label">Opacité</label>
          <div class="slider-row">
            <input type="range" id="st-opacity" min="0" max="1" step="0.05" value="${ref.fillOpacity}" />
            <span class="val" id="st-opacity-val">${Math.round(ref.fillOpacity * 100)}%</span>
          </div>
        </div>
        <div>
          <label class="checkbox-row">
            <input type="checkbox" id="st-label" ${ref.showLabel ? 'checked' : ''} />
            <span>Afficher l'étiquette</span>
          </label>
        </div>
      </div>`;
  }

  function attachStyleEvents(root) {
    const apply = (patch) => {
      state.selectedIds.forEach(id => setStyle(id, patch));
    };
    root.querySelector('#st-stroke')?.addEventListener('input', e => {
      apply({ stroke: e.target.value });
      const hex = root.querySelector('#st-stroke-hex'); if (hex) hex.value = e.target.value;
    });
    root.querySelector('#st-stroke-hex')?.addEventListener('change', e => {
      if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) {
        apply({ stroke: e.target.value });
        const c = root.querySelector('#st-stroke'); if (c) c.value = e.target.value;
      }
    });
    root.querySelector('#st-width')?.addEventListener('input', e => {
      const v = parseFloat(e.target.value);
      apply({ strokeWidth: v });
      root.querySelector('#st-width-val').textContent = v.toFixed(1);
    });
    root.querySelector('#st-fill')?.addEventListener('input', e => {
      apply({ fill: e.target.value });
      const hex = root.querySelector('#st-fill-hex'); if (hex) hex.value = e.target.value;
    });
    root.querySelector('#st-fill-hex')?.addEventListener('change', e => {
      if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) {
        apply({ fill: e.target.value });
        const c = root.querySelector('#st-fill'); if (c) c.value = e.target.value;
      }
    });
    root.querySelector('#st-opacity')?.addEventListener('input', e => {
      const v = parseFloat(e.target.value);
      apply({ fillOpacity: v });
      root.querySelector('#st-opacity-val').textContent = Math.round(v * 100) + '%';
    });
    root.querySelector('#st-label')?.addEventListener('change', e => {
      apply({ showLabel: e.target.checked });
    });
  }

  /* ═══ 10. PANEL CONTENT — MEASURE ═══════════════════════════════════════════ */
  function renderMeasure() {
    const sel = state.features.filter(f => state.selectedIds.includes(f.id));
    if (sel.length === 0) {
      return `<div class="empty-state">Sélectionnez un objet dans le panneau « Calques » pour voir ses mesures.</div>`;
    }
    let totalLen = 0, totalArea = 0;
    const items = sel.map(f => {
      if (f.metrics.lengthMeters) totalLen += f.metrics.lengthMeters;
      if (f.metrics.areaSquareMeters) totalArea += f.metrics.areaSquareMeters;
      return `
        <div class="surface" style="margin-bottom:8px;">
          <div style="font-weight:500; margin-bottom:6px;">${escapeHtml(f.name)}</div>
          <div style="font-family:'JetBrains Mono',ui-monospace,monospace; font-size:12px; color:var(--ink-1);">
            ${f.metrics.lengthMeters !== undefined ? `<div><span style="color:var(--ink-2)">Longueur :</span> ${formatDistance(f.metrics.lengthMeters)}</div>` : ''}
            ${f.metrics.areaSquareMeters !== undefined ? `<div><span style="color:var(--ink-2)">Surface  :</span> ${formatArea(f.metrics.areaSquareMeters)}</div>` : ''}
          </div>
        </div>`;
    }).join('');
    let total = '';
    if (sel.length > 1 && (totalLen > 0 || totalArea > 0)) {
      total = `
        <div class="surface" style="background:rgba(58,160,255,0.05); border-color:rgba(58,160,255,0.3); margin-top:12px;">
          <div class="field-label" style="margin-bottom:4px;">Total</div>
          <div style="font-family:'JetBrains Mono',ui-monospace,monospace; font-size:13px;">
            ${totalLen > 0 ? `<div><span style="color:var(--ink-2)">Longueur :</span> ${formatDistance(totalLen)}</div>` : ''}
            ${totalArea > 0 ? `<div><span style="color:var(--ink-2)">Surface  :</span> ${formatArea(totalArea)}</div>` : ''}
          </div>
        </div>`;
    }
    return items + total;
  }

  /* ═══ 10b. PANEL CONTENT — TOOLS (buffer, intersection) ═════════════════════ */
  function renderTools() {
    const sel = state.features.filter(f => state.selectedIds.includes(f.id));
    const polys = sel.filter(f => ['polygon', 'rectangle', 'circle'].includes(f.kind));
    return `
      <div class="stack">
        <!-- ─── Buffer tool ──────────────────────────────────────────── -->
        <div class="surface">
          <div class="field-label" style="margin-bottom:6px;">Buffer (zone tampon)</div>
          <p style="font-size:12px; color:var(--ink-1); margin:0 0 10px;">
            Crée un nouvel objet polygonal à une distance donnée autour d'un objet sélectionné.
            ${sel.length === 0 ? '<br><strong>Sélectionnez un objet pour commencer.</strong>' : ''}
            ${sel.length > 1 ? '<br><strong>Sélectionnez un seul objet à la fois.</strong>' : ''}
          </p>
          <div style="display:flex; gap:8px; align-items:flex-end;">
            <div style="flex:1;">
              <label class="field-label" style="font-size:11px;">Rayon (mètres)</label>
              <input type="text" id="bf-radius" class="field" inputmode="decimal" autocapitalize="off" autocorrect="off"
                     value="50" style="font-family:'JetBrains Mono',ui-monospace,monospace;" />
            </div>
            <button class="btn btn-solid" id="bf-apply" ${sel.length !== 1 ? 'disabled' : ''}
                    style="white-space:nowrap;">Appliquer</button>
          </div>
        </div>

        <!-- ─── Intersection tool ──────────────────────────────────── -->
        <div class="surface">
          <div class="field-label" style="margin-bottom:6px;">Intersection de polygones</div>
          <p style="font-size:12px; color:var(--ink-1); margin:0 0 10px;">
            Calcule la zone commune (chevauchement) entre 2 polygones sélectionnés et la crée comme nouvel objet.
            ${polys.length === 0 ? "<br><strong>Sélectionnez au moins 2 polygones avec « Sélection multiple ».</strong>"
              : polys.length === 1 ? "<br><strong>Encore 1 polygone à sélectionner.</strong>"
              : `<br><strong>${polys.length} polygones sélectionnés.</strong>`}
          </p>
          <button class="btn btn-solid" id="it-apply" ${polys.length < 2 ? 'disabled' : ''}
                  style="width:100%;">Calculer l'intersection</button>
          <div id="it-result" style="font-size:12px; margin-top:8px;"></div>
        </div>

        <!-- ─── Contour lines tool ──────────────────────────────────── -->
        <div class="surface">
          <div class="field-label" style="margin-bottom:6px;">Courbes de niveau</div>
          <p style="font-size:12px; color:var(--ink-1); margin:0 0 10px;">
            Échantillonne l'altitude (Open-Meteo, fallback Open-Elevation) sur le polygone sélectionné et trace les courbes de niveau.
            <br><em style="color:var(--ink-2);">Nécessite Internet. Ne pas utiliser sur des polygones très étendus (limite ~30 km de côté).</em>
            ${polys.length === 1 ? '' : '<br><strong>Sélectionnez exactement 1 polygone, rectangle ou cercle.</strong>'}
          </p>
          <div style="display:flex; gap:8px; align-items:flex-end;">
            <div style="flex:1;">
              <label class="field-label" style="font-size:11px;">Pas (mètres)</label>
              <input type="text" id="cn-step" class="field" inputmode="decimal" autocapitalize="off" autocorrect="off"
                     value="10" style="font-family:'JetBrains Mono',ui-monospace,monospace;" />
            </div>
            <button class="btn btn-solid" id="cn-apply" ${polys.length !== 1 ? 'disabled' : ''}
                    style="white-space:nowrap;">Tracer</button>
          </div>
          <div id="cn-result" style="font-size:12px; margin-top:8px;"></div>
        </div>
      </div>
    `;
  }

  function attachToolsEvents(root) {
    // Buffer
    const bfBtn = root.querySelector('#bf-apply');
    const bfIn = root.querySelector('#bf-radius');
    if (bfIn) {
      // Restore last value across panel re-renders.
      if (typeof state._bufferRadius === 'number' && !isNaN(state._bufferRadius)) {
        bfIn.value = String(state._bufferRadius);
      }
      bfIn.addEventListener('input', () => {
        const v = parseFloat(String(bfIn.value).replace(',', '.'));
        state._bufferRadius = isNaN(v) ? null : v;
      });
    }
    if (bfBtn) bfBtn.addEventListener('click', () => {
      const sel = state.features.filter(f => state.selectedIds.includes(f.id));
      if (sel.length !== 1) {
        ui.confirm('Sélection requise', 'Sélectionnez exactement 1 objet (tap sur la carte) avant de calculer le buffer.', () => {});
        return;
      }
      const src = sel[0];
      // Read FROM THE INPUT directly at click time — but ALSO have the
      // backup from state._bufferRadius in case the input was just reset
      // by a panel re-render that happened mid-flight.
      const rRaw = bfIn ? bfIn.value : '';
      const r = parseFloat(String(rRaw).replace(',', '.'));
      const radius = !isNaN(r) ? r
                   : typeof state._bufferRadius === 'number' ? state._bufferRadius
                   : NaN;
      log.info('[HydraulicGIS] buffer requested radius =', radius, 'raw input =', JSON.stringify(rRaw));
      if (isNaN(radius) || radius === 0) {
        ui.confirm('Rayon invalide', 'Entrez un nombre non nul (ex. 50). Un rayon négatif rétrécit le polygone.', () => {});
        return;
      }
      try {
        const buffered = turf.buffer(src.geojson, radius, { units: 'meters' });
        if (!buffered || !buffered.geometry) {
          ui.confirm('Buffer impossible', "L'opération n'a produit aucune géométrie (rayon trop petit ou trop négatif).", () => {});
          return;
        }
        // Mark as a derived feature: rendered on our app-derived layer
        // (NOT through terra-draw, which silently rejected it before).
        const newF = addFeature({
          type: 'Feature',
          geometry: buffered.geometry,
          properties: { _derived: true, _derivedKind: 'buffer' }
        }, 'polygon', { name: `Buffer ${radius}m de ${src.name}` });
        ensureDerivedLayers();
        syncDerivedLayer();
        notifyFeatures();
        log.info('[HydraulicGIS] buffer created:', newF.id, 'r=' + radius + 'm');
      } catch (err) {
        log.error('[HydraulicGIS] buffer failed:', err);
        ui.confirm('Erreur', "Le calcul du buffer a échoué : " + (err.message || err), () => {});
      }
    });

    // Intersection
    const itBtn = root.querySelector('#it-apply');
    if (itBtn) itBtn.addEventListener('click', () => {
      const polys = state.features
        .filter(f => state.selectedIds.includes(f.id))
        .filter(f => ['polygon', 'rectangle', 'circle'].includes(f.kind));
      if (polys.length < 2) return;
      try {
        // turf.intersect (v7 signature in this bundle) takes a
        // FeatureCollection of polygons and returns the intersection of
        // ALL of them at once. The error "Must specify at least 2
        // geometries" was thrown because we were passing two separate
        // args (v6 signature) — the first arg was being read as the FC
        // and only contained one polygon.
        const fc = turf.featureCollection(polys.map(p => p.geojson));
        const result = root.querySelector('#it-result');
        const intersection = turf.intersect(fc);
        if (!intersection || !intersection.geometry) {
          if (result) {
            result.style.color = 'var(--danger)';
            result.textContent = `Aucun chevauchement entre les ${polys.length} polygones sélectionnés.`;
          }
          return;
        }
        const acc = intersection;
        const newF = addFeature({
          type: 'Feature',
          geometry: acc.geometry,
          properties: { _derived: true, _derivedKind: 'intersection' }
        }, 'polygon', { name: `Intersection (${polys.map(p => p.name).join(' ∩ ')})` });
        ensureDerivedLayers();
        syncDerivedLayer();
        notifyFeatures();
        if (result) {
          result.style.color = 'var(--brand)';
          const areaM2 = turf.area(newF.geojson);
          result.textContent = `✓ Intersection créée. Surface : ${formatArea(areaM2)}`;
        }
        log.info('[HydraulicGIS] intersection created:', newF.id);
      } catch (err) {
        log.error('[HydraulicGIS] intersection failed:', err);
        const result = root.querySelector('#it-result');
        if (result) {
          result.style.color = 'var(--danger)';
          result.textContent = "Erreur : " + (err.message || err);
        }
      }
    });

    // Contour lines: sample elevations on a grid inside the bbox of the
    // selected polygon, then run a basic marching-squares to build polylines
    // at integer multiples of the user-given step. Network access required.
    const cnBtn = root.querySelector('#cn-apply');
    if (cnBtn) cnBtn.addEventListener('click', async () => {
      const sel = state.features.filter(f => state.selectedIds.includes(f.id));
      const polysOnly = sel.filter(f => ['polygon', 'rectangle', 'circle'].includes(f.kind));
      if (polysOnly.length !== 1) return;
      const poly = polysOnly[0];
      const stepIn = root.querySelector('#cn-step');
      const step = parseFloat(String(stepIn.value).replace(',', '.'));
      const result = root.querySelector('#cn-result');
      if (isNaN(step) || step <= 0) {
        if (result) {
          result.style.color = 'var(--danger)';
          result.textContent = "Pas invalide. Entrez un nombre positif (ex. 10).";
        }
        return;
      }

      // Prevent abuse: bbox max ~30 km × 30 km. Open-Elevation rate-limits
      // bursts; a denser grid here would also slow the marching-squares.
      const bbox = turf.bbox(poly.geojson);  // [minX, minY, maxX, maxY]
      const widthKm = turf.distance([bbox[0], bbox[1]], [bbox[2], bbox[1]], { units: 'kilometers' });
      const heightKm = turf.distance([bbox[0], bbox[1]], [bbox[0], bbox[3]], { units: 'kilometers' });
      if (widthKm > 30 || heightKm > 30) {
        if (result) {
          result.style.color = 'var(--danger)';
          result.textContent = `Polygone trop étendu (${widthKm.toFixed(1)} × ${heightKm.toFixed(1)} km). Limite 30 km.`;
        }
        return;
      }

      // Grid resolution: 25×25 = 625 sample points. Open-Elevation accepts
      // up to a few hundred per request; we batch into one POST.
      const N = 25;
      const gridLngs = new Array(N).fill(0).map((_, i) => bbox[0] + (i / (N - 1)) * (bbox[2] - bbox[0]));
      const gridLats = new Array(N).fill(0).map((_, j) => bbox[1] + (j / (N - 1)) * (bbox[3] - bbox[1]));

      cnBtn.disabled = true;
      const origLabel = cnBtn.textContent;
      cnBtn.textContent = 'Échantillonnage…';
      if (result) { result.style.color = 'var(--ink-2)'; result.textContent = 'Requête vers Open-Meteo Elevation…'; }

      try {
        // Open-Meteo Elevation API — free, no key, CORS-enabled, much
        // more reliable than Open-Elevation (which is frequently down).
        // Endpoint accepts up to 100 lat/lng pairs per call as a comma-
        // separated list. We have 25×25 = 625 points, so we batch in
        // chunks of 100. Open-Elevation kept as a fallback if Open-Meteo
        // fails (e.g. rate-limited).
        const allElevations = new Array(N * N);
        const flat = [];
        for (let j = 0; j < N; j++) for (let i = 0; i < N; i++) {
          flat.push({ lat: gridLats[j], lng: gridLngs[i] });
        }
        async function fetchElevations(points) {
          // Try Open-Meteo first.
          const lats = points.map(p => p.lat.toFixed(6)).join(',');
          const lngs = points.map(p => p.lng.toFixed(6)).join(',');
          const om = `https://api.open-meteo.com/v1/elevation?latitude=${lats}&longitude=${lngs}`;
          try {
            const r = await fetch(om);
            if (r.ok) {
              const d = await r.json();
              if (d && Array.isArray(d.elevation)) return d.elevation;
            }
          } catch (e) { log.warn('Open-Meteo elevation failed:', e); }
          // Fallback: Open-Elevation POST (often slow, sometimes 502).
          try {
            const r = await fetch('https://api.open-elevation.com/api/v1/lookup', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                locations: points.map(p => ({ latitude: p.lat, longitude: p.lng })),
              }),
            });
            if (!r.ok) throw new Error('HTTP ' + r.status);
            const d = await r.json();
            if (d && Array.isArray(d.results)) return d.results.map(x => x.elevation);
          } catch (e) { log.warn('Open-Elevation fallback failed:', e); }
          throw new Error('Aucun service d\'élévation accessible (réseau hors-ligne ?)');
        }
        // Batch by 100 points per call.
        const BATCH = 100;
        let index = 0;
        for (let off = 0; off < flat.length; off += BATCH) {
          const slice = flat.slice(off, Math.min(off + BATCH, flat.length));
          if (result) result.textContent = `Échantillonnage ${off + slice.length} / ${flat.length}…`;
          const elevs = await fetchElevations(slice);
          for (let k = 0; k < elevs.length; k++) {
            allElevations[index++] = elevs[k];
          }
        }
        // Build the elevation grid Z[j][i].
        const Z = [];
        for (let j = 0; j < N; j++) {
          Z.push(new Array(N));
          for (let i = 0; i < N; i++) {
            Z[j][i] = allElevations[j * N + i];
          }
        }
        let minZ = Infinity, maxZ = -Infinity;
        for (let j = 0; j < N; j++) for (let i = 0; i < N; i++) {
          if (Z[j][i] < minZ) minZ = Z[j][i];
          if (Z[j][i] > maxZ) maxZ = Z[j][i];
        }

        // Generate contour levels from floor(min/step)*step to ceil(max/step)*step.
        const firstLevel = Math.ceil(minZ / step) * step;
        const lastLevel  = Math.floor(maxZ / step) * step;
        const levels = [];
        for (let v = firstLevel; v <= lastLevel; v += step) levels.push(v);

        // Marching squares — one segment per cell-edge crossing.
        // For each level we collect lineStrings (we don't bother chaining
        // them — the user just sees segments rendered as polylines, which
        // visually merge into closed curves at this resolution).
        const interp = (x1, x2, z1, z2, level) => (level - z1) / (z2 - z1);
        const allFeatures = [];
        for (const L of levels) {
          const segments = [];
          for (let j = 0; j < N - 1; j++) {
            for (let i = 0; i < N - 1; i++) {
              const z00 = Z[j][i], z10 = Z[j][i+1], z11 = Z[j+1][i+1], z01 = Z[j+1][i];
              const lng0 = gridLngs[i], lng1 = gridLngs[i+1];
              const lat0 = gridLats[j], lat1 = gridLats[j+1];
              const c00 = z00 >= L ? 1 : 0;
              const c10 = z10 >= L ? 1 : 0;
              const c11 = z11 >= L ? 1 : 0;
              const c01 = z01 >= L ? 1 : 0;
              const idx = (c00 << 0) | (c10 << 1) | (c11 << 2) | (c01 << 3);
              if (idx === 0 || idx === 15) continue;
              // Edge midpoints (interpolated): bottom=lat0, right=lng1, top=lat1, left=lng0
              const mB = () => [lng0 + interp(lng0, lng1, z00, z10, L) * (lng1 - lng0), lat0];
              const mR = () => [lng1, lat0 + interp(lat0, lat1, z10, z11, L) * (lat1 - lat0)];
              const mT = () => [lng0 + interp(lng0, lng1, z01, z11, L) * (lng1 - lng0), lat1];
              const mL = () => [lng0, lat0 + interp(lat0, lat1, z00, z01, L) * (lat1 - lat0)];
              // Each case lists the segments to draw as PAIRS of edge
              // midpoints. Simple cases produce 1 segment (one inner-pair).
              // Saddle cases (5 and 10) produce 2 segments.
              let pairs;
              switch (idx) {
                case 1: case 14: pairs = [[mL, mB]]; break;
                case 2: case 13: pairs = [[mB, mR]]; break;
                case 3: case 12: pairs = [[mL, mR]]; break;
                case 4: case 11: pairs = [[mR, mT]]; break;
                case 6: case 9:  pairs = [[mB, mT]]; break;
                case 7: case 8:  pairs = [[mL, mT]]; break;
                case 5:  pairs = [[mL, mT], [mB, mR]]; break;
                case 10: pairs = [[mL, mB], [mR, mT]]; break;
                default: continue;
              }
              for (const [fA, fB] of pairs) {
                segments.push([fA(), fB()]);
              }
            }
          }
          // Clip each segment to the source polygon. Per user spec, the
          // contour lines should not extend beyond the object's boundary.
          // We test the segment midpoint with turf.booleanPointInPolygon —
          // sufficient for our short cell-edge segments (the polygon is
          // dense relative to the 25-cell grid).
          const clipped = [];
          for (const seg of segments) {
            const mid = [(seg[0][0] + seg[1][0]) / 2, (seg[0][1] + seg[1][1]) / 2];
            try {
              if (turf.booleanPointInPolygon(turf.point(mid), poly.geojson)) {
                clipped.push(seg);
              }
            } catch (_) {
              // If point-in-polygon fails (degenerate input), keep the segment.
              clipped.push(seg);
            }
          }
          // Push every kept segment as part of a MultiLineString for this level.
          if (clipped.length > 0) {
            allFeatures.push({
              type: 'Feature',
              geometry: { type: 'MultiLineString', coordinates: clipped },
              properties: { level: L },
            });
          }
        }

        if (allFeatures.length === 0) {
          if (result) {
            result.style.color = 'var(--ink-2)';
            result.textContent = `Aucune courbe générée. Pas trop grand pour cette zone (Δ alt = ${(maxZ-minZ).toFixed(1)} m).`;
          }
          return;
        }

        // Build the contour feature as a single line in our store, marked
        // as a derived feature so it's selectable / deletable / styleable.
        const merged = { type: 'MultiLineString', coordinates: [] };
        for (const f of allFeatures) merged.coordinates.push(...f.geometry.coordinates);
        const newF = addFeature({
          type: 'Feature',
          geometry: merged,
          // _derived flags it for our app-derived layer renderer.
          // _kind:'contours' lets us identify and style it differently
          // (and also lets the elevation-label generator find it).
          properties: { _derived: true, _derivedKind: 'contours' }
        }, 'line', { name: `Courbes ${step}m de ${poly.name}` });

        // Generate elevation labels: place a label at the centroid of each
        // contour level's segments (one label per level, not per segment,
        // to avoid clutter).
        const elevationLabelFeatures = [];
        for (const lf of allFeatures) {
          const segs = lf.geometry.coordinates;
          if (!segs.length) continue;
          // Pick the midpoint of the longest segment as label anchor.
          let bestSeg = segs[0];
          let bestLen = 0;
          for (const s of segs) {
            const dx = s[1][0] - s[0][0], dy = s[1][1] - s[0][1];
            const len = dx * dx + dy * dy;
            if (len > bestLen) { bestLen = len; bestSeg = s; }
          }
          const mid = [(bestSeg[0][0] + bestSeg[1][0]) / 2, (bestSeg[0][1] + bestSeg[1][1]) / 2];
          elevationLabelFeatures.push({
            type: 'Feature',
            geometry: { type: 'Point', coordinates: mid },
            properties: { elevation: lf.properties.level },
          });
        }
        ensureContourLabelsLayer();
        const elabSrc = map.getSource('app-contour-labels');
        if (elabSrc) {
          // Keep accumulated labels for prior contour features by reading
          // current data and appending.
          const curData = elabSrc._data || { type: 'FeatureCollection', features: [] };
          elabSrc.setData({
            type: 'FeatureCollection',
            features: [...(curData.features || []), ...elevationLabelFeatures],
          });
        }

        ensureDerivedLayers();
        // The contour line itself is rendered by app-derived-line via
        // syncDerivedLayer (it picks up the new feature via _derived: true).
        syncDerivedLayer();
        notifyFeatures();
        if (result) {
          result.style.color = 'var(--brand)';
          result.textContent = `✓ ${levels.length} niveaux tracés (alt ${minZ.toFixed(0)} → ${maxZ.toFixed(0)} m).`;
        }
        log.info('[HydraulicGIS] contour lines created:', newF.id, 'levels=' + levels.length);
      } catch (err) {
        log.error('[HydraulicGIS] contour lines failed:', err);
        if (result) {
          result.style.color = 'var(--danger)';
          result.textContent = "Erreur : " + (err.message || err) + " (Open-Elevation peut être hors-ligne)";
        }
      } finally {
        cnBtn.disabled = false;
        cnBtn.textContent = origLabel;
      }
    });
  }

  /* ═══ 10c. PANEL CONTENT — LEGEND ════════════════════════════════════════════ */
  // Default config for the legend overlay. Stored on state._legend so
  // changes persist across panel re-renders and across page reloads (via
  // saveState).
  function ensureLegendState() {
    if (!state._legend) {
      state._legend = {
        enabled: false,
        title: 'Légende',
        position: 'bottom-right',
        fontSize: 13,
        // selectedIds: optional. If null/undefined, all VISIBLE features
        // are shown. If an array, only those ids appear. The user can
        // toggle inclusion per feature via the checkboxes below.
        selectedIds: null,
        // Per-feature label overrides. {featureId: customLabel}
        labelOverrides: {},
      };
    }
  }

  function renderLegend() {
    ensureLegendState();
    const cfg = state._legend;
    const featureList = state.features.map(f => {
      const included = cfg.selectedIds === null
        ? !!f.style.visible
        : cfg.selectedIds.includes(f.id);
      const customLabel = cfg.labelOverrides[f.id];
      const swatchColor = f.kind === 'line' ? f.style.stroke : f.style.fill;
      return `
        <div class="surface" style="padding:8px 10px; margin-bottom:4px; display:flex; align-items:center; gap:8px;">
          <input type="checkbox" class="lg-item-toggle" data-id="${f.id}" ${included ? 'checked' : ''} />
          <span style="display:inline-block; width:14px; height:14px; background:${swatchColor}; border:1px solid var(--line); border-radius:2px; flex-shrink:0;"></span>
          <input type="text" class="field lg-item-label" data-id="${f.id}"
                 value="${escapeHtml(customLabel != null ? customLabel : f.name)}"
                 placeholder="${escapeHtml(f.name)}"
                 style="flex:1; min-width:0; font-size:12px; padding:4px 6px;" />
        </div>`;
    }).join('');

    return `
      <div class="stack">
        <div class="surface">
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
            <input type="checkbox" id="lg-enabled" ${cfg.enabled ? 'checked' : ''} />
            <span style="font-weight:500;">Afficher la légende sur la carte</span>
          </label>
        </div>

        <div class="surface">
          <label class="field-label">Titre</label>
          <input type="text" id="lg-title" class="field" autocapitalize="off" autocorrect="off"
                 value="${escapeHtml(cfg.title || 'Légende')}" />

          <label class="field-label" style="margin-top:10px;">Position sur la carte</label>
          <select id="lg-position" class="field">
            <option value="top-left" ${cfg.position === 'top-left' ? 'selected' : ''}>Haut-gauche</option>
            <option value="top-right" ${cfg.position === 'top-right' ? 'selected' : ''}>Haut-droite</option>
            <option value="bottom-left" ${cfg.position === 'bottom-left' ? 'selected' : ''}>Bas-gauche</option>
            <option value="bottom-right" ${cfg.position === 'bottom-right' ? 'selected' : ''}>Bas-droite</option>
          </select>

          <label class="field-label" style="margin-top:10px;">Taille du texte</label>
          <select id="lg-fontsize" class="field">
            <option value="11" ${cfg.fontSize === 11 ? 'selected' : ''}>Petit (11px)</option>
            <option value="13" ${cfg.fontSize === 13 ? 'selected' : ''}>Moyen (13px)</option>
            <option value="15" ${cfg.fontSize === 15 ? 'selected' : ''}>Grand (15px)</option>
          </select>
        </div>

        <div>
          <div class="field-label" style="display:flex; justify-content:space-between; align-items:center;">
            <span>Objets dans la légende</span>
            <button class="btn btn-ghost" id="lg-reset-selection" style="font-size:11px; min-height:auto; padding:3px 8px;">
              Synchroniser avec œil
            </button>
          </div>
          <p style="font-size:11px; color:var(--ink-2); margin:4px 0 8px;">
            Cochez les objets à inclure. Vous pouvez modifier le texte affiché pour chacun
            (laissez vide pour utiliser le nom de l'objet).
          </p>
          ${state.features.length === 0
            ? '<div class="empty-state">Aucun objet à inclure.</div>'
            : `<div id="lg-feature-list">${featureList}</div>`}
        </div>
      </div>`;
  }

  function attachLegendEvents(root) {
    ensureLegendState();
    const cfg = state._legend;
    const lgEnabled = root.querySelector('#lg-enabled');
    const lgTitle = root.querySelector('#lg-title');
    const lgPosition = root.querySelector('#lg-position');
    const lgFontSize = root.querySelector('#lg-fontsize');
    const lgReset = root.querySelector('#lg-reset-selection');

    if (lgEnabled) lgEnabled.addEventListener('change', () => {
      cfg.enabled = lgEnabled.checked;
      updateLegendBox();
    });
    if (lgTitle) lgTitle.addEventListener('input', () => {
      cfg.title = lgTitle.value;
      updateLegendBox();
    });
    if (lgPosition) lgPosition.addEventListener('change', () => {
      cfg.position = lgPosition.value;
      updateLegendBox();
    });
    if (lgFontSize) lgFontSize.addEventListener('change', () => {
      cfg.fontSize = parseInt(lgFontSize.value, 10) || 13;
      updateLegendBox();
    });
    if (lgReset) lgReset.addEventListener('click', () => {
      cfg.selectedIds = null;  // null = follow visibility
      updateLegendBox();
      ui.render();   // re-render to update the checkboxes
    });

    // Per-item checkboxes: toggle inclusion of this feature
