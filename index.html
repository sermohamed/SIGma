  function attachGridEvents(root) {
    const onCb = root.querySelector('#gr-on');
    const crsSel = root.querySelector('#gr-crs');
    const spacingSel = root.querySelector('#gr-spacing');
    const labelsCb = root.querySelector('#gr-labels');
    const fields = root.querySelector('#gr-fields');

    function refreshSpacingOptions() {
      // Hide options that don't match the chosen CRS.
      Array.from(spacingSel.options).forEach(opt => {
        if (opt.dataset.crs && opt.dataset.crs !== crsSel.value) opt.style.display = 'none';
        else opt.style.display = '';
      });
      // Reset to auto when switching CRS to avoid mismatched units.
      const cur = spacingSel.options[spacingSel.selectedIndex];
      if (cur.dataset.crs && cur.dataset.crs !== crsSel.value) spacingSel.value = '0';
    }
    refreshSpacingOptions();

    function syncFromUI() {
      gridState.enabled = onCb.checked;
      gridState.crs = crsSel.value;
      gridState.spacing = parseFloat(spacingSel.value);
      gridState.showLabels = labelsCb.checked;
      fields.style.opacity = gridState.enabled ? '' : '0.5';
      crsSel.disabled = !gridState.enabled;
      spacingSel.disabled = !gridState.enabled;
      labelsCb.disabled = !gridState.enabled;
      updateGrid();
    }

    onCb.addEventListener('change', syncFromUI);
    crsSel.addEventListener('change', () => { refreshSpacingOptions(); syncFromUI(); });
    spacingSel.addEventListener('change', syncFromUI);
    labelsCb.addEventListener('change', syncFromUI);
  }

  function updateGrid() {
    if (!map.isStyleLoaded()) return;
    const SRC = 'app-grid', SRC_LBL = 'app-grid-labels';
    if (!map.getSource(SRC)) {
      map.addSource(SRC, { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      map.addSource(SRC_LBL, { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      // Insert grid lines BELOW everything else (after attribution but before app layers).
      const beforeId = map.getLayer('app-poly-fill') ? 'app-poly-fill' : undefined;
      map.addLayer({
        id: 'app-grid-lines', type: 'line', source: SRC,
        paint: {
          'line-color': '#aab4c2',
          'line-width': 0.6,
          'line-opacity': 0.45,
          'line-dasharray': [2, 3],
        },
      }, beforeId);
      map.addLayer({
        id: 'app-grid-text', type: 'symbol', source: SRC_LBL,
        layout: {
          'text-field': ['get', 'label'],
          'text-size': 10,
          'text-allow-overlap': false,
          'text-ignore-placement': false,
          'text-anchor': 'bottom-left',
          'text-offset': [0.3, -0.3],
        },
        paint: {
          'text-color': '#aab4c2',
          'text-halo-color': '#0b0f14',
          'text-halo-width': 1.4,
        },
      });
    }
    const linesSrc = map.getSource(SRC);
    const lblSrc = map.getSource(SRC_LBL);
    if (!gridState.enabled) {
      linesSrc.setData({ type: 'FeatureCollection', features: [] });
      lblSrc.setData({ type: 'FeatureCollection', features: [] });
      return;
    }
    const { lines, labels } = buildGrid();
    linesSrc.setData({ type: 'FeatureCollection', features: lines });
    lblSrc.setData({ type: 'FeatureCollection', features: gridState.showLabels ? labels : [] });
  }

  function buildGrid() {
    const b = map.getBounds();
    const minLng = b.getWest(), maxLng = b.getEast();
    const minLat = b.getSouth(), maxLat = b.getNorth();
    const lines = [], labels = [];

    if (gridState.crs === 'wgs84') {
      // Spacing in degrees
      let dx = gridState.spacing;
      if (!dx) {
        const span = Math.max(maxLng - minLng, maxLat - minLat);
        if (span > 20) dx = 5;
        else if (span > 8) dx = 1;
        else if (span > 3) dx = 0.5;
        else if (span > 1) dx = 0.1;
        else if (span > 0.3) dx = 0.05;
        else if (span > 0.1) dx = 0.01;
        else dx = 0.001;
      }
      const x0 = Math.floor(minLng / dx) * dx;
      const y0 = Math.floor(minLat / dx) * dx;
      const x1 = Math.ceil(maxLng / dx) * dx;
      const y1 = Math.ceil(maxLat / dx) * dx;
      // Vertical lines (constant lng)
      for (let x = x0; x <= x1 + 1e-9; x += dx) {
        const xc = +x.toFixed(8);
        lines.push({ type: 'Feature', properties: {}, geometry: { type: 'LineString', coordinates: [[xc, minLat], [xc, maxLat]] } });
        labels.push({ type: 'Feature', properties: { label: gridLabelDeg(xc, 'lon') }, geometry: { type: 'Point', coordinates: [xc, minLat + (maxLat - minLat) * 0.02] } });
      }
      // Horizontal lines (constant lat)
      for (let y = y0; y <= y1 + 1e-9; y += dx) {
        const yc = +y.toFixed(8);
        lines.push({ type: 'Feature', properties: {}, geometry: { type: 'LineString', coordinates: [[minLng, yc], [maxLng, yc]] } });
        labels.push({ type: 'Feature', properties: { label: gridLabelDeg(yc, 'lat') }, geometry: { type: 'Point', coordinates: [minLng + (maxLng - minLng) * 0.02, yc] } });
      }
    } else {
      // Lambert grid: convert visible bbox corners to Lambert, find rounded grid lines, convert back.
      const corners = [
        reproject([minLng, minLat], 'wgs84', 'lambert-maroc-1'),
        reproject([maxLng, minLat], 'wgs84', 'lambert-maroc-1'),
        reproject([maxLng, maxLat], 'wgs84', 'lambert-maroc-1'),
        reproject([minLng, maxLat], 'wgs84', 'lambert-maroc-1'),
      ];
      const xs = corners.map(c => c[0]), ys = corners.map(c => c[1]);
      const xMin = Math.min(...xs), xMax = Math.max(...xs);
      const yMin = Math.min(...ys), yMax = Math.max(...ys);
      let dx = gridState.spacing;
      if (!dx) {
        const span = Math.max(xMax - xMin, yMax - yMin);
        if (span > 200000) dx = 50000;
        else if (span > 50000) dx = 10000;
        else if (span > 10000) dx = 5000;
        else if (span > 3000) dx = 1000;
        else if (span > 1000) dx = 500;
        else if (span > 300) dx = 100;
        else if (span > 100) dx = 50;
        else dx = 10;
      }
      const x0 = Math.floor(xMin / dx) * dx;
      const y0 = Math.floor(yMin / dx) * dx;
      const x1 = Math.ceil(xMax / dx) * dx;
      const y1 = Math.ceil(yMax / dx) * dx;
      // Sample each grid line as 16 points across the bbox in Lambert space, then convert back to WGS84.
      const N = 16;
      for (let x = x0; x <= x1 + 1; x += dx) {
        const seg = [];
        for (let k = 0; k <= N; k++) {
          const yk = yMin + (yMax - yMin) * (k / N);
          const wgs = reproject([x, yk], 'lambert-maroc-1', 'wgs84');
          seg.push(wgs);
        }
        lines.push({ type: 'Feature', properties: {}, geometry: { type: 'LineString', coordinates: seg } });
        labels.push({ type: 'Feature', properties: { label: 'X ' + gridLabelMeters(x) }, geometry: { type: 'Point', coordinates: seg[0] } });
      }
      for (let y = y0; y <= y1 + 1; y += dx) {
        const seg = [];
        for (let k = 0; k <= N; k++) {
          const xk = xMin + (xMax - xMin) * (k / N);
          const wgs = reproject([xk, y], 'lambert-maroc-1', 'wgs84');
          seg.push(wgs);
        }
        lines.push({ type: 'Feature', properties: {}, geometry: { type: 'LineString', coordinates: seg } });
        labels.push({ type: 'Feature', properties: { label: 'Y ' + gridLabelMeters(y) }, geometry: { type: 'Point', coordinates: seg[0] } });
      }
    }
    return { lines, labels };
  }

  function gridLabelDeg(v, axis) {
    const abs = Math.abs(v);
    const hemi = axis === 'lat' ? (v >= 0 ? 'N' : 'S') : (v >= 0 ? 'E' : 'W');
    if (abs >= 1) return `${v.toFixed(abs >= 10 ? 1 : 2)}° ${hemi}`;
    // Sub-degree: show as min/sec for readability
    const deg = Math.floor(abs);
    const min = (abs - deg) * 60;
    if (min >= 1) return `${deg}°${min.toFixed(0)}' ${hemi}`;
    const sec = min * 60;
    return `${deg}°${Math.floor(min)}'${sec.toFixed(0)}" ${hemi}`;
  }
  function gridLabelMeters(v) {
    if (Math.abs(v) >= 1000) return (v / 1000).toFixed(v % 1000 === 0 ? 0 : 1) + ' km';
    return v.toFixed(0) + ' m';
  }


  document.getElementById('file-input').addEventListener('change', async (e) => {
    const status = document.getElementById('files-status');
    if (!e.target.files.length) return;
    let total = 0; let err = null;
    for (const file of Array.from(e.target.files)) {
      try {
        const imported = await importFile(file);
        for (const f of imported) state.features.push(f);
        total += imported.length;
      } catch (er) { err = er.message; }
    }
    notifyFeatures();
    e.target.value = '';
    if (status) {
      status.className = err ? 'notice notice-error' : 'notice notice-success';
      status.textContent = err || `${total} objet${total > 1 ? 's' : ''} importé${total > 1 ? 's' : ''}.`;
      setTimeout(() => { status.textContent = ''; status.className = ''; }, 4000);
    }
  });

  async function importFile(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    const text = await file.text();
    if (ext === 'geojson' || ext === 'json') return parseGeoJSON(text);
    if (ext === 'csv') return parseCSV(text);
    throw new Error(`Format non supporté : .${ext}`);
  }

  function parseGeoJSON(text) {
    const data = JSON.parse(text);
    const features = data.type === 'FeatureCollection' ? data.features
                  : data.type === 'Feature' ? [data] : [];
    const out = [];
    for (const f of features) {
      if (!f.geometry) continue;
      const props = f.properties || {};
      const kind = props.kind || kindFromGeom(f.geometry);
      const geo = { type: 'Feature', geometry: f.geometry, properties: {} };
      out.push({
        id: props.id || newId('f'),
        name: props.name || `Importé ${out.length + 1}`,
        kind,
        geojson: geo,
        style: { ...DEFAULT_STYLE, ...(props.style || {}) },
        metrics: computeMetrics(geo, kind),
        createdAt: props.createdAt || Date.now(),
        updatedAt: Date.now(),
      });
    }
    return out;
  }

  function splitCsv(line) {
    const out = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) { out.push(cur); cur = ''; }
      else cur += c;
    }
    out.push(cur); return out;
  }

  function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) return [];
    const header = splitCsv(lines[0]).map(h => h.toLowerCase().trim());
    const lonI = header.findIndex(h => /^(lon|longitude|x)$/.test(h));
    const latI = header.findIndex(h => /^(lat|latitude|y)$/.test(h));
    const nameI = header.findIndex(h => /^(name|nom)$/.test(h));
    if (lonI < 0 || latI < 0) throw new Error("Le CSV doit contenir des colonnes 'longitude' et 'latitude'.");
    const out = [];
    for (let i = 1; i < lines.length; i++) {
      const row = splitCsv(lines[i]);
      const lon = parseFloat(row[lonI]), lat = parseFloat(row[latI]);
      if (isNaN(lon) || isNaN(lat)) continue;
      const name = nameI >= 0 ? row[nameI] : `Point ${i}`;
      const geo = { type: 'Feature', geometry: { type: 'Point', coordinates: [lon, lat] }, properties: {} };
      out.push({
        id: newId('f'), name, kind: 'point',
        geojson: geo, style: { ...DEFAULT_STYLE }, metrics: {},
        createdAt: Date.now(), updatedAt: Date.now(),
      });
    }
    return out;
  }

  function doExport(format) {
    // Export all features whose visibility (eye icon) is currently ON.
    // The user explicitly asked for this — they want to control export
    // contents from the Calques panel by toggling visibility, not by
    // selecting layers. Hidden features are omitted.
    const features = state.features.filter(f => f.style && f.style.visible);
    if (features.length === 0) {
      log.warn('[HydraulicGIS] export: no visible features');
      return;
    }
    log.info('[HydraulicGIS] exporting', features.length, 'visible feature(s) as', format);
    const fc = {
      type: 'FeatureCollection',
      features: features.map(f => ({
        ...f.geojson,
        properties: {
          id: f.id, name: f.name, kind: f.kind,
          style: f.style, metrics: f.metrics,
          createdAt: f.createdAt, updatedAt: f.updatedAt,
        },
      })),
    };
    if (format === 'geojson') {
      saveAs(new Blob([JSON.stringify(fc, null, 2)], { type: 'application/geo+json' }), 'projet.geojson');
    } else if (format === 'kml') {
      const kml = featuresToKML(fc);
      saveAs(new Blob([kml], { type: 'application/vnd.google-earth.kml+xml' }), 'projet.kml');
    } else if (format === 'csv') {
      const rows = ['id,name,kind,longitude,latitude'];
      for (const f of features) {
        const c = pointCoord(f);
        if (!c) continue;
        rows.push([escapeCsv(f.id), escapeCsv(f.name), f.kind, c[0].toFixed(6), c[1].toFixed(6)].join(','));
      }
      saveAs(new Blob([rows.join('\n')], { type: 'text/csv' }), 'projet.csv');
    } else if (format === 'txt') {
      const lines = [`Atlas GIS — Export ${new Date().toISOString()}`, `Objets : ${features.length}`, '─'.repeat(60)];
      for (const f of features) {
        lines.push(`[${f.kind}] ${f.name}`);
        if (f.metrics.lengthMeters !== undefined) lines.push(`  Longueur : ${formatDistance(f.metrics.lengthMeters)}`);
        if (f.metrics.areaSquareMeters !== undefined) lines.push(`  Surface  : ${formatArea(f.metrics.areaSquareMeters)}`);
        const c = pointCoord(f);
        if (c) lines.push(`  Centre   : ${c[0].toFixed(6)}, ${c[1].toFixed(6)}`);
        lines.push('');
      }
      saveAs(new Blob([lines.join('\n')], { type: 'text/plain' }), 'projet.txt');
    }
  }

  function featuresToKML(fc) {
    // Minimal but standards-compliant GeoJSON → KML serializer.
    // Handles Point, LineString and Polygon. Names + descriptions are taken
    // from feature.properties.name / .description if present.
    const xml = ['<?xml version="1.0" encoding="UTF-8"?>'];
    xml.push('<kml xmlns="http://www.opengis.net/kml/2.2">');
    xml.push('<Document>');
    xml.push('<name>Atlas GIS export</name>');
    for (const feat of (fc.features || [])) {
      const props = feat.properties || {};
      const name = props.name ? `<name>${escXml(props.name)}</name>` : '';
      const desc = props.description ? `<description>${escXml(props.description)}</description>` : '';
      const geom = feat.geometry;
      if (!geom) continue;
      let body = '';
      if (geom.type === 'Point') {
        body = `<Point><coordinates>${coordPair(geom.coordinates)}</coordinates></Point>`;
      } else if (geom.type === 'LineString') {
        body = `<LineString><coordinates>${geom.coordinates.map(coordPair).join(' ')}</coordinates></LineString>`;
      } else if (geom.type === 'Polygon') {
        const rings = geom.coordinates.map((ring, i) => {
          const tag = i === 0 ? 'outerBoundaryIs' : 'innerBoundaryIs';
          return `<${tag}><LinearRing><coordinates>${ring.map(coordPair).join(' ')}</coordinates></LinearRing></${tag}>`;
        }).join('');
        body = `<Polygon>${rings}</Polygon>`;
      } else {
        continue; // Skip unsupported geometry types
      }
      xml.push(`<Placemark>${name}${desc}${body}</Placemark>`);
    }
    xml.push('</Document></kml>');
    return xml.join('\n');
  }
  function coordPair(c) {
    // KML expects lon,lat[,alt] — same order as GeoJSON.
    return c.length >= 3 ? `${c[0]},${c[1]},${c[2]}` : `${c[0]},${c[1]},0`;
  }
  function escXml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&apos;');
  }

  function pointCoord(f) {
    const g = f.geojson.geometry;
    if (g.type === 'Point') return g.coordinates;
    if (g.type === 'LineString' && g.coordinates.length) return g.coordinates[0];
    if (g.type === 'Polygon' && g.coordinates[0]?.length) {
      const ring = g.coordinates[0];
      let x = 0, y = 0;
      for (const c of ring) { x += c[0]; y += c[1]; }
      return [x / ring.length, y / ring.length];
    }
    return null;
  }

  function escapeCsv(s) {
    if (/[",\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
    return s;
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  /* ═══ 13. SHEET SWIPE-DOWN ══════════════════════════════════════════════════ */
  (function () {
    const handle = document.getElementById('sheet-handle');
    const sheet = document.getElementById('sheet');
    let startY = 0, dy = 0, tracking = false;

    handle.addEventListener('touchstart', (e) => {
      tracking = true;
      startY = e.touches[0].clientY;
      sheet.style.transition = 'none';
    }, { passive: true });

    handle.addEventListener('touchmove', (e) => {
      if (!tracking) return;
      dy = Math.max(0, e.touches[0].clientY - startY);
      sheet.style.transform = `translateY(${dy}px)`;
    }, { passive: true });

    handle.addEventListener('touchend', () => {
      if (!tracking) return;
      tracking = false;
      sheet.style.transition = '';
      sheet.style.transform = '';
      if (dy > 60) ui.closeSheet();
      dy = 0;
    });
  })();

  /* ═══ 14. EVENT LISTENERS ═══════════════════════════════════════════════════ */
  document.querySelectorAll('.rail-btn').forEach(btn => {
    btn.addEventListener('click', () => ui.setPanel(btn.dataset.panel));
  });
  // Only basemap buttons have data-basemap; the view-controls share the class but not the attr.
  document.querySelectorAll('.basemap-btn[data-basemap]').forEach(btn => {
    btn.addEventListener('click', () => setBasemap(btn.dataset.basemap));
  });

  // ═══ View controls — zoom-to-features ══════════════════════════════════════
  // "Zoom étendu" (Zoom Extents): center the map on the bounding box of
  // all current features, like the AutoCAD command. Useful after the user
  // has drawn a few objects and panned away. Falls back to the default
  // Morocco view if there are no features.
  document.getElementById('vc-zoom-extents')?.addEventListener('click', () => {
    try {
      const visible = state.features.filter(f => f.style && f.style.visible);
      const list = visible.length > 0 ? visible : state.features;
      if (list.length === 0) {
        map.flyTo({ center: [-5.0, 33.5], zoom: 5, essential: true });
        return;
      }
      const fc = { type: 'FeatureCollection', features: list.map(f => f.geojson) };
      const [minX, minY, maxX, maxY] = turf.bbox(fc);
      // Guard against degenerate bbox (single point feature). In that
      // case, just fly to it at a reasonable zoom.
      if (minX === maxX && minY === maxY) {
        map.flyTo({ center: [minX, minY], zoom: 16, essential: true });
        return;
      }
      map.fitBounds([[minX, minY], [maxX, maxY]], {
        padding: { top: 60, bottom: 60, left: 60, right: 60 },
        maxZoom: 18,
        duration: 600,
      });
    } catch (err) {
      log.warn('[HydraulicGIS] zoom-extents failed:', err);
    }
  });

  // Close sheet on resize across breakpoint
  window.addEventListener('resize', () => ui.render());

  // ═══ Keyboard shortcuts ════════════════════════════════════════════════════
  window.addEventListener('keydown', (e) => {
    // Don't intercept while typing in inputs
    const tag = e.target?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

    if (e.key === 'Escape') {
      // Close any open panel / sheet / confirm modal
      if (document.getElementById('confirm-bg').classList.contains('visible')) {
        ui.closeConfirm();
      } else if (state.activePanel) {
        if (ui.isMobile()) ui.closeSheet();
        else ui.setPanel(null);
      }
    } else if (e.key === 'Delete' || e.key === 'Backspace') {
      // Delete selected features
      if (state.selectedIds.length > 0) {
        e.preventDefault();
        const n = state.selectedIds.length;
        ui.confirm('Supprimer ?', `Supprimer ${n} objet${n > 1 ? 's' : ''} ?`, () => {
          state.selectedIds.forEach(id => removeFeature(id));
        });
      }
    }
  });

  /* ═══ 15. INIT ══════════════════════════════════════════════════════════════ */
  // Sync basemap buttons UI to the (possibly-restored) basemap value.
  document.querySelectorAll('.basemap-btn[data-basemap]').forEach(b => {
    b.classList.toggle('active', b.dataset.basemap === state.basemap);
  });
  ui.render();
  </script>
</body>
</html>
