  function attachToolsEvents(root) {
    // ─── Bornage (polygon by coordinates) ───
    (function bornage() {
      if (!state._bornage) state._bornage = { crs: 'wgs84', points: [] };
      const crsSel = root.querySelector('#bn-crs');
      const xIn = root.querySelector('#bn-x');
      const yIn = root.querySelector('#bn-y');
      const addBtn = root.querySelector('#bn-add');
      const finishBtn = root.querySelector('#bn-finish');
      const msgEl = root.querySelector('#bn-msg');
      const listEl = root.querySelector('#bn-list');
      if (!crsSel || !addBtn || !finishBtn) return;

      const showMsg = (text, kind) => {
        if (!msgEl) return;
        msgEl.textContent = text || '';
        msgEl.style.color = kind === 'err' ? 'var(--danger)' : kind === 'ok' ? 'var(--success)' : 'var(--ink-1)';
      };
      const updateLabels = () => {
        const geo = state._bornage.crs === 'wgs84';
        const xl = root.querySelector('#bn-x-label');
        const yl = root.querySelector('#bn-y-label');
        if (xl) xl.textContent = geo ? 'Longitude' : 'X (Est)';
        if (yl) yl.textContent = geo ? 'Latitude' : 'Y (Nord)';
      };
      const renderList = () => {
        if (!listEl) return;
        const pts = state._bornage.points;
        if (!pts.length) {
          listEl.innerHTML = '<div style="font-size:11px;color:var(--ink-2);">Aucun point saisi.</div>';
          return;
        }
        listEl.innerHTML = pts.map((p, i) => `
          <div style="display:flex; align-items:center; gap:8px; font-size:11px; font-family:'JetBrains Mono',ui-monospace,monospace; padding:3px 0; border-bottom:1px solid var(--line);">
            <span style="color:var(--ink-2); width:22px;">${i + 1}</span>
            <span style="flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(p.label)}</span>
            <button class="layer-action danger" data-bn-remove="${i}" title="Retirer" style="width:26px;height:26px;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
          </div>`).join('');
        listEl.querySelectorAll('[data-bn-remove]').forEach(b => {
          b.addEventListener('click', () => {
            const idx = parseInt(b.getAttribute('data-bn-remove'), 10);
            if (!isNaN(idx)) { state._bornage.points.splice(idx, 1); renderList(); showMsg('', ''); }
          });
        });
      };

      // Restore persisted UI state.
      crsSel.value = state._bornage.crs;
      updateLabels();
      renderList();

      crsSel.addEventListener('change', () => {
        state._bornage.crs = crsSel.value;
        updateLabels();
      });

      const addPoint = () => {
        const crs = state._bornage.crs;
        const x = parseCoord(xIn ? xIn.value : '');
        const y = parseCoord(yIn ? yIn.value : '');
        if (x === null || y === null) { showMsg('Coordonnées invalides. Vérifiez la saisie.', 'err'); return; }
        let lng, lat;
        try {
          if (crs === 'wgs84') { lng = x; lat = y; }
          else { const r = reproject([x, y], crs, 'wgs84'); lng = r[0]; lat = r[1]; }
        } catch (e) { showMsg('Conversion de coordonnées impossible.', 'err'); return; }
        if (!isFinite(lng) || !isFinite(lat) || Math.abs(lat) > 90 || Math.abs(lng) > 180) {
          showMsg('Coordonnées hors limites (vérifiez le système choisi).', 'err'); return;
        }
        const pts = state._bornage.points;
        if (pts.length) {
          const prev = pts[pts.length - 1];
          let dkm = Infinity;
          try { dkm = turf.distance([prev.lng, prev.lat], [lng, lat], { units: 'kilometers' }); } catch (_) {}
          if (dkm > 100) {
            showMsg(`Point refusé : ${dkm.toFixed(1)} km du point précédent (>100 km ⇒ erreur de saisie).`, 'err');
            return;
          }
        }
        const label = crs === 'wgs84'
          ? `${lng.toFixed(6)}, ${lat.toFixed(6)}`
          : `${formatProjected(x, 1)} ; ${formatProjected(y, 1)}`;
        pts.push({ lng, lat, x, y, crs, label });
        if (xIn) xIn.value = '';
        if (yIn) yIn.value = '';
        if (xIn) xIn.focus();
        showMsg(`Point ${pts.length} ajouté.`, 'ok');
        renderList();
      };

      const finish = () => {
        const pts = state._bornage.points;
        if (pts.length < 3) { showMsg('Au moins 3 points sont requis pour former un polygone.', 'err'); return; }
        const ring = pts.map(p => [p.lng, p.lat]);
        ring.push([pts[0].lng, pts[0].lat]); // close the ring
        try {
          const newF = addFeature(
            { type: 'Feature', geometry: { type: 'Polygon', coordinates: [ring] }, properties: { _derived: true, _derivedKind: 'bornage' } },
            'polygon',
            { name: `Bornage (${pts.length} pts)` }
          );
          ensureDerivedLayers();
          syncDerivedLayer();
          notifyFeatures();
          state._bornage.points = [];
          renderList();
          showMsg('✓ Polygone de bornage créé.', 'ok');
          try { zoomToFeature(newF.id); } catch (_) {}
          promptFeatureName(newF.id);
        } catch (e) {
          showMsg('Erreur lors de la création : ' + (e.message || e), 'err');
        }
      };

      addBtn.addEventListener('click', (e) => { e.preventDefault(); addPoint(); });
      finishBtn.addEventListener('click', (e) => { e.preventDefault(); finish(); });
      if (yIn) yIn.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); addPoint(); } });

      const fileIn = root.querySelector('#bn-file');
      const importBtn = root.querySelector('#bn-import');
      const replaceCb = root.querySelector('#bn-replace');
      if (importBtn && fileIn) {
        importBtn.addEventListener('click', (e) => { e.preventDefault(); fileIn.click(); });
        fileIn.addEventListener('change', () => {
          const file = fileIn.files && fileIn.files[0];
          fileIn.value = '';
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            const parsed = parseBornageTable(reader.result);
            if (parsed.error) { showMsg(parsed.error, 'err'); return; }
            const crs = state._bornage.crs;
            const { added, skipped } = importBornageRows(parsed.rows, crs, !!(replaceCb && replaceCb.checked));
            renderList();
            if (added === 0) {
              showMsg('Aucun point importé. Vérifiez le système de coordonnées et le format.', 'err');
            } else {
              const skipNote = skipped ? ` (${skipped} ignoré${skipped > 1 ? 's' : ''})` : '';
              showMsg(`${added} point${added > 1 ? 's' : ''} importé${added > 1 ? 's' : ''}${skipNote}.`, 'ok');
            }
          };
          reader.onerror = () => showMsg('Lecture du fichier impossible.', 'err');
          reader.readAsText(file, 'UTF-8');
        });
      }
    })();

    // Buffer
    const bfBtn = root.querySelector('#bf-apply');
    const bfIn = root.querySelector('#bf-radius');
    if (bfIn) {
      // Restore last value across panel re-renders.
      if (typeof state._bufferRadius === 'number' && !isNaN(state._bufferRadius)) {
        bfIn.value = String(state._bufferRadius);
      }
      bfIn.addEventListener('input', () => {
        const v = parseFloat(String(bfIn.value).replace(',', '.'));
        state._bufferRadius = isNaN(v) ? null : v;
      });
    }
    if (bfBtn) bfBtn.addEventListener('click', () => {
      const sel = state.features.filter(f => state.selectedIds.includes(f.id));
      if (sel.length !== 1) {
        ui.confirm('Sélection requise', 'Sélectionnez exactement 1 objet (tap sur la carte) avant de calculer le buffer.', () => {});
        return;
      }
      const src = sel[0];
      // Read FROM THE INPUT directly at click time — but ALSO have the
      // backup from state._bufferRadius in case the input was just reset
      // by a panel re-render that happened mid-flight.
      const rRaw = bfIn ? bfIn.value : '';
      const r = parseFloat(String(rRaw).replace(',', '.'));
      const radius = !isNaN(r) ? r
                   : typeof state._bufferRadius === 'number' ? state._bufferRadius
                   : NaN;
      log.info('[HydraulicGIS] buffer requested radius =', radius, 'raw input =', JSON.stringify(rRaw));
      if (isNaN(radius) || radius === 0) {
        ui.confirm('Rayon invalide', 'Entrez un nombre non nul (ex. 50). Un rayon négatif rétrécit le polygone.', () => {});
        return;
      }
      try {
        const buffered = turf.buffer(src.geojson, radius, { units: 'meters' });
        if (!buffered || !buffered.geometry) {
          ui.confirm('Buffer impossible', "L'opération n'a produit aucune géométrie (rayon trop petit ou trop négatif).", () => {});
          return;
        }
        // Mark as a derived feature: rendered on our app-derived layer
        // (NOT through terra-draw, which silently rejected it before).
        const newF = addFeature({
          type: 'Feature',
          geometry: buffered.geometry,
          properties: { _derived: true, _derivedKind: 'buffer', _bufferSourceId: src.id }
        }, 'polygon', { name: `Buffer ${radius}m de ${src.name}` });
        ensureDerivedLayers();
        syncDerivedLayer();
        notifyFeatures();
        log.info('[HydraulicGIS] buffer created:', newF.id, 'r=' + radius + 'm');
      } catch (err) {
        log.error('[HydraulicGIS] buffer failed:', err);
        ui.confirm('Erreur', "Le calcul du buffer a échoué : " + (err.message || err), () => {});
      }
    });

    // Intersection
    const itBtn = root.querySelector('#it-apply');
    if (itBtn) itBtn.addEventListener('click', () => {
      const polys = state.features
        .filter(f => state.selectedIds.includes(f.id))
        .filter(f => ['polygon', 'rectangle', 'circle'].includes(f.kind));
      if (polys.length < 2) return;
      try {
        // turf.intersect (v7 signature in this bundle) takes a
        // FeatureCollection of polygons and returns the intersection of
        // ALL of them at once. The error "Must specify at least 2
        // geometries" was thrown because we were passing two separate
        // args (v6 signature) — the first arg was being read as the FC
        // and only contained one polygon.
        const fc = turf.featureCollection(polys.map(p => p.geojson));
        const result = root.querySelector('#it-result');
        const intersection = turf.intersect(fc);
        if (!intersection || !intersection.geometry) {
          if (result) {
            result.style.color = 'var(--danger)';
            result.textContent = `Aucun chevauchement entre les ${polys.length} polygones sélectionnés.`;
          }
          return;
        }
        const acc = intersection;
        const newF = addFeature({
          type: 'Feature',
          geometry: acc.geometry,
          properties: { _derived: true, _derivedKind: 'intersection' }
        }, 'polygon', { name: `Intersection (${polys.map(p => p.name).join(' ∩ ')})` });
        ensureDerivedLayers();
        syncDerivedLayer();
        notifyFeatures();
        if (result) {
          result.style.color = 'var(--brand)';
          const areaM2 = turf.area(newF.geojson);
          result.textContent = `✓ Intersection créée. Surface : ${formatArea(areaM2)}`;
        }
        log.info('[HydraulicGIS] intersection created:', newF.id);
      } catch (err) {
        log.error('[HydraulicGIS] intersection failed:', err);
        const result = root.querySelector('#it-result');
        if (result) {
          result.style.color = 'var(--danger)';
          result.textContent = "Erreur : " + (err.message || err);
        }
      }
    });

    // Contour lines: sample elevations on a grid inside the bbox of the
    // selected polygon, then run a basic marching-squares to build polylines
    // at integer multiples of the user-given step. Network access required.
    const cnBtn = root.querySelector('#cn-apply');
    if (cnBtn) cnBtn.addEventListener('click', async () => {
      const sel = state.features.filter(f => state.selectedIds.includes(f.id));
      const polysOnly = sel.filter(f => ['polygon', 'rectangle', 'circle'].includes(f.kind));
      if (polysOnly.length !== 1) return;
      const poly = polysOnly[0];
      const stepIn = root.querySelector('#cn-step');
      const step = parseFloat(String(stepIn.value).replace(',', '.'));
      const result = root.querySelector('#cn-result');
      if (isNaN(step) || step <= 0) {
        if (result) {
          result.style.color = 'var(--danger)';
          result.textContent = "Pas invalide. Entrez un nombre positif (ex. 10).";
        }
        return;
      }

      // Prevent abuse: bbox max ~30 km × 30 km. Open-Elevation rate-limits
      // bursts; a denser grid here would also slow the marching-squares.
      const bbox = turf.bbox(poly.geojson);  // [minX, minY, maxX, maxY]
      const widthKm = turf.distance([bbox[0], bbox[1]], [bbox[2], bbox[1]], { units: 'kilometers' });
      const heightKm = turf.distance([bbox[0], bbox[1]], [bbox[0], bbox[3]], { units: 'kilometers' });
      if (widthKm > 30 || heightKm > 30) {
        if (result) {
          result.style.color = 'var(--danger)';
          result.textContent = `Polygone trop étendu (${widthKm.toFixed(1)} × ${heightKm.toFixed(1)} km). Limite 30 km.`;
        }
        return;
      }

      // Grid resolution: 25×25 = 625 sample points. Open-Elevation accepts
      // up to a few hundred per request; we batch into one POST.
      const N = 25;
      const gridLngs = new Array(N).fill(0).map((_, i) => bbox[0] + (i / (N - 1)) * (bbox[2] - bbox[0]));
      const gridLats = new Array(N).fill(0).map((_, j) => bbox[1] + (j / (N - 1)) * (bbox[3] - bbox[1]));

      cnBtn.disabled = true;
      const origLabel = cnBtn.textContent;
      cnBtn.textContent = 'Échantillonnage…';
      if (result) { result.style.color = 'var(--ink-2)'; result.textContent = 'Requête vers Open-Meteo Elevation…'; }

      try {
        // Open-Meteo Elevation API — free, no key, CORS-enabled, much
        // more reliable than Open-Elevation (which is frequently down).
        // Endpoint accepts up to 100 lat/lng pairs per call as a comma-
        // separated list. We have 25×25 = 625 points, so we batch in
        // chunks of 100. Open-Elevation kept as a fallback if Open-Meteo
        // fails (e.g. rate-limited).
        const allElevations = new Array(N * N);
        const flat = [];
        for (let j = 0; j < N; j++) for (let i = 0; i < N; i++) {
          flat.push({ lat: gridLats[j], lng: gridLngs[i] });
        }
        async function fetchElevations(points) {
          // Try Open-Meteo first.
          const lats = points.map(p => p.lat.toFixed(6)).join(',');
          const lngs = points.map(p => p.lng.toFixed(6)).join(',');
          const om = `https://api.open-meteo.com/v1/elevation?latitude=${lats}&longitude=${lngs}`;
          try {
            const r = await fetch(om);
            if (r.ok) {
              const d = await r.json();
              if (d && Array.isArray(d.elevation)) return d.elevation;
            }
          } catch (e) { log.warn('Open-Meteo elevation failed:', e); }
          // Fallback: Open-Elevation POST (often slow, sometimes 502).
          try {
            const r = await fetch('https://api.open-elevation.com/api/v1/lookup', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                locations: points.map(p => ({ latitude: p.lat, longitude: p.lng })),
              }),
            });
            if (!r.ok) throw new Error('HTTP ' + r.status);
            const d = await r.json();
            if (d && Array.isArray(d.results)) return d.results.map(x => x.elevation);
          } catch (e) { log.warn('Open-Elevation fallback failed:', e); }
          throw new Error('Aucun service d\'élévation accessible (réseau hors-ligne ?)');
        }
        // Batch by 100 points per call.
        const BATCH = 100;
        let index = 0;
        for (let off = 0; off < flat.length; off += BATCH) {
          const slice = flat.slice(off, Math.min(off + BATCH, flat.length));
          if (result) result.textContent = `Échantillonnage ${off + slice.length} / ${flat.length}…`;
          const elevs = await fetchElevations(slice);
          for (let k = 0; k < elevs.length; k++) {
            allElevations[index++] = elevs[k];
          }
        }
        // Build the elevation grid Z[j][i].
        const Z = [];
        for (let j = 0; j < N; j++) {
          Z.push(new Array(N));
          for (let i = 0; i < N; i++) {
            Z[j][i] = allElevations[j * N + i];
          }
        }
        let minZ = Infinity, maxZ = -Infinity;
        for (let j = 0; j < N; j++) for (let i = 0; i < N; i++) {
          if (Z[j][i] < minZ) minZ = Z[j][i];
          if (Z[j][i] > maxZ) maxZ = Z[j][i];
        }

        // Generate contour levels from floor(min/step)*step to ceil(max/step)*step.
        const firstLevel = Math.ceil(minZ / step) * step;
        const lastLevel  = Math.floor(maxZ / step) * step;
        const levels = [];
        for (let v = firstLevel; v <= lastLevel; v += step) levels.push(v);

        // Marching squares — one segment per cell-edge crossing.
        // For each level we collect lineStrings (we don't bother chaining
        // them — the user just sees segments rendered as polylines, which
        // visually merge into closed curves at this resolution).
        const interp = (x1, x2, z1, z2, level) => (level - z1) / (z2 - z1);
        const allFeatures = [];
        for (const L of levels) {
          const segments = [];
          for (let j = 0; j < N - 1; j++) {
            for (let i = 0; i < N - 1; i++) {
              const z00 = Z[j][i], z10 = Z[j][i+1], z11 = Z[j+1][i+1], z01 = Z[j+1][i];
              const lng0 = gridLngs[i], lng1 = gridLngs[i+1];
              const lat0 = gridLats[j], lat1 = gridLats[j+1];
              const c00 = z00 >= L ? 1 : 0;
              const c10 = z10 >= L ? 1 : 0;
              const c11 = z11 >= L ? 1 : 0;
              const c01 = z01 >= L ? 1 : 0;
              const idx = (c00 << 0) | (c10 << 1) | (c11 << 2) | (c01 << 3);
              if (idx === 0 || idx === 15) continue;
              // Edge midpoints (interpolated): bottom=lat0, right=lng1, top=lat1, left=lng0
              const mB = () => [lng0 + interp(lng0, lng1, z00, z10, L) * (lng1 - lng0), lat0];
              const mR = () => [lng1, lat0 + interp(lat0, lat1, z10, z11, L) * (lat1 - lat0)];
              const mT = () => [lng0 + interp(lng0, lng1, z01, z11, L) * (lng1 - lng0), lat1];
              const mL = () => [lng0, lat0 + interp(lat0, lat1, z00, z01, L) * (lat1 - lat0)];
              // Each case lists the segments to draw as PAIRS of edge
              // midpoints. Simple cases produce 1 segment (one inner-pair).
              // Saddle cases (5 and 10) produce 2 segments.
              let pairs;
              switch (idx) {
                case 1: case 14: pairs = [[mL, mB]]; break;
                case 2: case 13: pairs = [[mB, mR]]; break;
                case 3: case 12: pairs = [[mL, mR]]; break;
                case 4: case 11: pairs = [[mR, mT]]; break;
                case 6: case 9:  pairs = [[mB, mT]]; break;
                case 7: case 8:  pairs = [[mL, mT]]; break;
                case 5:  pairs = [[mL, mT], [mB, mR]]; break;
                case 10: pairs = [[mL, mB], [mR, mT]]; break;
                default: continue;
              }
              for (const [fA, fB] of pairs) {
                segments.push([fA(), fB()]);
              }
            }
          }
          // Clip each segment to the source polygon. Per user spec, the
          // contour lines should not extend beyond the object's boundary.
          // We test the segment midpoint with turf.booleanPointInPolygon —
          // sufficient for our short cell-edge segments (the polygon is
          // dense relative to the 25-cell grid).
          const clipped = [];
          for (const seg of segments) {
            const mid = [(seg[0][0] + seg[1][0]) / 2, (seg[0][1] + seg[1][1]) / 2];
            try {
              if (turf.booleanPointInPolygon(turf.point(mid), poly.geojson)) {
                clipped.push(seg);
              }
            } catch (_) {
              // If point-in-polygon fails (degenerate input), keep the segment.
              clipped.push(seg);
            }
          }
          // Push every kept segment as part of a MultiLineString for this level.
          if (clipped.length > 0) {
            allFeatures.push({
              type: 'Feature',
              geometry: { type: 'MultiLineString', coordinates: clipped },
              properties: { level: L },
            });
          }
        }

        if (allFeatures.length === 0) {
          if (result) {
            result.style.color = 'var(--ink-2)';
            result.textContent = `Aucune courbe générée. Pas trop grand pour cette zone (Δ alt = ${(maxZ-minZ).toFixed(1)} m).`;
          }
          return;
        }

        // Build the contour feature as a single line in our store, marked
        // as a derived feature so it's selectable / deletable / styleable.
        const merged = { type: 'MultiLineString', coordinates: [] };
        for (const f of allFeatures) merged.coordinates.push(...f.geometry.coordinates);
        const newF = addFeature({
          type: 'Feature',
          geometry: merged,
          properties: { _derived: true, _derivedKind: 'contours' }
        }, 'line', { name: `Courbes ${step}m de ${poly.name}` });

        // Generate elevation labels: place a label at the centroid of each
        // contour level's segments (one label per level, not per segment,
        // to avoid clutter).
        const elevationLabelFeatures = [];
        for (const lf of allFeatures) {
          const segs = lf.geometry.coordinates;
          if (!segs.length) continue;
          let bestSeg = segs[0];
          let bestLen = 0;
          for (const s of segs) {
            const dx = s[1][0] - s[0][0], dy = s[1][1] - s[0][1];
            const len = dx * dx + dy * dy;
            if (len > bestLen) { bestLen = len; bestSeg = s; }
          }
          const mid = [(bestSeg[0][0] + bestSeg[1][0]) / 2, (bestSeg[0][1] + bestSeg[1][1]) / 2];
          elevationLabelFeatures.push({
            type: 'Feature',
            geometry: { type: 'Point', coordinates: mid },
            properties: { elevation: lf.properties.level, contourOwnerId: newF.id },
          });
        }
        // Persist labels on the feature so they survive page refresh.
        newF.geojson.properties._elevationLabels = elevationLabelFeatures;
        saveState();
        ensureContourLabelsLayer();
        syncContourLabelsFromStore();

        ensureDerivedLayers();
        syncDerivedLayer();
        notifyFeatures();
        if (result) {
          result.style.color = 'var(--brand)';
          result.textContent = `✓ ${levels.length} niveaux tracés (alt ${minZ.toFixed(0)} → ${maxZ.toFixed(0)} m).`;
        }
        log.info('[HydraulicGIS] contour lines created:', newF.id, 'levels=' + levels.length);
      } catch (err) {
        log.error('[HydraulicGIS] contour lines failed:', err);
        if (result) {
          result.style.color = 'var(--danger)';
          result.textContent = "Erreur : " + (err.message || err) + " (Open-Elevation peut être hors-ligne)";
        }
      } finally {
        cnBtn.disabled = false;
        cnBtn.textContent = origLabel;
      }
    });
  }

  /* ═══ 10c. PANEL CONTENT — LEGEND ════════════════════════════════════════════ */
  // Default config for the legend overlay. Stored on state._legend so
  // changes persist across panel re-renders and across page reloads (via
  // saveState).
  function ensureLegendState() {
    if (!state._legend) {
      state._legend = {
        enabled: false,
        title: 'Légende',
        position: 'bottom-right',
        fontSize: 13,
        // selectedIds: optional. If null/undefined, all VISIBLE features
        // are shown. If an array, only those ids appear. The user can
        // toggle inclusion per feature via the checkboxes below.
        selectedIds: null,
        // Per-feature label overrides. {featureId: customLabel}
        labelOverrides: {},
      };
    }
  }

  function renderLegend() {
    ensureLegendState();
    const cfg = state._legend;
    const featureList = state.features.map(f => {
      const included = cfg.selectedIds === null
        ? !!f.style.visible
        : cfg.selectedIds.includes(f.id);
      const customLabel = cfg.labelOverrides[f.id];
      const swatchColor = f.kind === 'line' ? f.style.stroke : f.style.fill;
      return `
        <div class="surface" style="padding:8px 10px; margin-bottom:4px; display:flex; align-items:center; gap:8px;">
          <input type="checkbox" class="lg-item-toggle" data-id="${f.id}" ${included ? 'checked' : ''} />
          <span style="display:inline-block; width:14px; height:14px; background:${swatchColor}; border:1px solid var(--line); border-radius:2px; flex-shrink:0;"></span>
          <input type="text" class="field lg-item-label" data-id="${f.id}"
                 value="${escapeHtml(customLabel != null ? customLabel : f.name)}"
                 placeholder="${escapeHtml(f.name)}"
                 style="flex:1; min-width:0; font-size:12px; padding:4px 6px;" />
        </div>`;
    }).join('');

    return `
      <div class="stack">
        <div class="surface">
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
            <input type="checkbox" id="lg-enabled" ${cfg.enabled ? 'checked' : ''} />
            <span style="font-weight:500;">Afficher la légende sur la carte</span>
          </label>
        </div>

        <div class="surface">
          <label class="field-label">Titre</label>
          <input type="text" id="lg-title" class="field" autocapitalize="off" autocorrect="off"
                 value="${escapeHtml(cfg.title || 'Légende')}" />

          <label class="field-label" style="margin-top:10px;">Position sur la carte</label>
          <select id="lg-position" class="field">
            <option value="top-left" ${cfg.position === 'top-left' ? 'selected' : ''}>Haut-gauche</option>
            <option value="top-right" ${cfg.position === 'top-right' ? 'selected' : ''}>Haut-droite</option>
            <option value="bottom-left" ${cfg.position === 'bottom-left' ? 'selected' : ''}>Bas-gauche</option>
            <option value="bottom-right" ${cfg.position === 'bottom-right' ? 'selected' : ''}>Bas-droite</option>
          </select>

          <label class="field-label" style="margin-top:10px;">Taille du texte</label>
          <select id="lg-fontsize" class="field">
            <option value="11" ${cfg.fontSize === 11 ? 'selected' : ''}>Petit (11px)</option>
            <option value="13" ${cfg.fontSize === 13 ? 'selected' : ''}>Moyen (13px)</option>
            <option value="15" ${cfg.fontSize === 15 ? 'selected' : ''}>Grand (15px)</option>
          </select>
        </div>

        <div>
          <div class="field-label" style="display:flex; justify-content:space-between; align-items:center;">
            <span>Objets dans la légende</span>
            <button class="btn btn-ghost" id="lg-reset-selection" style="font-size:11px; min-height:auto; padding:3px 8px;">
              Synchroniser avec œil
            </button>
          </div>
          <p style="font-size:11px; color:var(--ink-2); margin:4px 0 8px;">
            Cochez les objets à inclure. Vous pouvez modifier le texte affiché pour chacun
            (laissez vide pour utiliser le nom de l'objet).
          </p>
          ${state.features.length === 0
            ? '<div class="empty-state">Aucun objet à inclure.</div>'
            : `<div id="lg-feature-list">${featureList}</div>`}
        </div>
      </div>`;
  }

  function attachLegendEvents(root) {
    ensureLegendState();
    const cfg = state._legend;
    const lgEnabled = root.querySelector('#lg-enabled');
    const lgTitle = root.querySelector('#lg-title');
    const lgPosition = root.querySelector('#lg-position');
    const lgFontSize = root.querySelector('#lg-fontsize');
    const lgReset = root.querySelector('#lg-reset-selection');

    if (lgEnabled) lgEnabled.addEventListener('change', () => {
      cfg.enabled = lgEnabled.checked;
      updateLegendBox();
    });
    if (lgTitle) lgTitle.addEventListener('input', () => {
      cfg.title = lgTitle.value;
      updateLegendBox();
    });
    if (lgPosition) lgPosition.addEventListener('change', () => {
      cfg.position = lgPosition.value;
      updateLegendBox();
    });
    if (lgFontSize) lgFontSize.addEventListener('change', () => {
      cfg.fontSize = parseInt(lgFontSize.value, 10) || 13;
      updateLegendBox();
    });
    if (lgReset) lgReset.addEventListener('click', () => {
      cfg.selectedIds = null;  // null = follow visibility
      updateLegendBox();
      ui.render();   // re-render to update the checkboxes
    });

    // Per-item checkboxes: toggle inclusion of this feature
    root.querySelectorAll('.lg-item-toggle').forEach(cb => {
      cb.addEventListener('change', () => {
        const id = cb.dataset.id;
        // First time we deviate from the default (null = follow visibility),
        // snapshot the current visible set as the explicit selection.
        if (cfg.selectedIds === null) {
          cfg.selectedIds = state.features.filter(f => f.style.visible).map(f => f.id);
        }
        if (cb.checked) {
          if (!cfg.selectedIds.includes(id)) cfg.selectedIds.push(id);
        } else {
          cfg.selectedIds = cfg.selectedIds.filter(x => x !== id);
        }
        updateLegendBox();
      });
    });
    // Per-item text inputs: override the display label
    root.querySelectorAll('.lg-item-label').forEach(inp => {
      inp.addEventListener('input', () => {
        const id = inp.dataset.id;
        const v = inp.value.trim();
        if (v) cfg.labelOverrides[id] = v;
        else delete cfg.labelOverrides[id];
        updateLegendBox();
      });
    });
  }

  // ─── Legend renderer ──────────────────────────────────────────────
  // Lazy-creates a floating box on the map and re-renders its content
  // whenever the visible feature list or settings change. Called from
  // both the tools panel handlers (above) and from syncFeaturesToMap
  // (so adding/removing/hiding an object refreshes the legend live).
  function updateLegendBox() {
    let box = document.getElementById('legend-box');
    const cfg = state._legend || { enabled: false };
    if (!cfg.enabled) {
      if (box) box.style.display = 'none';
      return;
    }
    if (!box) {
      box = document.createElement('div');
      box.id = 'legend-box';
      const appEl = document.getElementById('app') || document.body;
      appEl.appendChild(box);
    }
    // Position
    box.style.cssText = '';
    box.style.position = 'absolute';
    box.style.zIndex = '20';
    box.style.background = 'rgba(15, 19, 26, 0.92)';
    box.style.border = '1px solid var(--line)';
    box.style.borderRadius = '8px';
    box.style.padding = '10px 12px';
    box.style.minWidth = '160px';
    box.style.maxWidth = '220px';
    box.style.maxHeight = '40vh';
    box.style.overflowY = 'auto';
    box.style.color = 'var(--ink-0)';
    box.style.fontSize = (cfg.fontSize || 13) + 'px';
    box.style.lineHeight = '1.4';
    box.style.boxShadow = '0 4px 16px rgba(0,0,0,0.5)';
    box.style.display = 'block';
    // Position offsets (avoid overlap with sidebar + map controls)
    const pos = cfg.position || 'bottom-right';
    box.style.top = box.style.bottom = box.style.left = box.style.right = 'auto';
    if (pos === 'top-left')      { box.style.top = '60px';    box.style.left = '74px'; }
    else if (pos === 'top-right')    { box.style.top = '60px';    box.style.right = '10px'; }
    else if (pos === 'bottom-left')  { box.style.bottom = '40px'; box.style.left = '74px'; }
    else                              { box.style.bottom = '40px'; box.style.right = '10px'; }

    // Content: features either explicitly selected, or (if cfg.selectedIds
    // is null) all currently-visible ones.
    const selectedIds = cfg.selectedIds;
    const overrides = cfg.labelOverrides || {};
    const items = state.features.filter(f => {
      if (selectedIds === null || selectedIds === undefined) {
        return !!(f.style && f.style.visible);
      }
      return selectedIds.includes(f.id);
    });
    const header = `<div style="font-weight:600; margin-bottom:6px; color:var(--brand);">${escapeHtml(cfg.title || 'Légende')}</div>`;
    if (items.length === 0) {
      box.innerHTML = header + '<div style="color:var(--ink-2); font-style:italic;">(Aucun objet)</div>';
      return;
    }
    const rows = items.map(f => {
      const swatch = f.kind === 'line'
        ? `<span style="display:inline-block; width:14px; height:3px; background:${f.style.stroke}; margin-right:6px; vertical-align:middle;"></span>`
        : `<span style="display:inline-block; width:12px; height:12px; background:${f.style.fill}; border:1px solid ${f.style.stroke}; margin-right:6px; vertical-align:middle; border-radius:2px;"></span>`;
      const label = overrides[f.id] || f.name;
      return `<div style="margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${swatch}${escapeHtml(label)}</div>`;
    }).join('');
    box.innerHTML = header + rows;
  }

  // Lazy-create the contour rendering layer. Contours go in their own
  // layer so they're styled independently and can be cleared without
  // touching the main feature layers.
  //
  // Derived features (buffers, intersections, contour lines) are NOT
  // routed through terra-draw because:
  //   - terra-draw silently rejects features that don't pass internal
  //     validation (we observed buffers being added to our store but not
  //     showing up on the map).
  //   - terra-draw recomputes layer ordering on every render, fighting
  //     our z-index management.
  //   - they're not user-editable anyway (they're computed), so they
  //     don't need terra-draw's edit UX.
  // We render them on dedicated MapLibre layers we control.
  function ensureDerivedLayers() {
    try {
      // Source for buffer / intersection results (points + lines + polygons).
      if (!map.getSource('app-derived')) {
        map.addSource('app-derived', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      }
      // Polygon fill (with per-feature stroke/fill props).
      if (!map.getLayer('app-derived-fill')) {
        map.addLayer({
          id: 'app-derived-fill', type: 'fill', source: 'app-derived',
          filter: ['==', ['geometry-type'], 'Polygon'],
          paint: {
            'fill-color': ['coalesce', ['get', 'fill'], '#3aa0ff'],
            'fill-opacity': ['coalesce', ['get', 'fillOpacity'], 0.3],
          },
        });
      }
      if (!map.getLayer('app-derived-outline')) {
        map.addLayer({
          id: 'app-derived-outline', type: 'line', source: 'app-derived',
          filter: ['==', ['geometry-type'], 'Polygon'],
          paint: {
            'line-color': ['coalesce', ['get', 'stroke'], '#3aa0ff'],
            'line-width': ['coalesce', ['get', 'strokeWidth'], 2.5],
          },
        });
      }
      if (!map.getLayer('app-derived-line')) {
        map.addLayer({
          id: 'app-derived-line', type: 'line', source: 'app-derived',
          filter: ['in', ['geometry-type'], ['literal', ['LineString', 'MultiLineString']]],
          paint: {
            'line-color': ['coalesce', ['get', 'stroke'], '#3aa0ff'],
            'line-width': ['coalesce', ['get', 'strokeWidth'], 2.5],
          },
        });
      }
      if (!map.getLayer('app-derived-point')) {
        map.addLayer({
          id: 'app-derived-point', type: 'circle', source: 'app-derived',
          filter: ['==', ['geometry-type'], 'Point'],
          paint: {
            'circle-color': ['coalesce', ['get', 'stroke'], '#3aa0ff'],
            'circle-radius': 6,
            'circle-stroke-color': '#ffffff',
            'circle-stroke-width': 1.5,
          },
        });
      }
      // Source + layer for contour lines (separate so contours can be
      // styled distinctly with a thinner amber line).
      if (!map.getSource('app-contours')) {
        map.addSource('app-contours', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      }
      if (!map.getLayer('app-contours-line')) {
        map.addLayer({
          id: 'app-contours-line', type: 'line', source: 'app-contours',
          paint: {
            'line-color': '#ffd166',
            'line-width': 1.2,
            'line-opacity': 0.85,
          },
        });
      }
    } catch (e) {
      log.warn('[HydraulicGIS] ensureDerivedLayers failed:', e);
    }
  }
  // Push every feature in our store that has properties._derived === true
  // into the app-derived source. Called after addFeature for derived items.
  function syncDerivedLayer() {
    try {
      ensureDerivedLayers();
      const visibleDerived = state.features
        .filter(f => f.geojson && f.geojson.properties && f.geojson.properties._derived)
        .filter(f => isFeatureVisible(f));

      const contourFeatures = visibleDerived.filter(f => f.geojson.properties._derivedKind === 'contours');
      const otherDerived = visibleDerived.filter(f => f.geojson.properties._derivedKind !== 'contours');

      const ctrSrc = map.getSource('app-contours');
      if (ctrSrc) {
        ctrSrc.setData({
          type: 'FeatureCollection',
          features: contourFeatures.map(f => ({
            type: 'Feature',
            id: f.id,
            geometry: f.geojson.geometry,
            properties: { id: f.id },
          })),
        });
      }

      const src = map.getSource('app-derived');
      if (src) {
        src.setData({
          type: 'FeatureCollection',
          features: otherDerived.map(f => ({
            type: 'Feature',
            geometry: f.geojson.geometry,
            properties: {
              id: f.id,
              stroke: f.style.stroke,
              strokeWidth: f.style.strokeWidth,
              fill: f.style.fill,
              fillOpacity: f.style.fillOpacity,
            },
          })),
        });
      }
      // Keep above td-* on every sync.
      for (const id of ['app-derived-fill', 'app-derived-outline', 'app-derived-line', 'app-derived-point', 'app-contours-line']) {
        if (map.getLayer(id)) try { map.moveLayer(id); } catch (_) {}
      }
    } catch (e) {
      log.warn('[HydraulicGIS] syncDerivedLayer failed:', e);
    }
  }
  // Backwards-compat alias kept for the contour code that calls it.
  function ensureContourLayer() { ensureDerivedLayers(); }

  // Layer + source for elevation labels on contour curves.
  function ensureContourLabelsLayer() {
    try {
      ensureDerivedLayers();
      if (!map.getSource('app-contour-labels')) {
        map.addSource('app-contour-labels', {
          type: 'geojson', data: { type: 'FeatureCollection', features: [] },
        });
      }
      if (!map.getLayer('app-contour-labels-symbol')) {
        map.addLayer({
          id: 'app-contour-labels-symbol', type: 'symbol', source: 'app-contour-labels',
          layout: {
            'text-field': ['concat', ['to-string', ['round', ['get', 'elevation']]], ' m'],
            'text-font': ['Arial Unicode MS Regular'],
            'text-padding': 2,
          },
          paint: {
            'text-color': '#ffd166',
            'text-halo-color': '#0b0f14',
            'text-halo-width': 1.4,
          },
        });
      }
    } catch (e) {
      log.warn('ensureContourLabelsLayer failed:', e);
    }
  }

  /* ═══ 11. PANEL CONTENT — COORDINATES ═══════════════════════════════════════ */
  let pickModeOff = null;
  // coordHistory hoisted at script top.

  function renderCoordinates() {
    const opts = CRS_LIST.map(c => `<option value="${c.id}">${c.label}</option>`).join('');
    return `
      <div class="stack">
        <div>
          <label class="field-label">Système source</label>
          <select id="cc-from" class="field">${opts}</select>
          <select id="cc-format" class="field" style="margin-top:8px;">
            <option value="decimal">Degrés décimaux</option>
            <option value="dms">DMS (deg min sec)</option>
            <option value="dm">DM (deg min)</option>
          </select>
        </div>

        <div class="stack-tight">
          <label>
            <span class="field-label" id="cc-x-lbl">Longitude</span>
            <input type="text" id="cc-x" class="field" inputmode="text" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="ex. -5.123456" style="font-family:'JetBrains Mono',ui-monospace,monospace;" />
          </label>
          <label>
            <span class="field-label" id="cc-y-lbl">Latitude</span>
            <input type="text" id="cc-y" class="field" inputmode="text" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="ex. 33.987654" style="font-family:'JetBrains Mono',ui-monospace,monospace;" />
          </label>
          <button class="btn btn-subtle" id="cc-pick" style="width:100%;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2v4M12 18v4M2 12h4M18 12h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
            <span id="cc-pick-lbl">Choisir sur la carte</span>
          </button>
        </div>

        <div>
          <div class="row" style="justify-content:space-between;">
            <label class="field-label" style="margin-bottom:0;">Système cible</label>
            <button class="btn btn-ghost" id="cc-swap" style="font-size:12px; min-height:auto; padding:4px 8px;">↕ Inverser</button>
          </div>
          <select id="cc-to" class="field" style="margin-top:6px;">${opts}</select>
        </div>

        <div class="row">
          <button class="btn btn-solid" id="cc-convert" style="flex:1;">Convertir</button>
          <button class="btn btn-subtle" id="cc-fly" style="flex:1;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2L4 6v6c0 5 3 9 8 10 5-1 8-5 8-10V6l-8-4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
            Aller à
          </button>
        </div>

        <div id="cc-error" style="color:var(--danger); font-size:12px;"></div>

        ${(coordHistory && coordHistory.length > 0) ? `
          <div>
            <label class="field-label">Historique</label>
            <div id="cc-history">${coordHistory.map(renderHist).join('')}</div>
          </div>` : ''}
      </div>`;
  }

  function renderHist(h) {
    const inIs = CRS_BY_ID[h.from], outIs = CRS_BY_ID[h.to];
    const inText = inIs.isGeographic
      ? `${formatDecimal(h.in[0])}, ${formatDecimal(h.in[1])}`
      : `${formatProjected(h.in[0])}, ${formatProjected(h.in[1])}`;
    const outText = outIs.isGeographic
      ? `${formatDecimal(h.out[0])}, ${formatDecimal(h.out[1])}`
      : `${formatProjected(h.out[0])}, ${formatProjected(h.out[1])}`;
    return `<div class="hist-item">
      <div class="label">${inIs.label} → ${outIs.label}</div>
      <div>${inText}</div>
      <div class="out">${outText}</div>
    </div>`;
  }

  function attachCoordinatesEvents(root) {
    const fromSel = root.querySelector('#cc-from');
    const toSel = root.querySelector('#cc-to');
    const fmtSel = root.querySelector('#cc-format');
    const xIn = root.querySelector('#cc-x');
    const yIn = root.querySelector('#cc-y');
    const xLbl = root.querySelector('#cc-x-lbl');
    const yLbl = root.querySelector('#cc-y-lbl');
    const pickBtn = root.querySelector('#cc-pick');
    const pickLbl = root.querySelector('#cc-pick-lbl');
    const errEl = root.querySelector('#cc-error');

    // Defaults
    fromSel.value = 'wgs84';
    toSel.value = 'lambert-maroc-1';

    // If a pick was performed while the panel was closed (mobile flow),
    // restore the source CRS used at pick-time and inject the values now.
    if (ui._pendingPickResult) {
      const pending = ui._pendingPickResult;
      ui._pendingPickResult = null;
      fromSel.value = pending.fromCrs;
      // updateLabels() runs below — the values must be set AFTER it so the
      // placeholder doesn't fight with the actual content. We defer via
      // setTimeout because updateLabels() is registered as the 'change'
      // handler on fromSel and won't run until the field actually changes.
      setTimeout(() => {
        xIn.value = pending.x;
        yIn.value = pending.y;
      }, 0);
    }

    function updateLabels() {
      const c = CRS_BY_ID[fromSel.value];
      xLbl.textContent = c.axes[0];
      yLbl.textContent = c.axes[1];
      fmtSel.style.display = c.isGeographic ? 'block' : 'none';
      xIn.placeholder = c.isGeographic ? "ex. -5.123456 ou 5° 7' 24\" W" : 'ex. 500000.00';
      yIn.placeholder = c.isGeographic ? "ex. 33.987654 ou 33° 59' 15.55\" N" : 'ex. 300000.00';
    }
    updateLabels();
    fromSel.addEventListener('change', updateLabels);

    function parseInputs() {
      const c = CRS_BY_ID[fromSel.value];
      // Normalise the input: strip whitespace including NBSP/thin space,
      // remove thousands separators, normalise commas to dots. This makes
      // the parser tolerant to copy-pasted values from the history panel
      // (which formats with French locale: "500 000,00").
      const norm = (s) => {
        if (!s) return '';
        return String(s)
          .replace(/[\s\u00A0\u202F\u2007]/g, '')   // any whitespace + NBSP + narrow NBSP + figure space
          .replace(/,/g, '.');
      };
      if (c.isGeographic) {
        const x = parseCoord(xIn.value);
        const y = parseCoord(yIn.value);
        if (x === null || y === null) return null;
        return [x, y];
      }
      const x = parseFloat(norm(xIn.value));
      const y = parseFloat(norm(yIn.value));
      if (isNaN(x) || isNaN(y)) return null;
      return [x, y];
    }

    pickBtn.addEventListener('click', () => {
      if (pickModeOff) { pickModeOff(); pickModeOff = null; pickLbl.textContent = 'Choisir sur la carte'; return; }
      pickLbl.textContent = 'Cliquez sur la carte…';
      const canvas = map.getCanvas();
      canvas.style.cursor = 'crosshair';
      // Put terra-draw into a no-op mode so it doesn't intercept our tap.
      // Otherwise, if the user had recently used a draw mode (or select),
      // terra-draw is still listening on pointerdown via its capture-phase
      // adapter, and our map.once('click') never fires.
      let prevMode = null;
      try {
        const td = drawControl && drawControl.getTerraDrawInstance && drawControl.getTerraDrawInstance();
        if (td && typeof td.getMode === 'function' && typeof td.setMode === 'function') {
          prevMode = td.getMode();
          if (prevMode !== 'static') td.setMode('static');
        }
      } catch (_) {}
      // On mobile, the bottom-sheet panel covers most of the map, making it
      // impossible to tap on the visible area. We hide the sheet during the
      // pick gesture and reopen it once a coordinate has been chosen.
      const wasMobileSheetOpen = ui.isMobile()
        && document.getElementById('sheet').classList.contains('visible');
      if (wasMobileSheetOpen) {
        document.getElementById('scrim').classList.remove('visible');
        document.getElementById('sheet').classList.remove('visible');
      }
      // Show a top-screen banner so the user knows pick is active and has
      // a way to cancel without finding the original button.
      const banner = ensurePickBanner();
      banner.classList.add('visible');
      const restoreMode = () => {
        try {
          const td = drawControl && drawControl.getTerraDrawInstance && drawControl.getTerraDrawInstance();
          if (td && prevMode && prevMode !== 'static' && typeof td.setMode === 'function') {
            td.setMode(prevMode);
          }
        } catch (_) {}
      };
      const reopenSheet = () => {
        if (wasMobileSheetOpen) {
          // Reopen the sheet on the same panel (coordinates) so the user
          // sees their newly-filled input.
          ui.openSheet('coordinates');
        }
      };
      const cleanup = () => {
        canvas.style.cursor = '';
        banner.classList.remove('visible');
        pickLbl.textContent = 'Choisir sur la carte';
        restoreMode();
      };
      const onClick = (e) => {
        const { lng, lat } = e.lngLat;
        const c = CRS_BY_ID[fromSel.value];
        const [x, y] = c.id === 'wgs84' ? [lng, lat] : reproject([lng, lat], 'wgs84', c.id);
        // Re-query the input elements because if the panel was reopened,
        // the previous DOM nodes were destroyed by the panel re-render.
        // We update via a safe lookup on the visible sheet content.
        const xUpdated = c.isGeographic ? x.toFixed(6) : x.toFixed(2);
        const yUpdated = c.isGeographic ? y.toFixed(6) : y.toFixed(2);
        // Stash on the global so the panel re-init can pick them up.
        ui._pendingPickResult = { x: xUpdated, y: yUpdated, fromCrs: fromSel.value };
        pickModeOff = null;
        cleanup();
        reopenSheet();
      };
      map.once('click', onClick);
      // Banner cancel handler
      banner.onclick = () => {
        if (pickModeOff) { pickModeOff(); pickModeOff = null; }
      };
      pickModeOff = () => {
        map.off('click', onClick);
        cleanup();
        reopenSheet();
      };
    });

    root.querySelector('#cc-swap').addEventListener('click', () => {
      const a = fromSel.value, b = toSel.value;
      fromSel.value = b; toSel.value = a;
      xIn.value = ''; yIn.value = '';
      updateLabels();
    });

    root.querySelector('#cc-convert').addEventListener('click', () => {
      errEl.textContent = '';
      const inp = parseInputs();
      if (!inp) { errEl.textContent = 'Coordonnées invalides — vérifiez le format.'; return; }
      const out = reproject(inp, fromSel.value, toSel.value);
      coordHistory.unshift({ from: fromSel.value, to: toSel.value, in: inp, out, ts: Date.now() });
      coordHistory = coordHistory.slice(0, 20);
      // CRITICAL: do NOT call ui.render() here — it re-renders the whole
      // panel, which DESTROYS the cc-x and cc-y input DOM nodes and
      // RECREATES them empty. That was the cause of "Aller à" failing
      // after a successful convert: the inputs looked the same to the user
      // but were actually empty <input> elements with no value.
      // Instead, surgically refresh just the history section.
      refreshHistory();
    });

    // Re-render only the history block (without rebuilding the input fields).
    // Also wires click handlers so tapping a history row flies to that point.
    function refreshHistory() {
      let histWrap = root.querySelector('#cc-history');
      if (!histWrap) {
        // The history wrapper didn't exist (first conversion of the session).
        // We need to create the surrounding label/wrapper. Easiest: append.
        const errBlock = root.querySelector('#cc-error');
        const block = document.createElement('div');
        block.innerHTML = `<label class="field-label">Historique</label>
                           <div id="cc-history"></div>`;
        errBlock.parentNode.insertBefore(block, errBlock.nextSibling);
        histWrap = root.querySelector('#cc-history');
      }
      histWrap.innerHTML = coordHistory.map(renderHist).join('');
      // Make each row clickable: tap → fly to the converted point. We use
      // the WGS84 form for fly-to. If neither side is WGS84 we project the
      // input through it (Lambert is in metres, not lng/lat).
      histWrap.querySelectorAll('.hist-item').forEach((el, i) => {
        el.style.cursor = 'pointer';
        el.title = 'Touchez pour aller à ce point';
        el.addEventListener('click', () => {
          const h = coordHistory[i];
          if (!h) return;
          let lng, lat;
          if (h.from === 'wgs84') { [lng, lat] = h.in; }
          else if (h.to === 'wgs84') { [lng, lat] = h.out; }
          else { [lng, lat] = reproject(h.in, h.from, 'wgs84'); }
          map.flyTo({ center: [lng, lat], zoom: Math.min(13, map.getMaxZoom()), essential: true });
          createNavPoint(lng, lat);
        });
      });
    }
    // Wire history rows that were rendered server-side (i.e. on initial
    // render of an already-populated history).
    refreshHistory();

    root.querySelector('#cc-fly').addEventListener('click', () => {
      errEl.textContent = '';
      const inp = parseInputs();
      if (!inp) { errEl.textContent = 'Coordonnées invalides.'; return; }
      const [lng, lat] = fromSel.value === 'wgs84' ? inp : reproject(inp, fromSel.value, 'wgs84');
      // Use a reasonable zoom that always has imagery available worldwide.
      // z13 is a city/neighbourhood view (~5km across) — close enough to
      // identify the location, far enough to work in low-resolution areas
      // (rural Morocco, deserts) where ESRI doesn't have z18+ tiles.
      // Also: cap by the map's maxZoom in case the user has overridden it.
      const targetZoom = Math.min(13, map.getMaxZoom());
      map.flyTo({ center: [lng, lat], zoom: targetZoom, essential: true });
      createNavPoint(lng, lat, `Point (${lng.toFixed(5)}, ${lat.toFixed(5)})`);
    });
  }

  /* ═══ 12. PANEL CONTENT — IMPORT / EXPORT ═══════════════════════════════════ */
  function renderFiles() {
    const visibleCount = state.features.filter(f => f.style && f.style.visible).length;
    const totalCount = state.features.length;
    const noneVisible = visibleCount === 0;
    const exportHint = totalCount === 0
      ? 'Aucun objet à exporter.'
      : noneVisible
        ? `${totalCount} objet(s) au total, mais tous masqués (œil fermé). Activez l'œil dans « Calques » pour les inclure.`
        : `${visibleCount} sur ${totalCount} objet(s) seront exportés (ceux dont l'œil est actif dans « Calques »).`;
    return `
      <div class="stack">
        <div>
          <label class="field-label">Importer</label>
          <p style="font-size:12px; color:var(--ink-1); margin:0 0 8px;">
            Formats supportés : GeoJSON, JSON, CSV (avec colonnes longitude/latitude).
          </p>
          <button class="btn btn-subtle" id="files-import" style="width:100%;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 4v12M6 10l6 6 6-6M4 20h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Importer un fichier

          <div id="files-status" style="font-size:12px; margin-top:8px;"></div>

            : `<div class="export-grid">

                <button class="export-btn" data-export="kml">KML</button>
                <button class="export-btn" data-export="csv">CSV<span class="hint">Points uniquement</span></button>
                <button class="export-btn" data-export="txt">TXT<span class="hint">Rapport texte</span></button>

  function attachFilesEvents(root) {

    });

  /* ═══ 12bis. PANEL CONTENT — SEARCH / GO TO ════════════════════════════════ */
  // searchHistory + searchMarker hoisted at script top.

  function renderSearch() {
    return `
      <div class="stack">
        <p style="font-size:12px; color:var(--ink-1); margin:0;">
          Saisissez des coordonnées WGS84 (lon, lat) ou Lambert Maroc (X, Y) — la carte sera centrée sur ce point.
        </p>

        <div>
          <label class="field-label">Système</label>
          <select id="sr-crs" class="field">
            <option value="wgs84">GPS (WGS84) — lon, lat</option>
            <option value="lambert-maroc-1">Maroc Lambert Zone 1 — X, Y</option>
          </select>
        </div>

        <div>
          <label class="field-label" id="sr-x-lbl">Longitude (ou X, Y séparés par une virgule)</label>
          <input type="text" id="sr-input" class="field" inputmode="text" autocapitalize="off" autocorrect="off" spellcheck="false"
                 placeholder="ex. -8.0083, 31.6295 ou 31.6295 -8.0083"
                 style="font-family:'JetBrains Mono',ui-monospace,monospace;" />
        </div>

        <div class="row">
          <button class="btn btn-solid" id="sr-go" style="flex:1;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2"/><path d="M16 16l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Aller
          </button>
          <button class="btn btn-subtle" id="sr-clear" title="Effacer le marqueur">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M6 18L18 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>

        <div id="sr-error" style="color:var(--danger); font-size:12px;"></div>

        <div class="surface" style="font-size:12px;">
          <div style="font-weight:500; margin-bottom:6px;">Exemples :</div>
          <div style="font-family:'JetBrains Mono',ui-monospace,monospace; color:var(--ink-1); line-height:1.6;">
            • Marrakech : <span style="color:var(--brand); cursor:pointer;" data-fill="-8.0083, 31.6295">-8.0083, 31.6295</span><br/>
            • Casablanca : <span style="color:var(--brand); cursor:pointer;" data-fill="-7.5898, 33.5731">-7.5898, 33.5731</span><br/>
            • Rabat : <span style="color:var(--brand); cursor:pointer;" data-fill="-6.8326, 34.0209">-6.8326, 34.0209</span>
          </div>
        </div>

        ${searchHistory.length > 0 ? `
          <div>
            <label class="field-label">Historique récent</label>
            <div id="sr-history" class="stack-tight">
              ${searchHistory.map(h => `
                <button class="surface" style="display:flex; flex-direction:column; align-items:flex-start; gap:2px; cursor:pointer; text-align:left; width:100%; padding:8px 12px; border:1px solid var(--line); background:var(--bg-2); color:var(--ink-0);" data-recall="${h.input}">
                  <span style="font-family:'JetBrains Mono',ui-monospace,monospace; font-size:12px;">${escapeHtml(h.input)}</span>
                  <span style="font-size:10px; color:var(--ink-2);">${escapeHtml(h.crs)}</span>
                </button>
              `).join('')}
            </div>
          </div>` : ''}
      </div>`;
  }

  function attachSearchEvents(root) {
    const inp = root.querySelector('#sr-input');
    const crsSel = root.querySelector('#sr-crs');
    const errEl = root.querySelector('#sr-error');

    function go() {
      errEl.textContent = '';
      let raw = inp.value.trim();
      if (!raw) { errEl.textContent = 'Saisissez une coordonnée.'; return; }
      // Be lenient: strip parentheses/brackets and collapse whitespace.
      raw = raw.replace(/[()[\]{}]/g, '').trim();
      const parts = raw.split(/[,;\s]+/).filter(Boolean);
      if (parts.length < 2) { errEl.textContent = 'Format attendu : deux nombres séparés par une virgule, un espace ou un point-virgule.'; return; }
      let a = parseCoord(parts[0]); if (a === null) a = parseFloat(parts[0].replace(',', '.'));
      let b = parseCoord(parts[1]); if (b === null) b = parseFloat(parts[1].replace(',', '.'));
      if (isNaN(a)) { errEl.textContent = `« ${parts[0]} » n'est pas un nombre valide.`; return; }
      if (isNaN(b)) { errEl.textContent = `« ${parts[1]} » n'est pas un nombre valide.`; return; }

      let lng, lat;
      if (crsSel.value === 'wgs84') {
        // Heuristic: if first |a| > 90, user gave lat,lon; otherwise lon,lat.
        if (Math.abs(a) > 90 && Math.abs(b) <= 90) { lat = a; lng = b; }
        else if (Math.abs(b) > 90 && Math.abs(a) <= 90) { lng = b; lat = a; }
        else { lng = a; lat = b; }
        // For Morocco, lat is positive 21-36, lon is negative -17 to -1. Sanity-flip.
        if (lat > -10 && lat < 0 && lng > 20 && lng < 40) { const t = lat; lat = lng; lng = t; }
      } else {
        // Lambert: a=X, b=Y
        const wgs = reproject([a, b], 'lambert-maroc-1', 'wgs84');
        lng = wgs[0]; lat = wgs[1];
      }

      if (isNaN(lng) || isNaN(lat) || Math.abs(lat) > 90 || Math.abs(lng) > 180) {
        errEl.textContent = 'Coordonnées hors limites.'; return;
      }

      // Register as a deletable point object in Calques.
      createNavPoint(lng, lat, raw || `Point (${lng.toFixed(5)}, ${lat.toFixed(5)})`);
      map.flyTo({ center: [lng, lat], zoom: Math.min(13, map.getMaxZoom()), essential: true });

      // Add to history
      searchHistory.unshift({ input: raw, crs: CRS_BY_ID[crsSel.value].label, ts: Date.now() });
      searchHistory = searchHistory.slice(0, 8);
    }

    root.querySelector('#sr-go').addEventListener('click', go);
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') go(); });
    root.querySelector('#sr-clear').addEventListener('click', () => {
      clearEphemeralMarkers();
      inp.value = '';
      errEl.textContent = '';
    });
    root.querySelectorAll('[data-fill]').forEach(el => {
      el.addEventListener('click', () => { inp.value = el.dataset.fill; go(); });
    });
    root.querySelectorAll('[data-recall]').forEach(el => {
      el.addEventListener('click', () => { inp.value = el.dataset.recall; go(); });
    });
  }

  /* ═══ 12ter. PANEL CONTENT — ELEVATION PROFILE ═════════════════════════════ */
  // elevationCache + elevationHoverMarker hoisted at script top.

  function renderElevation() {
    const sel = state.features.filter(f => state.selectedIds.includes(f.id) && f.kind === 'line');
    if (sel.length === 0) {
      return `<div class="empty-state">
        Sélectionnez une <b>ligne</b> dans le panneau « Calques » pour afficher son profil d'élévation.
        <div class="small">L'élévation est récupérée depuis l'API Open-Meteo (gratuite).</div>
      </div>`;
    }
    if (sel.length > 1) {
      return `<div class="empty-state">Sélectionnez une seule ligne à la fois pour le profil d'élévation.</div>`;
    }
    const f = sel[0];
    const cached = elevationCache.get(f.id);
    return `
      <div class="stack">
        <div style="font-size:12px; color:var(--ink-2);">
          Ligne sélectionnée : <span style="color:var(--ink-0)">${escapeHtml(f.name)}</span>
          ${f.metrics.lengthMeters ? ` · longueur ${formatDistance(f.metrics.lengthMeters)}` : ''}
        </div>

        ${cached ? renderElevationChart(cached) : `
          <button class="btn btn-solid" id="el-fetch" style="width:100%;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 18l5-9 4 5 4-7 5 11H3z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
            Calculer le profil d'élévation
          </button>
          <p style="font-size:11px; color:var(--ink-2); margin:0;">
            Le calcul échantillonne 100 points le long de la ligne et interroge l'API Open-Meteo.
            Une connexion internet est requise.
          </p>
        `}

        <div id="el-status" style="font-size:12px;"></div>
      </div>`;
  }

  function renderElevationChart(data) {
    // data = { samples: [{distM, elev, lng, lat}, ...], stats: {min, max, ascent, descent} }
    const W = 320, H = 180, PAD_L = 36, PAD_R = 8, PAD_T = 8, PAD_B = 22;
    const innerW = W - PAD_L - PAD_R;
    const innerH = H - PAD_T - PAD_B;
    const xs = data.samples.map(s => s.distM);
    const ys = data.samples.map(s => s.elev);
    const xMax = Math.max(...xs);
    const yMin = Math.min(...ys);
    const yMax = Math.max(...ys);
    const yPad = Math.max(2, (yMax - yMin) * 0.1);
    const yLo = yMin - yPad, yHi = yMax + yPad;
    const px = (d) => PAD_L + (d / xMax) * innerW;
    const py = (z) => PAD_T + innerH - ((z - yLo) / (yHi - yLo)) * innerH;

    // Build path
    const points = data.samples.map(s => `${px(s.distM).toFixed(1)},${py(s.elev).toFixed(1)}`).join(' L ');
    const areaPoints = `${PAD_L},${PAD_T + innerH} L ${points} L ${PAD_L + innerW},${PAD_T + innerH} Z`;

    // Axis labels
    const yTicks = 4;
    const yTickEls = [];
    for (let i = 0; i <= yTicks; i++) {
      const z = yLo + (yHi - yLo) * (i / yTicks);
      const yPos = py(z);
      yTickEls.push(`<text x="${PAD_L - 4}" y="${yPos + 3}" text-anchor="end" font-size="9" fill="#aab4c2" font-family="monospace">${z.toFixed(0)}</text>`);
      yTickEls.push(`<line x1="${PAD_L}" y1="${yPos}" x2="${PAD_L + innerW}" y2="${yPos}" stroke="#232c38" stroke-width="0.5"/>`);
    }
    const xTicks = 4;
    const xTickEls = [];
    for (let i = 0; i <= xTicks; i++) {
      const d = (xMax * i) / xTicks;
      const xPos = px(d);
      xTickEls.push(`<text x="${xPos}" y="${H - 6}" text-anchor="middle" font-size="9" fill="#aab4c2" font-family="monospace">${d < 1000 ? d.toFixed(0) + 'm' : (d / 1000).toFixed(1) + 'km'}</text>`);
    }

    return `
      <div>
        <svg id="el-svg" viewBox="0 0 ${W} ${H}" style="width:100%; height:auto; background:var(--bg-2); border:1px solid var(--line); border-radius:6px; display:block;">
          ${yTickEls.join('')}
          ${xTickEls.join('')}
          <path d="M ${areaPoints}" fill="rgba(58,160,255,0.15)"/>
          <path d="M ${points}" fill="none" stroke="#3aa0ff" stroke-width="1.5"/>
          <line id="el-cursor" x1="-10" y1="${PAD_T}" x2="-10" y2="${PAD_T + innerH}" stroke="#f7b955" stroke-width="1" stroke-dasharray="2,2"/>
          <circle id="el-cursor-dot" cx="-10" cy="-10" r="3" fill="#f7b955"/>
          <text id="el-cursor-text" x="0" y="0" font-size="10" fill="#f7b955" font-family="monospace" visibility="hidden"></text>
          <rect id="el-hit" x="${PAD_L}" y="${PAD_T}" width="${innerW}" height="${innerH}" fill="transparent"/>
        </svg>

        <div class="surface" style="margin-top:10px; font-family:'JetBrains Mono',ui-monospace,monospace; font-size:12px; padding:10px;">
          <div class="row" style="justify-content:space-between;">
            <span><span style="color:var(--ink-2)">Min :</span> ${data.stats.min.toFixed(0)} m</span>
            <span><span style="color:var(--ink-2)">Max :</span> ${data.stats.max.toFixed(0)} m</span>
          </div>
          <div class="row" style="justify-content:space-between; margin-top:4px;">
            <span style="color:#3ecf8e;"><span style="color:var(--ink-2)">▲ Montée :</span> ${data.stats.ascent.toFixed(0)} m</span>
            <span style="color:#ef5a5a;"><span style="color:var(--ink-2)">▼ Descente :</span> ${data.stats.descent.toFixed(0)} m</span>
          </div>
          <div style="margin-top:4px;">
            <span style="color:var(--ink-2)">Pente moyenne :</span> ${(data.stats.ascent / data.samples[data.samples.length-1].distM * 100).toFixed(1)} %
          </div>
        </div>

        <button class="btn btn-subtle" id="el-recompute" style="width:100%; margin-top:8px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 4v5h5 M4 9a8 8 0 0114-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M20 20v-5h-5 M20 15a8 8 0 01-14 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Recalculer
        </button>
      </div>`;
  }

  function attachElevationEvents(root) {
    const fetchBtn = root.querySelector('#el-fetch');
    const recompute = root.querySelector('#el-recompute');
    const status = root.querySelector('#el-status');
    const sel = state.features.filter(f => state.selectedIds.includes(f.id) && f.kind === 'line');
    if (sel.length !== 1) return;
    const f = sel[0];

    async function fetchProfile() {
      if (status) { status.className = 'notice'; status.textContent = 'Échantillonnage de la ligne…'; }
      try {
        const samples = sampleLine(f.geojson, 100);
        if (status) status.textContent = `Récupération de ${samples.length} élévations…`;
        const elevs = await fetchElevations(samples.map(s => [s.lng, s.lat]));
        const enriched = samples.map((s, i) => ({ ...s, elev: elevs[i] }));
        const stats = computeElevationStats(enriched);
        elevationCache.set(f.id, { samples: enriched, stats });
        if (status) { status.className = 'notice notice-success'; status.textContent = 'Profil calculé.'; }
        ui.render();
      } catch (err) {
        if (status) {
          status.className = 'notice notice-error';
          status.textContent = `Erreur : ${err.message}`;
        }
      }
    }
    if (fetchBtn) fetchBtn.addEventListener('click', fetchProfile);
    if (recompute) recompute.addEventListener('click', () => { elevationCache.delete(f.id); ui.render(); });

    // Hover sync between chart and map
    const svg = root.querySelector('#el-svg');
    const hit = root.querySelector('#el-hit');
    if (svg && hit && elevationCache.has(f.id)) {
      const data = elevationCache.get(f.id);
      const cursor = svg.querySelector('#el-cursor');
      const cursorDot = svg.querySelector('#el-cursor-dot');
      const cursorText = svg.querySelector('#el-cursor-text');

      const W = 320, PAD_L = 36, PAD_R = 8, PAD_T = 8, PAD_B = 22, H = 180;
      const innerW = W - PAD_L - PAD_R;
      const innerH = H - PAD_T - PAD_B;
      const xs = data.samples.map(s => s.distM);
      const ys = data.samples.map(s => s.elev);
      const xMax = Math.max(...xs);
      const yMin = Math.min(...ys), yMax = Math.max(...ys);
      const yPad = Math.max(2, (yMax - yMin) * 0.1);
      const yLo = yMin - yPad, yHi = yMax + yPad;

      function onMove(e) {
        const rect = hit.getBoundingClientRect();
        const cx = e.clientX !== undefined ? e.clientX : e.touches[0].clientX;
        const ratio = (cx - rect.left) / rect.width;
        if (ratio < 0 || ratio > 1) return;
        const dist = ratio * xMax;
        // Find nearest sample
        let bestI = 0, bestD = Infinity;
        for (let i = 0; i < data.samples.length; i++) {
          const d = Math.abs(data.samples[i].distM - dist);
          if (d < bestD) { bestD = d; bestI = i; }
        }
        const s = data.samples[bestI];
        const px = PAD_L + (s.distM / xMax) * innerW;
        const py = PAD_T + innerH - ((s.elev - yLo) / (yHi - yLo)) * innerH;
        cursor.setAttribute('x1', px); cursor.setAttribute('x2', px);
        cursorDot.setAttribute('cx', px); cursorDot.setAttribute('cy', py);
        cursorText.setAttribute('x', Math.min(px + 4, W - 60));
        cursorText.setAttribute('y', Math.max(py - 4, 12));
        cursorText.textContent = `${s.elev.toFixed(0)}m · ${formatDistance(s.distM)}`;
        cursorText.setAttribute('visibility', 'visible');

        // Show map hover marker
        if (!elevationHoverMarker) {
          const dot = document.createElement('div');
          dot.style.cssText = 'width:14px;height:14px;border-radius:50%;background:#f7b955;border:2px solid #fff;box-shadow:0 0 8px rgba(247,185,85,0.6);';
          elevationHoverMarker = new maplibregl.Marker({ element: dot }).setLngLat([s.lng, s.lat]).addTo(map);
        } else {
          elevationHoverMarker.setLngLat([s.lng, s.lat]);
        }
      }
      function onLeave() {
        cursor.setAttribute('x1', -10); cursor.setAttribute('x2', -10);
        cursorDot.setAttribute('cx', -10); cursorDot.setAttribute('cy', -10);
        cursorText.setAttribute('visibility', 'hidden');
        if (elevationHoverMarker) { elevationHoverMarker.remove(); elevationHoverMarker = null; }
      }
      hit.addEventListener('mousemove', onMove);
      hit.addEventListener('mouseleave', onLeave);
      hit.addEventListener('touchmove', onMove, { passive: true });
      hit.addEventListener('touchend', onLeave);
    }
  }

  // Sample a LineString into N points with distance-along values.
  function sampleLine(feature, n) {
    const coords = feature.geometry.coordinates;
    if (!coords || coords.length < 2) throw new Error('Ligne invalide.');
    // Total length using turf
    const totalKm = turf.length(feature, { units: 'kilometers' });
    const step = totalKm / (n - 1);
    const samples = [];
    for (let i = 0; i < n; i++) {
      const distKm = i * step;
      const pt = turf.along(feature, distKm, { units: 'kilometers' });
      const c = pt.geometry.coordinates;
      samples.push({ lng: c[0], lat: c[1], distM: distKm * 1000 });
    }
    return samples;
  }

  async function fetchElevations(lngLats) {
    // Open-Meteo elevation API: https://api.open-meteo.com/v1/elevation
    // Limit: 100 points per request, &latitude=...&longitude=... (comma-sep).
    const all = [];
    const CHUNK = 100;
    for (let i = 0; i < lngLats.length; i += CHUNK) {
      const chunk = lngLats.slice(i, i + CHUNK);
      const lats = chunk.map(c => c[1].toFixed(6)).join(',');
      const lons = chunk.map(c => c[0].toFixed(6)).join(',');
      const url = `https://api.open-meteo.com/v1/elevation?latitude=${lats}&longitude=${lons}`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`Open-Meteo HTTP ${resp.status}`);
      const data = await resp.json();
      if (!data.elevation) throw new Error('Réponse Open-Meteo invalide.');
      all.push(...data.elevation);
    }
    return all;
  }

  function computeElevationStats(samples) {
    let min = Infinity, max = -Infinity, ascent = 0, descent = 0;
    for (let i = 0; i < samples.length; i++) {
      if (samples[i].elev < min) min = samples[i].elev;
      if (samples[i].elev > max) max = samples[i].elev;
      if (i > 0) {
        const d = samples[i].elev - samples[i - 1].elev;
        if (d > 0) ascent += d; else descent += -d;
      }
    }
    return { min, max, ascent, descent };
  }

  /* ═══ 12quater. PANEL CONTENT — COORDINATE GRID ════════════════════════════ */
  // gridState hoisted at script top.

  function renderGrid() {
    return `
      <div class="stack">
        <p style="font-size:12px; color:var(--ink-1); margin:0;">
          Affichez une grille de coordonnées sur la carte. La grille s'adapte automatiquement au niveau de zoom.
        </p>

        <label class="checkbox-row">
          <input type="checkbox" id="gr-on" ${gridState.enabled ? 'checked' : ''}/>
          <span style="font-weight:500;">Activer la grille</span>
        </label>

        <fieldset id="gr-fields" style="border:none; padding:0; margin:0; ${gridState.enabled ? '' : 'opacity:0.5;'}">

            <label class="field-label">Système de coordonnées</label>
            <select id="gr-crs" class="field" ${gridState.enabled ? '' : 'disabled'}>

              <option value="lambert-maroc-1" ${gridState.crs === 'lambert-maroc-1' ? 'selected' : ''}>Maroc Lambert Zone 1 — mètres</option>
            </select>
          </div>

          <div>
            <label class="field-label">Espacement</label>
            <select id="gr-spacing" class="field" ${gridState.enabled ? '' : 'disabled'}>
              <option value="0">Automatique (selon le zoom)</option>
              <option value="1000" data-crs="lambert-maroc-1">1 000 m</option>
              <option value="500"  data-crs="lambert-maroc-1">500 m</option>
              <option value="100"  data-crs="lambert-maroc-1">100 m</option>
              <option value="50"   data-crs="lambert-maroc-1">50 m</option>
              <option value="10"   data-crs="lambert-maroc-1">10 m</option>
              <option value="1"        data-crs="wgs84">1°</option>
              <option value="0.5"      data-crs="wgs84">30'</option>
              <option value="0.1"      data-crs="wgs84">6'</option>
              <option value="0.01"     data-crs="wgs84">36"</option>
              <option value="0.001"    data-crs="wgs84">3.6"</option>
            </select>
          </div>

          <label class="checkbox-row" style="margin-top:8px;">
